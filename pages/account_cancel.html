<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>账号注销 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .cancel-content {
    padding: 16px;
    padding-bottom: 100px;
  }

  /* Warning card */
  .warning-card {
    background: #fff5f0;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    display: flex;
    gap: 12px;
  }
  .warning-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #ff6034;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .warning-icon svg { width: 20px; height: 20px; color: #fff; }
  .warning-text {
    flex: 1;
  }
  .warning-title {
    font-size: 15px;
    font-weight: 600;
    color: #ff6034;
    margin-bottom: 4px;
  }
  .warning-desc {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
  }

  /* Section */
  .section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title svg { width: 18px; height: 18px; color: #ff6034; }

  /* Checklist */
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .check-item:last-child { border-bottom: none; }
  .check-icon {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
  }
  .check-icon.checked {
    background: #4caf50;
    border-color: #4caf50;
  }
  .check-icon.checked svg { width: 12px; height: 12px; color: #fff; }
  .check-content { flex: 1; }
  .check-title {
    font-size: 14px;
    color: #333;
    margin-bottom: 2px;
  }
  .check-desc {
    font-size: 12px;
    color: #999;
  }

  /* Reason select */
  .reason-select {
    width: 100%;
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    background: #fff;
    outline: none;
  }
  .reason-select:focus { border-color: #ff6034; }

  .reason-textarea {
    width: 100%;
    height: 100px;
    margin-top: 12px;
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    resize: none;
    outline: none;
  }
  .reason-textarea:focus { border-color: #ff6034; }
  .reason-textarea::placeholder { color: #bbb; }

  /* Verification */
  .verify-section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .verify-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .verify-label {
    font-size: 14px;
    color: #666;
    width: 80px;
  }
  .verify-input {
    flex: 1;
    display: flex;
    align-items: center;
    background: #f5f5f5;
    border-radius: 8px;
    padding: 10px 12px;
    gap: 8px;
  }
  .verify-input input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    background: transparent;
    color: #333;
  }
  .verify-input input::placeholder { color: #bbb; }
  .btn-send {
    font-size: 13px;
    color: #ff6034;
    background: transparent;
    border: none;
    cursor: pointer;
    white-space: nowrap;
  }
  .btn-send:disabled { color: #ccc; }

  /* Agreement */
  .agreement {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 16px 0;
  }
  .agreement input {
    margin-top: 3px;
    accent-color: #ff6034;
  }
  .agreement label {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
  }
  .agreement a { color: #ff6034; }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    padding: 12px 16px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 12px;
    z-index: 200;
  }
  .btn-back {
    flex: 1;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 24px;
    background: #fff;
    color: #666;
    font-size: 15px;
    cursor: pointer;
  }
  .btn-back:active { background: #f5f5f5; }
  .btn-confirm {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 24px;
    background: #ccc;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: not-allowed;
  }
  .btn-confirm.active {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    cursor: pointer;
  }
  .btn-confirm.active:active { opacity: 0.85; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
  }
  .modal-overlay.show { display: block; }
  .modal-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #fff;
    border-radius: 16px;
    padding: 24px;
    width: 280px;
    text-align: center;
  }
  .modal-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #ffebee;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .modal-icon svg { width: 28px; height: 28px; color: #ee0a24; }
  .modal-title {
    font-size: 17px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
  }
  .modal-desc {
    font-size: 13px;
    color: #666;
    line-height: 1.6;
    margin-bottom: 20px;
  }
  .modal-btns {
    display: flex;
    gap: 12px;
  }
  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  .modal-btn.secondary {
    border: 1px solid #ddd;
    background: #fff;
    color: #666;
  }
  .modal-btn.danger {
    border: none;
    background: #ee0a24;
    color: #fff;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">账号注销</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll">
    <div class="cancel-content">

      <!-- Warning -->
      <div class="warning-card">
        <div class="warning-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        </div>
        <div class="warning-text">
          <div class="warning-title">注销后数据将清空</div>
          <div class="warning-desc">账号注销后，您的个人信息、订单记录、积分余额等数据将被永久删除且无法恢复。</div>
        </div>
      </div>

      <!-- Checklist -->
      <div class="section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          注销前请确认
        </div>
        <div class="check-item" onclick="toggleCheck(this)">
          <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="check-content">
            <div class="check-title">账号内无未完成订单</div>
            <div class="check-desc">请确保所有订单已完成或已取消</div>
          </div>
        </div>
        <div class="check-item" onclick="toggleCheck(this)">
          <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="check-content">
            <div class="check-title">积分和余额已使用完毕</div>
            <div class="check-desc">注销后积分和余额将无法找回</div>
          </div>
        </div>
        <div class="check-item" onclick="toggleCheck(this)">
          <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="check-content">
            <div class="check-title">无待处理的售后申请</div>
            <div class="check-desc">请先处理完所有售后申请</div>
          </div>
        </div>
        <div class="check-item" onclick="toggleCheck(this)">
          <div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
          <div class="check-content">
            <div class="check-title">解绑第三方账号</div>
            <div class="check-desc">请先解绑微信等第三方账号</div>
          </div>
        </div>
      </div>

      <!-- Reason -->
      <div class="section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          注销原因
        </div>
        <select class="reason-select" id="reasonSelect">
          <option value="">请选择注销原因</option>
          <option value="not_use">不再使用此账号</option>
          <option value="security">担心隐私安全</option>
          <option value="new_account">要注册新账号</option>
          <option value="bad_exp">使用体验不好</option>
          <option value="other">其他原因</option>
        </select>
        <textarea class="reason-textarea" placeholder="请详细说明您的注销原因（选填）" maxlength="200"></textarea>
      </div>

      <!-- Verification -->
      <div class="verify-section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          身份验证
        </div>
        <div class="verify-row">
          <span class="verify-label">手机号</span>
          <div class="verify-input">
            <input type="text" value="138****8888" disabled style="color:#999;">
          </div>
        </div>
        <div class="verify-row">
          <span class="verify-label">验证码</span>
          <div class="verify-input">
            <input type="text" id="verifyCode" placeholder="请输入验证码" maxlength="6">
            <button class="btn-send" id="sendCode">获取验证码</button>
          </div>
        </div>
      </div>

      <!-- Agreement -->
      <div class="agreement">
        <input type="checkbox" id="agreeCheck">
        <label for="agreeCheck">我已阅读并同意<a href="#">《账号注销协议》</a>，确认注销账号</label>
      </div>

    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="btn-back" onclick="history.back()">暂不注销</button>
    <button class="btn-confirm" id="confirmBtn">确认注销</button>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <div class="modal-title">确认注销账号？</div>
      <div class="modal-desc">注销后您的所有数据将被永久删除，此操作不可撤销。</div>
      <div class="modal-btns">
        <button class="modal-btn secondary" onclick="closeModal()">再想想</button>
        <button class="modal-btn danger" onclick="submitCancel()">确认注销</button>
      </div>
    </div>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var checkItems = document.querySelectorAll('.check-item');
  var reasonSelect = document.getElementById('reasonSelect');
  var verifyCode = document.getElementById('verifyCode');
  var sendCode = document.getElementById('sendCode');
  var agreeCheck = document.getElementById('agreeCheck');
  var confirmBtn = document.getElementById('confirmBtn');
  var modalOverlay = document.getElementById('modalOverlay');

  var countdown = 0;
  var timer = null;

  window.toggleCheck = function(item) {
    item.querySelector('.check-icon').classList.toggle('checked');
    updateSubmitBtn();
  };

  function updateSubmitBtn() {
    var allChecked = true;
    checkItems.forEach(function(item) {
      if (!item.querySelector('.check-icon').classList.contains('checked')) {
        allChecked = false;
      }
    });

    var canSubmit = allChecked && reasonSelect.value && verifyCode.value.length === 6 && agreeCheck.checked;
    confirmBtn.classList.toggle('active', canSubmit);
  }

  checkItems.forEach(function(item) {
    item.addEventListener('click', function() {
      updateSubmitBtn();
    });
  });

  reasonSelect.addEventListener('change', updateSubmitBtn);
  verifyCode.addEventListener('input', updateSubmitBtn);
  agreeCheck.addEventListener('change', updateSubmitBtn);

  // Send code
  sendCode.addEventListener('click', function() {
    if (countdown > 0) return;
    countdown = 60;
    this.disabled = true;
    this.textContent = countdown + 's';
    timer = setInterval(function() {
      countdown--;
      if (countdown <= 0) {
        clearInterval(timer);
        sendCode.disabled = false;
        sendCode.textContent = '获取验证码';
      } else {
        sendCode.textContent = countdown + 's';
      }
    }, 1000);
    alert('验证码已发送');
  });

  // Submit
  confirmBtn.addEventListener('click', function() {
    if (!this.classList.contains('active')) return;
    modalOverlay.classList.add('show');
  });

  window.closeModal = function() {
    modalOverlay.classList.remove('show');
  };

  window.submitCancel = function() {
    modalOverlay.classList.remove('show');
    alert('账号已注销');
    location.href = 'login.html';
  };
})();
</script>
</body>
</html>
