<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>收货地址 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Address list */
  .address-list {
    padding: 12px;
  }
  .address-item {
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
    position: relative;
  }
  .address-item:active { background: #fafafa; }

  /* Address header */
  .address-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .address-name {
    font-size: 15px;
    font-weight: 600;
    color: #333;
  }
  .address-phone {
    font-size: 14px;
    color: #666;
  }
  .address-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: #fff5f0;
    color: #ff6034;
    border: 1px solid #ffddcc;
  }
  .address-tag.gray {
    background: #f5f5f5;
    color: #999;
    border-color: #eee;
  }

  /* Address detail */
  .address-detail {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid #f5f5f5;
  }

  /* Address actions */
  .address-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .address-actions .set-default {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .address-actions .set-default .check-circle {
    width: 18px;
    height: 18px;
    border: 1.5px solid #ddd;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .address-actions .set-default.is-default .check-circle {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    border-color: #ff6034;
  }
  .address-actions .set-default.is-default .check-circle::after {
    content: '';
    width: 5px;
    height: 8px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .address-actions .set-default span {
    font-size: 12px;
    color: #666;
  }
  .address-actions .set-default.is-default span {
    color: #ff6034;
  }
  .address-actions .action-btns {
    display: flex;
    gap: 16px;
  }
  .address-actions .action-btn {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: #666;
    cursor: pointer;
  }
  .address-actions .action-btn:active { opacity: 0.7; }
  .address-actions .action-btn svg { width: 14px; height: 14px; }

  /* Add button */
  .add-address-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 351px;
    width: calc(100% - 24px);
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    padding: 12px;
    border-radius: 24px;
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(238, 10, 36, 0.3);
    z-index: 100;
  }
  .add-address-btn:active { opacity: 0.9; }
  .add-address-btn svg {
    width: 18px;
    height: 18px;
    vertical-align: middle;
    margin-right: 4px;
    margin-top: -2px;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 20px;
    color: #999;
  }
  .empty-state svg {
    width: 80px;
    height: 80px;
    color: #ddd;
    margin-bottom: 16px;
  }
  .empty-state .empty-text {
    font-size: 14px;
    margin-bottom: 20px;
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    width: 300px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
  }
  .modal-title {
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    padding: 20px 16px 10px;
    color: #333;
  }
  .modal-content {
    font-size: 14px;
    color: #666;
    text-align: center;
    padding: 0 16px 20px;
  }
  .modal-actions {
    display: flex;
    border-top: 1px solid #eee;
  }
  .modal-actions .modal-btn {
    flex: 1;
    padding: 14px;
    font-size: 15px;
    text-align: center;
    cursor: pointer;
    border: none;
    background: transparent;
  }
  .modal-actions .modal-btn.cancel { color: #666; border-right: 1px solid #eee; }
  .modal-actions .modal-btn.confirm { color: #ff6034; font-weight: 600; }

  /* Add/Edit Address Form */
  .address-form {
    padding: 12px;
  }
  .form-group {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .form-row {
    display: flex;
    align-items: center;
    padding: 14px 12px;
    border-bottom: 1px solid #f5f5f5;
  }
  .form-row:last-child { border-bottom: none; }
  .form-row label {
    width: 70px;
    font-size: 14px;
    color: #333;
    flex-shrink: 0;
  }
  .form-row input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
  }
  .form-row input::placeholder { color: #bbb; }
  .form-row textarea {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
    resize: none;
    min-height: 60px;
    line-height: 1.5;
  }
  .form-row textarea::placeholder { color: #bbb; }

  /* Paste recognition */
  .paste-section {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .paste-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 6px;
  }
  .paste-header .paste-label {
    font-size: 13px;
    color: #ff6034;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .paste-header .paste-label svg { width: 14px; height: 14px; }
  .paste-header .paste-hint {
    font-size: 11px;
    color: #bbb;
  }
  .paste-textarea {
    display: block;
    width: 100%;
    border: none;
    outline: none;
    font-size: 13px;
    color: #333;
    background: transparent;
    resize: none;
    min-height: 50px;
    max-height: 80px;
    padding: 0 12px 10px;
    line-height: 1.5;
  }
  .paste-textarea::placeholder { color: #ccc; }
  .paste-divider {
    height: 1px;
    background: #f0f0f0;
    margin: 0 12px;
  }

  .form-actions {
    display: flex;
    gap: 12px;
    padding: 20px 12px;
  }
  .form-actions .btn {
    flex: 1;
    padding: 12px;
    border-radius: 24px;
    font-size: 15px;
    text-align: center;
    cursor: pointer;
    border: none;
  }
  .form-actions .btn-cancel {
    background: #f5f5f5;
    color: #666;
  }
  .form-actions .btn-save {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">收货地址</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 80px;">
    <div class="address-list" id="addressList"></div>
  </div>

  <!-- Add Address Button -->
  <div class="add-address-btn" id="addBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新增收货地址
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-title">删除地址</div>
      <div class="modal-content">确定要删除这个地址吗？</div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelDelete">取消</button>
        <button class="modal-btn confirm" id="confirmDelete">确定</button>
      </div>
    </div>
  </div>

  <!-- Add/Edit Address Modal -->
  <div class="modal-overlay" id="formModal">
    <div class="modal" style="width: 340px; max-height: 90vh; overflow-y: auto;">
      <div class="modal-title" id="formTitle">新增收货地址</div>
      <div class="address-form">
        <!-- Paste Recognition -->
        <div class="paste-section">
          <div class="paste-header">
            <span class="paste-label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
              粘贴地址识别
            </span>
            <span class="paste-hint">粘贴完整地址自动填充</span>
          </div>
          <textarea class="paste-textarea" id="pasteArea" placeholder="粘贴完整地址，如：张三 13812345678 江苏省南京市鼓楼区汉中路100号"></textarea>
        </div>
        <div class="paste-divider"></div>

        <div class="form-group">
          <div class="form-row">
            <label>收货人</label>
            <input type="text" id="inputName" placeholder="请输入收货人姓名">
          </div>
          <div class="form-row">
            <label>手机号</label>
            <input type="tel" id="inputPhone" placeholder="请输入手机号码">
          </div>
          <div class="form-row">
            <label>所在地区</label>
            <input type="text" id="inputArea" placeholder="请选择省市区">
          </div>
          <div class="form-row">
            <label>详细地址</label>
            <textarea id="inputDetail" placeholder="请输入详细地址"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-cancel" id="cancelForm">取消</button>
          <button class="btn btn-save" id="saveForm">保存</button>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  // Address data
  var addresses = [
    { id: 1, name: '张三', phone: '138****8888', area: '江苏省南京市', detail: '鼓楼区汉中路100号江苏银行大厦18楼', isDefault: true },
    { id: 2, name: '李四', phone: '139****6666', area: '江苏省苏州市', detail: '工业园区金鸡湖大道999号', isDefault: false },
    { id: 3, name: '王五', phone: '137****5555', area: '江苏省无锡市', detail: '滨湖区蠡湖大道2000号', isDefault: false }
  ];

  var deleteTargetId = null;
  var editTargetId = null;

  var addressList = document.getElementById('addressList');
  var deleteModal = document.getElementById('deleteModal');
  var formModal = document.getElementById('formModal');

  // ===== Paste Recognition =====
  var pasteArea = document.getElementById('pasteArea');

  function parseAddress(text) {
    var result = { name: '', phone: '', area: '', detail: '' };
    if (!text || !text.trim()) return result;
    var s = text.trim();

    // Extract phone number (1xx-xxxxxxxxx format)
    var phoneMatch = s.match(/1[3-9]\d{9}/);
    if (phoneMatch) {
      result.phone = phoneMatch[0];
      s = s.replace(phoneMatch[0], ' ');
    }

    // Extract province/city/district
    var areaMatch = s.match(/([\u4e00-\u9fa5]{2,6}(?:省|市|自治区|特别行政区))([\u4e00-\u9fa5]{2,6}(?:市|区|县|盟|州|旗))?([\u4e00-\u9fa5]{2,6}(?:区|县|市|镇|乡|街道))?/);
    if (areaMatch) {
      result.area = (areaMatch[1] || '') + (areaMatch[2] || '') + (areaMatch[3] || '');
      s = s.replace(areaMatch[0], ' ');
    }

    // The remaining text: split to find name and detail
    var parts = s.split(/[\s,，;；、|]+/).filter(function(p) { return p.length > 0; });

    // Detail address: longest remaining segment with address-like content
    var detailParts = [];
    var nameParts = [];

    parts.forEach(function(p) {
      // Contains address-like characters (road, number, building, etc.)
      if (/[路街道号栋楼室单元巷弄弄堂]|(\d{1,5}[号栋楼室])/.test(p) || p.length > 8) {
        detailParts.push(p);
      } else if (p.length <= 5 && !/\d{4,}/.test(p)) {
        // Short text, likely a name
        nameParts.push(p);
      } else {
        detailParts.push(p);
      }
    });

    if (nameParts.length > 0) {
      result.name = nameParts[0];
    }

    if (detailParts.length > 0) {
      result.detail = detailParts.join('');
    } else if (!result.area && result.name) {
      // Fallback: everything after name could be area+detail
      var remaining = text.replace(result.phone, '').replace(result.name, '').trim();
      result.detail = remaining;
    }

    return result;
  }

  function fillFormFromParse(parsed) {
    if (!parsed.name && !parsed.phone && !parsed.area && !parsed.detail) return;
    if (parsed.name) document.getElementById('inputName').value = parsed.name;
    if (parsed.phone) document.getElementById('inputPhone').value = parsed.phone;
    if (parsed.area) document.getElementById('inputArea').value = parsed.area;
    if (parsed.detail) document.getElementById('inputDetail').value = parsed.detail;
  }

  pasteArea.addEventListener('paste', function() {
    setTimeout(function() {
      var text = pasteArea.value;
      if (text.trim()) {
        var parsed = parseAddress(text);
        fillFormFromParse(parsed);
        pasteArea.value = '';
      }
    }, 100);
  });

  // Also parse on input (for typing/copy-paste)
  var pasteTimer = null;
  pasteArea.addEventListener('input', function() {
    clearTimeout(pasteTimer);
    pasteTimer = setTimeout(function() {
      var text = pasteArea.value;
      if (text.trim().length > 10) {
        var parsed = parseAddress(text);
        fillFormFromParse(parsed);
      }
    }, 800);
  });

  // Render address list
  function renderList() {
    if (addresses.length === 0) {
      addressList.innerHTML = '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
        '<div class="empty-text">暂无收货地址</div>' +
      '</div>';
      return;
    }

    var html = '';
    addresses.forEach(function(addr) {
      html += '<div class="address-item" data-id="' + addr.id + '">' +
        '<div class="address-header">' +
          '<span class="address-name">' + addr.name + '</span>' +
          '<span class="address-phone">' + addr.phone + '</span>' +
          (addr.isDefault ? '<span class="address-tag">默认</span>' : '') +
        '</div>' +
        '<div class="address-detail">' + addr.area + ' ' + addr.detail + '</div>' +
        '<div class="address-actions">' +
          '<div class="set-default ' + (addr.isDefault ? 'is-default' : '') + '" data-id="' + addr.id + '">' +
            '<div class="check-circle"></div>' +
            '<span>' + (addr.isDefault ? '默认地址' : '设为默认') + '</span>' +
          '</div>' +
          '<div class="action-btns">' +
            '<div class="action-btn edit-btn" data-id="' + addr.id + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
              '编辑' +
            '</div>' +
            '<div class="action-btn delete-btn" data-id="' + addr.id + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>' +
              '删除' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
    addressList.innerHTML = html;

    // Bind events
    document.querySelectorAll('.set-default').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = parseInt(this.dataset.id);
        addresses.forEach(function(a) { a.isDefault = (a.id === id); });
        renderList();
      });
    });

    document.querySelectorAll('.edit-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = parseInt(this.dataset.id);
        var addr = addresses.find(function(a) { return a.id === id; });
        if (addr) {
          editTargetId = id;
          document.getElementById('formTitle').textContent = '编辑收货地址';
          document.getElementById('inputName').value = addr.name;
          document.getElementById('inputPhone').value = addr.phone;
          document.getElementById('inputArea').value = addr.area;
          document.getElementById('inputDetail').value = addr.detail;
          formModal.classList.add('show');
        }
      });
    });

    document.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        deleteTargetId = parseInt(this.dataset.id);
        deleteModal.classList.add('show');
      });
    });
  }

  // Add button
  document.getElementById('addBtn').addEventListener('click', function() {
    editTargetId = null;
    document.getElementById('formTitle').textContent = '新增收货地址';
    document.getElementById('inputName').value = '';
    document.getElementById('inputPhone').value = '';
    document.getElementById('inputArea').value = '';
    document.getElementById('inputDetail').value = '';
    formModal.classList.add('show');
  });

  // Delete modal
  document.getElementById('cancelDelete').addEventListener('click', function() {
    deleteModal.classList.remove('show');
    deleteTargetId = null;
  });

  document.getElementById('confirmDelete').addEventListener('click', function() {
    if (deleteTargetId) {
      addresses = addresses.filter(function(a) { return a.id !== deleteTargetId; });
      renderList();
      deleteModal.classList.remove('show');
      deleteTargetId = null;
    }
  });

  // Form modal
  document.getElementById('cancelForm').addEventListener('click', function() {
    formModal.classList.remove('show');
    editTargetId = null;
  });

  document.getElementById('saveForm').addEventListener('click', function() {
    var name = document.getElementById('inputName').value.trim();
    var phone = document.getElementById('inputPhone').value.trim();
    var area = document.getElementById('inputArea').value.trim();
    var detail = document.getElementById('inputDetail').value.trim();

    if (!name || !phone || !area || !detail) {
      alert('请填写完整信息');
      return;
    }

    if (editTargetId) {
      // Edit
      var addr = addresses.find(function(a) { return a.id === editTargetId; });
      if (addr) {
        addr.name = name;
        addr.phone = phone;
        addr.area = area;
        addr.detail = detail;
      }
    } else {
      // Add new
      var newId = Math.max.apply(null, addresses.map(function(a) { return a.id; }).concat([0])) + 1;
      addresses.push({
        id: newId,
        name: name,
        phone: phone,
        area: area,
        detail: detail,
        isDefault: addresses.length === 0
      });
    }

    renderList();
    formModal.classList.remove('show');
    editTargetId = null;
  });

  // Close modal on overlay click
  deleteModal.addEventListener('click', function(e) {
    if (e.target === deleteModal) {
      deleteModal.classList.remove('show');
      deleteTargetId = null;
    }
  });

  formModal.addEventListener('click', function(e) {
    if (e.target === formModal) {
      formModal.classList.remove('show');
      editTargetId = null;
    }
  });

  renderList();
})();
</script>
</body>
</html>
