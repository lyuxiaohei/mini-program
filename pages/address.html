<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>收货地址 - 福利商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Address list */
  .address-list {
    padding: var(--space-md);
  }
  .address-item {
    background: var(--card-bg);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    margin-bottom: var(--space-md);
    position: relative;
  }
  .address-item:active { background: var(--hover-bg); }

  /* Address header */
  .address-header {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    margin-bottom: var(--space-sm);
  }
  .address-name {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
  }
  .address-phone {
    font-size: var(--font-base);
    color: var(--text-secondary);
  }
  .address-tag {
    font-size: var(--font-xs);
    padding: 2px var(--space-sm);
    border-radius: var(--radius-xs);
    background: var(--selected-bg);
    color: var(--primary-start);
    border: 1px solid var(--selected-bg);
  }
  .address-tag.gray {
    background: var(--bg-color);
    color: var(--text-tertiary);
    border-color: var(--border-color);
  }

  /* Address detail */
  .address-detail {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.5;
    margin-bottom: var(--space-md);
    padding-bottom: var(--space-md);
    border-bottom: 1px solid var(--bg-color);
  }

  /* Address actions */
  .address-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .address-actions .set-default {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    cursor: pointer;
  }
  .address-actions .set-default .check-circle {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--text-disabled);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .address-actions .set-default.is-default .check-circle {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    border-color: var(--primary-start);
  }
  .address-actions .set-default.is-default .check-circle::after {
    content: '';
    width: 5px;
    height: 8px;
    border: 2px solid var(--card-bg);
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .address-actions .set-default span {
    font-size: var(--font-sm);
    color: var(--text-secondary);
  }
  .address-actions .set-default.is-default span {
    color: var(--primary-start);
  }
  .address-actions .action-btns {
    display: flex;
    gap: var(--space-lg);
  }
  .address-actions .action-btn {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: var(--font-sm);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .address-actions .action-btn:active { opacity: 0.7; }
  .address-actions .action-btn svg { width: 14px; height: 14px; }

  /* Add button */
  .add-address-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    max-width: 351px;
    width: calc(100% - 24px);
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    font-size: var(--font-md);
    font-weight: 600;
    padding: var(--space-md);
    border-radius: var(--radius-xl);
    text-align: center;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(238, 10, 36, 0.3);
    z-index: 100;
  }
  .add-address-btn:active { opacity: 0.9; }
  .add-address-btn svg {
    width: 18px;
    height: 18px;
    vertical-align: middle;
    margin-right: var(--space-xs);
    margin-top: -2px;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px var(--space-xl);
    color: var(--text-tertiary);
  }
  .empty-state svg {
    width: 80px;
    height: 80px;
    color: var(--text-disabled);
    margin-bottom: var(--space-lg);
  }
  .empty-state .empty-text {
    font-size: var(--font-base);
    margin-bottom: var(--space-xl);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    width: 300px;
    background: var(--card-bg);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .modal-title {
    font-size: var(--font-md);
    font-weight: 600;
    text-align: center;
    padding: var(--space-xl) 16px 10px;
    color: var(--text-color);
  }
  .modal-content {
    font-size: var(--font-base);
    color: var(--text-secondary);
    text-align: center;
    padding: 0 var(--space-lg) var(--space-xl);
  }
  .modal-actions {
    display: flex;
    border-top: 1px solid var(--border-color);
  }
  .modal-actions .modal-btn {
    flex: 1;
    padding: var(--space-lg);
    font-size: var(--font-md);
    text-align: center;
    cursor: pointer;
    border: none;
    background: transparent;
  }
  .modal-actions .modal-btn.cancel { color: var(--text-secondary); border-right: 1px solid var(--border-color); }
  .modal-actions .modal-btn.confirm { color: var(--primary-start); font-weight: 600; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">收货地址</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 80px;">
    <div class="address-list" id="addressList"></div>
  </div>

  <!-- Add Address Button -->
  <div class="add-address-btn" id="addBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    新增收货地址
  </div>

  <!-- Delete Confirm Modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-title">删除地址</div>
      <div class="modal-content">确定要删除这个地址吗？</div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="cancelDelete">取消</button>
        <button class="modal-btn confirm" id="confirmDelete">确定</button>
      </div>
    </div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var addresses = [
    { id: 1, name: '张三', phone: '138****8888', area: '江苏省南京市鼓楼区', detail: '汉中路100号江苏银行大厦18楼', isDefault: true },
    { id: 2, name: '李四', phone: '139****6666', area: '江苏省苏州市工业园区', detail: '金鸡湖大道999号', isDefault: false },
    { id: 3, name: '王五', phone: '137****5555', area: '江苏省无锡市滨湖区', detail: '蠡湖大道2000号', isDefault: false }
  ];

  var deleteTargetId = null;
  var addressList = document.getElementById('addressList');
  var deleteModal = document.getElementById('deleteModal');

  function renderList() {
    if (addresses.length === 0) {
      addressList.innerHTML = '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
        '<div class="empty-text">暂无收货地址</div>' +
      '</div>';
      return;
    }

    var html = '';
    addresses.forEach(function(addr) {
      html += '<div class="address-item" data-id="' + addr.id + '">' +
        '<div class="address-header">' +
          '<span class="address-name">' + addr.name + '</span>' +
          '<span class="address-phone">' + addr.phone + '</span>' +
          (addr.isDefault ? '<span class="address-tag">默认</span>' : '') +
        '</div>' +
        '<div class="address-detail">' + addr.area + ' ' + addr.detail + '</div>' +
        '<div class="address-actions">' +
          '<div class="set-default ' + (addr.isDefault ? 'is-default' : '') + '" data-id="' + addr.id + '">' +
            '<div class="check-circle"></div>' +
            '<span>' + (addr.isDefault ? '默认地址' : '设为默认') + '</span>' +
          '</div>' +
          '<div class="action-btns">' +
            '<div class="action-btn edit-btn" data-id="' + addr.id + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
              '编辑' +
            '</div>' +
            '<div class="action-btn delete-btn" data-id="' + addr.id + '">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>' +
              '删除' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
    addressList.innerHTML = html;

    document.querySelectorAll('.set-default').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = parseInt(this.dataset.id);
        addresses.forEach(function(a) { a.isDefault = (a.id === id); });
        renderList();
      });
    });

    document.querySelectorAll('.edit-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var id = parseInt(this.dataset.id);
        var addr = addresses.find(function(a) { return a.id === id; });
        if (addr) {
          localStorage.setItem('edit_address', JSON.stringify(addr));
          location.href = 'address_edit.html';
        }
      });
    });

    document.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        deleteTargetId = parseInt(this.dataset.id);
        deleteModal.classList.add('show');
      });
    });
  }

  // Add button - navigate to edit page
  document.getElementById('addBtn').addEventListener('click', function() {
    localStorage.removeItem('edit_address');
    location.href = 'address_edit.html';
  });

  // Delete modal
  document.getElementById('cancelDelete').addEventListener('click', function() {
    deleteModal.classList.remove('show');
    deleteTargetId = null;
  });

  document.getElementById('confirmDelete').addEventListener('click', function() {
    if (deleteTargetId) {
      addresses = addresses.filter(function(a) { return a.id !== deleteTargetId; });
      renderList();
      deleteModal.classList.remove('show');
      deleteTargetId = null;
    }
  });

  deleteModal.addEventListener('click', function(e) {
    if (e.target === deleteModal) {
      deleteModal.classList.remove('show');
      deleteTargetId = null;
    }
  });

  // Handle returning from address_edit.html
  window.addEventListener('pageshow', function() {
    var saved = localStorage.getItem('saved_address');
    if (saved) {
      localStorage.removeItem('saved_address');
      var addr = JSON.parse(saved);
      if (addr.isNew) {
        delete addr.isNew;
        addr.id = Math.max.apply(null, addresses.map(function(a) { return a.id; }).concat([0])) + 1;
        if (addresses.length === 0) addr.isDefault = true;
        addresses.push(addr);
      } else {
        var existing = addresses.find(function(a) { return a.id === addr.id; });
        if (existing) {
          existing.name = addr.name;
          existing.phone = addr.phone;
          existing.area = addr.area;
          existing.detail = addr.detail;
        }
      }
      renderList();
    }
  });

  renderList();
})();
</script>
<script src="../js/theme-switcher.js"></script>
</body>
</html>
