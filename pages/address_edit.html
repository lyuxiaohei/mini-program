<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>编辑地址 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* WeChat import */
  .wechat-import-section {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .wechat-import-btn {
    display: block;
    width: 100%;
    padding: 14px 12px;
    font-size: 14px;
    color: #07c160;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    box-sizing: border-box;
  }
  .wechat-import-btn:active { opacity: 0.7; }

  /* Paste recognition */
  .paste-section {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .paste-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 6px;
  }
  .paste-header .paste-label {
    font-size: 13px;
    color: #ff6034;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .paste-header .paste-label svg { width: 14px; height: 14px; }
  .paste-header .paste-hint { font-size: 11px; color: #bbb; }
  .paste-textarea {
    display: block;
    width: 100%;
    border: none;
    outline: none;
    font-size: 13px;
    color: #333;
    background: transparent;
    resize: none;
    min-height: 50px;
    max-height: 80px;
    padding: 0 12px 10px;
    line-height: 1.5;
    box-sizing: border-box;
  }
  .paste-textarea::placeholder { color: #ccc; }

  .form-group {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .form-row {
    display: flex;
    align-items: center;
    padding: 14px 12px;
    border-bottom: 1px solid #f5f5f5;
  }
  .form-row:last-child { border-bottom: none; }
  .form-row label {
    width: 70px;
    font-size: 14px;
    color: #333;
    flex-shrink: 0;
  }
  .form-row input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
  }
  .form-row input::placeholder { color: #bbb; }
  .form-row .area-value {
    flex: 1;
    font-size: 14px;
    color: #bbb;
  }
  .form-row .area-value.filled { color: #333; }
  .form-row .area-arrow {
    width: 14px; height: 14px; color: #ccc; flex-shrink: 0;
  }
  .form-row textarea {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
    resize: none;
    min-height: 60px;
    line-height: 1.5;
  }
  .form-row textarea::placeholder { color: #bbb; }

  .form-actions {
    display: flex;
    gap: 12px;
    padding: 20px 12px;
  }
  .form-actions .btn {
    flex: 1;
    padding: 12px;
    border-radius: 24px;
    font-size: 15px;
    text-align: center;
    cursor: pointer;
    border: none;
  }
  .form-actions .btn-cancel {
    background: #f5f5f5;
    color: #666;
  }
  .form-actions .btn-save {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-weight: 600;
  }

  /* Area picker drawer (3-col: province/city/district) */
  .area-picker-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .area-picker-overlay.show { display: flex; }
  .area-picker {
    width: 100%;
    max-width: 375px;
    background: #fff;
    border-radius: 16px 16px 0 0;
    overflow: hidden;
    animation: drawerUp .25s ease;
  }
  @keyframes drawerUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .area-picker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid #f0f0f0;
  }
  .area-picker-header .picker-cancel {
    font-size: 14px; color: #999; cursor: pointer; border: none; background: none;
  }
  .area-picker-header .picker-title {
    font-size: 15px; font-weight: 600; color: #333;
  }
  .area-picker-header .picker-confirm {
    font-size: 14px; color: #ff6034; font-weight: 600; cursor: pointer; border: none; background: none;
  }
  .area-picker-columns {
    display: flex;
    height: 220px;
    padding: 0 8px;
  }
  .area-picker-col {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .area-picker-col::-webkit-scrollbar { width: 0; }
  .area-picker-col-item {
    padding: 10px 8px;
    font-size: 13px;
    color: #666;
    text-align: center;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-radius: 6px;
  }
  .area-picker-col-item:active { background: #f5f5f5; }
  .area-picker-col-item.active {
    color: #ff6034;
    font-weight: 600;
    background: #fff5f0;
  }

  /* Street picker drawer (single column) */
  .street-picker-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 500;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .street-picker-overlay.show { display: flex; }
  .street-picker {
    width: 100%;
    max-width: 375px;
    background: #fff;
    border-radius: 16px 16px 0 0;
    overflow: hidden;
    animation: drawerUp .25s ease;
  }
  .street-picker-list {
    max-height: 260px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 8px 12px 20px;
  }
  .street-picker-list::-webkit-scrollbar { width: 0; }
  .street-picker-item {
    padding: 12px 8px;
    font-size: 14px;
    color: #333;
    cursor: pointer;
    border-radius: 8px;
  }
  .street-picker-item:active { background: #f5f5f5; }
  .street-picker-item.active {
    color: #ff6034;
    font-weight: 600;
    background: #fff5f0;
  }

  /* Modal */
  .modal-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    width: 300px;
    background: #fff;
    border-radius: 12px;
    overflow: hidden;
  }
  .modal-title { font-size: 16px; font-weight: 600; text-align: center; padding: 20px 16px 10px; color: #333; }
  .modal-content { font-size: 14px; color: #666; text-align: center; padding: 0 16px 20px; }
  .modal-actions { display: flex; border-top: 1px solid #eee; }
  .modal-actions .modal-btn {
    flex: 1; padding: 14px; font-size: 15px; text-align: center; cursor: pointer; border: none; background: transparent;
  }
  .modal-actions .modal-btn.cancel { color: #666; border-right: 1px solid #eee; }
  .modal-actions .modal-btn.confirm { color: #ff6034; font-weight: 600; }
</style>
</head>

  <!-- Street Picker Drawer (single column) -->

    </div>
  </div>

  <!-- WeChat Import Modal -->

    </div>
  </div>

</div>

  // ===== Area Picker (3-col) =====
  var pickerProvince = document.getElementById('pickerProvince');
  var pickerCity = document.getElementById('pickerCity');
  var pickerDistrict = document.getElementById('pickerDistrict');
  var pickerOverlay = document.getElementById('areaPickerOverlay');
  var selProv = '', selCity = '', selDist = '';

  function renderCol(container, items, selected, onSelect) {
    var html = '';
    items.forEach(function(item) {
      html += '<div class="area-picker-col-item' + (item === selected ? ' active' : '') + '">' + item + '</div>';
    });
    container.innerHTML = html;
    container.querySelectorAll('.area-picker-col-item').forEach(function(el) {
      el.addEventListener('click', function() { onSelect(this.textContent); });
    });
    var act = container.querySelector('.active');
    if (act) act.scrollIntoView({ block: 'center' });
  }

  function updateProvince() {
    renderCol(pickerProvince, Object.keys(AREA_DATA), selProv, function(v) {
      selProv = v; selCity = ''; selDist = '';
      updateProvince(); updateCity(); updateDistrict();
    });
  }
  function updateCity() {
    if (!selProv || !AREA_DATA[selProv]) { pickerCity.innerHTML = ''; return; }
    renderCol(pickerCity, Object.keys(AREA_DATA[selProv]), selCity, function(v) {
      selCity = v; selDist = '';
      updateCity(); updateDistrict();
    });
  }
  function updateDistrict() {
    if (!selProv || !selCity || !AREA_DATA[selProv][selCity]) { pickerDistrict.innerHTML = ''; return; }
    renderCol(pickerDistrict, Object.keys(AREA_DATA[selProv][selCity]), selDist, function(v) {
      selDist = v; updateDistrict();
    });
  }

  function openAreaPicker() {
    var current = document.getElementById('inputArea').value;
    selProv = ''; selCity = ''; selDist = '';
    if (current) {
      for (var p in AREA_DATA) {
        for (var c in AREA_DATA[p]) {
          for (var d in AREA_DATA[p][c]) {
            if ((p + c + d) === current) { selProv = p; selCity = c; selDist = d; }
          }
        }
      }
    }
    updateProvince(); updateCity(); updateDistrict();
    pickerOverlay.classList.add('show');
  }

  document.getElementById('areaRow').addEventListener('click', openAreaPicker);
  document.getElementById('pickerCancel').addEventListener('click', function() { pickerOverlay.classList.remove('show'); });
  document.getElementById('pickerConfirm').addEventListener('click', function() {
    if (!selProv) return;
    var text = selProv + (selCity || '') + (selDist || '');
    document.getElementById('inputArea').value = text;
    setAreaDisplay(text);
    // Clear street when area changes
    document.getElementById('inputStreet').value = '';
    setStreetDisplay('');
    pickerOverlay.classList.remove('show');
  });
  pickerOverlay.addEventListener('click', function(e) { if (e.target === pickerOverlay) pickerOverlay.classList.remove('show'); });

  function setAreaDisplay(text) {
    var d = document.getElementById('areaDisplay');
    if (text) { d.textContent = text; d.classList.add('filled'); }
    else { d.textContent = '请选择省/市/区'; d.classList.remove('filled'); }
  }

  // ===== Street Picker (single column) =====
  var streetPickerOverlay = document.getElementById('streetPickerOverlay');
  var streetPickerList = document.getElementById('streetPickerList');
  var selStreet = '';

  function getStreets() {
    if (!selProv || !selCity || !selDist) return [];
    // Read from current form values in case picker was already confirmed
    var area = document.getElementById('inputArea').value;
    for (var p in AREA_DATA) {
      for (var c in AREA_DATA[p]) {
        for (var d in AREA_DATA[p][c]) {
          if ((p + c + d) === area) return Object.keys(AREA_DATA[p][c][d]);
        }
      }
    }
    return [];
  }

  function openStreetPicker() {
    var streets = getStreets();
    if (streets.length === 0) { alert('请先选择所在地区'); return; }
    selStreet = document.getElementById('inputStreet').value || '';
    var html = '';
    streets.forEach(function(s) {
      html += '<div class="street-picker-item' + (s === selStreet ? ' active' : '') + '">' + s + '</div>';
    });
    streetPickerList.innerHTML = html;
    streetPickerList.querySelectorAll('.street-picker-item').forEach(function(el) {
      el.addEventListener('click', function() {
        streetPickerList.querySelectorAll('.street-picker-item').forEach(function(item) { item.classList.remove('active'); });
        this.classList.add('active');
        selStreet = this.textContent;
      });
    });
    var act = streetPickerList.querySelector('.active');
    if (act) act.scrollIntoView({ block: 'center' });
    streetPickerOverlay.classList.add('show');
  }

  document.getElementById('streetRow').addEventListener('click', openStreetPicker);
  document.getElementById('streetPickerCancel').addEventListener('click', function() { streetPickerOverlay.classList.remove('show'); });

    setStreetDisplay(selStreet);
    streetPickerOverlay.classList.remove('show');
  });

  function setStreetDisplay(text) {
    var d = document.getElementById('streetDisplay');

    else { d.textContent = '请选择街道'; d.classList.remove('filled'); }

  // ===== Paste Recognition =====
  var pasteArea = document.getElementById('pasteArea');

  function parseAddress(text) {
    var result = { name: '', phone: '', area: '', street: '', detail: '' };
    if (!text || !text.trim()) return result;
    var s = text.trim();
    var phoneMatch = s.match(/1[3-9]\d{9}/);
    if (phoneMatch) { result.phone = phoneMatch[0]; s = s.replace(phoneMatch[0], ' '); }
    var areaMatch = s.match(/([一-龥]{2,6}(?:省|市|自治区|特别行政区))([一-龥]{2,6}(?:市|区|县|盟|州|旗))?([一-龥]{2,6}(?:区|县|市|镇|乡|街道))?/);
    if (areaMatch) { result.area = (areaMatch[1]||'') + (areaMatch[2]||'') + (areaMatch[3]||''); s = s.replace(areaMatch[0], ' '); }
    var streetMatch = s.match(/([一-龥]{2,6}(?:街道|镇|乡|路|大道|大街))/);
    if (streetMatch) { result.street = streetMatch[1]; s = s.replace(streetMatch[0], ' '); }
    var parts = s.split(/[\s,，;；、|]+/).filter(function(p) { return p.length > 0; });
    var detailParts = [], nameParts = [];
    parts.forEach(function(p) {
      if (/[路街道号栋楼室单元巷弄堂]|(\d{1,5}[号栋楼室])/.test(p) || p.length > 8) detailParts.push(p);
      else if (p.length <= 5 && !/\d{4,}/.test(p)) nameParts.push(p);
      else detailParts.push(p);
    });
    if (nameParts.length > 0) result.name = nameParts[0];
    if (detailParts.length > 0) result.detail = detailParts.join('');
    return result;
  }

  function fillFormFromParse(parsed) {
    if (!parsed.name && !parsed.phone && !parsed.area && !parsed.detail) return;
    if (parsed.name) document.getElementById('inputName').value = parsed.name;
    if (parsed.phone) document.getElementById('inputPhone').value = parsed.phone;
    if (parsed.area) { document.getElementById('inputArea').value = parsed.area; setAreaDisplay(parsed.area); }
    if (parsed.street) { document.getElementById('inputStreet').value = parsed.street; setStreetDisplay(parsed.street); }
    if (parsed.detail) document.getElementById('inputDetail').value = parsed.detail;
  }

  pasteArea.addEventListener('paste', function() {
    setTimeout(function() { var t = pasteArea.value; if (t.trim()) { fillFormFromParse(parseAddress(t)); pasteArea.value = ''; } }, 100);
  });
  var pasteTimer = null;
  pasteArea.addEventListener('input', function() {
    clearTimeout(pasteTimer);
    pasteTimer = setTimeout(function() { var t = pasteArea.value; if (t.trim().length > 10) fillFormFromParse(parseAddress(t)); }, 800);
  });

  // ===== Save =====
  document.getElementById('saveBtn').addEventListener('click', function() {
    var name = document.getElementById('inputName').value.trim();
    var phone = document.getElementById('inputPhone').value.trim();
    var area = document.getElementById('inputArea').value.trim();
    var street = document.getElementById('inputStreet').value.trim();
    var detail = document.getElementById('inputDetail').value.trim();
    if (!name || !phone || !area || !detail) { alert('请填写完整信息'); return; }
    var saved = { name: name, phone: phone, area: area, detail: detail };
    if (street) saved.street = street;
    if (editingId) {
      saved.id = editingId;
    } else {
      saved.isNew = true;
    }
    localStorage.setItem('saved_address', JSON.stringify(saved));
    history.back();
  });
})();
