<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>申请换货 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .exchange-content {
    padding: 12px;
    padding-bottom: 100px;
  }

  /* Order info */
  .order-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .order-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid #f5f5f5;
    margin-bottom: 12px;
  }
  .order-no {
    font-size: 12px;
    color: #999;
  }
  .order-product {
    display: flex;
    gap: 12px;
  }
  .order-img {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .order-img img { width: 100%; height: 100%; object-fit: cover; }
  .order-info { flex: 1; min-width: 0; }
  .order-name {
    font-size: 14px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .order-spec {
    font-size: 12px;
    color: #999;
  }

  /* Exchange type */
  .type-section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title svg { width: 18px; height: 18px; color: #ff6034; }

  .type-options {
    display: flex;
    gap: 10px;
  }
  .type-option {
    flex: 1;
    padding: 14px;
    border: 2px solid #eee;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
  }
  .type-option:active { background: #fafafa; }
  .type-option.selected {
    border-color: #ff6034;
    background: #fff5f0;
  }
  .type-option .type-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 8px;
  }
  .type-option.selected .type-icon {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
  }
  .type-option .type-icon svg { width: 20px; height: 20px; color: #999; }
  .type-option.selected .type-icon svg { color: #fff; }
  .type-option .type-name {
    font-size: 14px;
    color: #333;
    font-weight: 500;
  }

  /* New spec select */
  .spec-section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }
  .spec-section.show { display: block; }
  .spec-row {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .spec-row:last-child { border-bottom: none; }
  .spec-label {
    font-size: 14px;
    color: #666;
    width: 80px;
    flex-shrink: 0;
  }
  .spec-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex: 1;
  }
  .spec-option {
    padding: 6px 14px;
    background: #f5f5f5;
    border-radius: 16px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
  }
  .spec-option:active { background: #eee; }
  .spec-option.selected {
    background: #fff5f0;
    color: #ff6034;
    border: 1px solid #ff6034;
  }

  /* Reason */
  .reason-section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .reason-select {
    width: 100%;
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    background: #fff;
    margin-bottom: 12px;
  }
  .reason-textarea {
    width: 100%;
    height: 100px;
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    resize: none;
    outline: none;
  }
  .reason-textarea:focus { border-color: #ff6034; }
  .reason-textarea::placeholder { color: #bbb; }

  /* Upload */
  .upload-section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .upload-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .upload-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    background: #f8f8f8;
  }
  .upload-item img { width: 100%; height: 100%; object-fit: cover; }
  .upload-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .upload-item .remove-btn svg { width: 12px; height: 12px; color: #fff; }
  .upload-btn {
    aspect-ratio: 1;
    border: 2px dashed #ddd;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .upload-btn svg { width: 24px; height: 24px; color: #ccc; margin-bottom: 4px; }
  .upload-btn span { font-size: 11px; color: #bbb; }

  /* Tips */
  .tips-box {
    background: #fff5f0;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .tips-title {
    font-size: 13px;
    font-weight: 600;
    color: #ff6034;
    margin-bottom: 8px;
  }
  .tips-item {
    font-size: 12px;
    color: #666;
    line-height: 1.8;
    padding-left: 12px;
    position: relative;
  }
  .tips-item::before {
    content: '•';
    position: absolute;
    left: 0;
    color: #ff6034;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    padding: 12px 16px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 12px;
    z-index: 200;
  }
  .btn-cancel {
    flex: 1;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 24px;
    background: #fff;
    color: #666;
    font-size: 15px;
    cursor: pointer;
  }
  .btn-submit {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 24px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-submit:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">申请换货</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll">
    <div class="exchange-content">

      <!-- Order info -->
      <div class="order-card">
        <div class="order-header">
          <span class="order-no">订单号：JS2026040888001</span>
        </div>
        <div class="order-product">
          <div class="order-img">
            <img src="https://images.unsplash.com/photo-1602143407151-7111542de6e8?auto=format&fit=crop&w=200&h=200&q=80" alt="">
          </div>
          <div class="order-info">
            <div class="order-name">日本进口保温杯 不锈钢真空便携水杯500ml</div>
            <div class="order-spec">白色 500ml</div>
          </div>
        </div>
      </div>

      <!-- Exchange type -->
      <div class="type-section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          换货类型
        </div>
        <div class="type-options">
          <div class="type-option selected" data-type="same">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2v20M2 12h20"/></svg>
            </div>
            <div class="type-name">同款换货</div>
          </div>
          <div class="type-option" data-type="diff">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
            </div>
            <div class="type-name">更换规格</div>
          </div>
        </div>
      </div>

      <!-- New spec -->
      <div class="spec-section" id="specSection">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          选择新规格
        </div>
        <div class="spec-row">
          <span class="spec-label">颜色</span>
          <div class="spec-options">
            <div class="spec-option" data-value="white">白色</div>
            <div class="spec-option selected" data-value="black">黑色</div>
            <div class="spec-option" data-value="blue">蓝色</div>
            <div class="spec-option" data-value="pink">粉色</div>
          </div>
        </div>
        <div class="spec-row">
          <span class="spec-label">容量</span>
          <div class="spec-options">
            <div class="spec-option" data-value="350">350ml</div>
            <div class="spec-option selected" data-value="500">500ml</div>
            <div class="spec-option" data-value="750">750ml</div>
            <div class="spec-option" data-value="1000">1000ml</div>
          </div>
        </div>
      </div>

      <!-- Reason -->
      <div class="reason-section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          换货原因
        </div>
        <select class="reason-select" id="reasonSelect">
          <option value="">请选择换货原因</option>
          <option value="quality">商品质量问题</option>
          <option value="damage">商品破损</option>
          <option value="wrong">发错商品</option>
          <option value="defect">商品有瑕疵</option>
          <option value="other">其他原因</option>
        </select>
        <textarea class="reason-textarea" placeholder="请详细描述换货原因（选填）" maxlength="200"></textarea>
      </div>

      <!-- Upload -->
      <div class="upload-section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          上传凭证（选填）
        </div>
        <div class="upload-grid" id="uploadGrid">
          <div class="upload-btn" onclick="alert('上传图片')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>添加图片</span>
          </div>
        </div>
      </div>

      <!-- Tips -->
      <div class="tips-box">
        <div class="tips-title">温馨提示</div>
        <div class="tips-item">换货仅限同款商品或同价位商品</div>
        <div class="tips-item">商品需保持原包装完好，配件齐全</div>
        <div class="tips-item">换货申请提交后，请等待商家审核</div>
        <div class="tips-item">如需帮助，请联系在线客服</div>
      </div>

    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="btn-cancel" onclick="history.back()">取消</button>
    <button class="btn-submit" id="submitBtn">提交申请</button>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var typeOptions = document.querySelectorAll('.type-option');
  var specSection = document.getElementById('specSection');
  var submitBtn = document.getElementById('submitBtn');

  // Type selection
  typeOptions.forEach(function(opt) {
    opt.addEventListener('click', function() {
      typeOptions.forEach(function(o) { o.classList.remove('selected'); });
      this.classList.add('selected');
      specSection.classList.toggle('show', this.dataset.type === 'diff');
    });
  });

  // Spec selection
  document.querySelectorAll('.spec-row').forEach(function(row) {
    row.querySelectorAll('.spec-option').forEach(function(opt) {
      opt.addEventListener('click', function() {
        row.querySelectorAll('.spec-option').forEach(function(o) { o.classList.remove('selected'); });
        this.classList.add('selected');
      });
    });
  });

  // Submit
  submitBtn.addEventListener('click', function() {
    var reason = document.getElementById('reasonSelect').value;
    if (!reason) {
      alert('请选择换货原因');
      return;
    }
    alert('换货申请已提交，请等待商家审核');
    location.href = 'refund.html';
  });
})();
</script>
</body>
</html>
