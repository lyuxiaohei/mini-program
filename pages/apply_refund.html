<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>申请退款 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Product card */
  .product-card {
    background: #fff;
    padding: 12px;
    display: flex;
    gap: 10px;
  }
  .product-card .prod-img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .product-card .prod-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-card .prod-info { flex: 1; min-width: 0; }
  .product-card .prod-name {
    font-size: 14px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .product-card .prod-spec {
    font-size: 12px;
    color: #999;
  }
  .product-card .prod-price {
    font-size: 14px;
    color: #ee0a24;
    font-weight: 600;
    margin-top: 6px;
  }

  /* Form section */
  .form-section {
    background: #fff;
    margin-top: 8px;
    padding: 12px;
  }
  .form-section-title {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin-bottom: 12px;
  }

  /* Refund type */
  .refund-types {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .refund-type-item {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .refund-type-item:active { background: #f8f8f8; }
  .refund-type-item.selected {
    border-color: #ff6034;
    background: #fff5f0;
  }
  .refund-type-item .type-name {
    font-size: 14px;
    color: #333;
    font-weight: 500;
    margin-bottom: 4px;
  }
  .refund-type-item.selected .type-name { color: #ff6034; }
  .refund-type-item .type-desc {
    font-size: 11px;
    color: #999;
  }

  /* Form row */
  .form-row {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .form-row:last-child { border-bottom: none; }
  .form-row label {
    width: 80px;
    font-size: 14px;
    color: #333;
    flex-shrink: 0;
  }
  .form-row input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
  }
  .form-row input::placeholder { color: #bbb; }
  .form-row select {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
    appearance: none;
    -webkit-appearance: none;
  }
  .form-row textarea {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    color: #333;
    background: transparent;
    resize: none;
    min-height: 80px;
    line-height: 1.6;
  }
  .form-row textarea::placeholder { color: #bbb; }

  .form-row .arrow {
    color: #ccc;
  }
  .form-row .arrow svg { width: 16px; height: 16px; }

  .form-tip {
    font-size: 11px;
    color: #999;
    margin-top: 8px;
  }

  /* Amount input */
  .amount-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .amount-row .symbol {
    font-size: 14px;
    color: #333;
  }
  .max-amount {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }
  .max-amount b { color: #ff6034; }

  /* Image upload */
  .upload-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }
  .upload-item {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    background: #f8f8f8;
  }
  .upload-item img { width: 100%; height: 100%; object-fit: cover; }
  .upload-item .delete-btn {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 16px;
    height: 16px;
    background: rgba(0,0,0,0.5);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .upload-item .delete-btn svg { width: 10px; height: 10px; color: #fff; }
  .upload-add {
    width: 64px;
    height: 64px;
    border-radius: 6px;
    border: 1px dashed #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    gap: 2px;
    color: #999;
  }
  .upload-add svg { width: 20px; height: 20px; }
  .upload-add span { font-size: 10px; }

  /* Submit button */
  .submit-section {
    padding: 16px 12px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
  }
  .btn-submit {
    width: 100%;
    height: 44px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    border: none;
    border-radius: 22px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-submit:active { opacity: 0.85; }

  /* Rules */
  .rules-section {
    background: #fff;
    margin-top: 8px;
    padding: 12px;
  }
  .rules-section-title {
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
  }
  .rules-list {
    font-size: 12px;
    color: #666;
    line-height: 1.8;
  }
  .rules-list li {
    position: relative;
    padding-left: 12px;
  }
  .rules-list li::before {
    content: '·';
    position: absolute;
    left: 0;
    color: #999;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">申请退款</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 80px;">

    <!-- Product Card -->
    <div class="product-card">
      <div class="prod-img"><img src="../images/unsplash/1602143407151-7111542de6e8.jpg" alt=""></div>
      <div class="prod-info">
        <div class="prod-name">日本进口保温杯 不锈钢真空便携水杯500ml 大容量男女通用</div>
        <div class="prod-spec">白色 500ml</div>
        <div class="prod-price">&yen;68.00</div>
      </div>
    </div>

    <!-- Refund Type -->
    <div class="form-section">
      <div class="form-section-title">退款类型</div>
      <div class="refund-types">
        <div class="refund-type-item selected" data-type="refund-only">
          <div class="type-name">仅退款</div>
          <div class="type-desc">未收到货或协商一致</div>
        </div>
        <div class="refund-type-item" data-type="refund-return">
          <div class="type-name">退货退款</div>
          <div class="type-desc">已收到货需退回</div>
        </div>
      </div>
    </div>

    <!-- Refund Info -->
    <div class="form-section">
      <div class="form-row">
        <label>退款原因</label>
        <select id="reasonSelect">
          <option value="">请选择退款原因</option>
          <option value="1">不想要了</option>
          <option value="2">拍错/多拍/不想要</option>
          <option value="3">商品信息描述不符</option>
          <option value="4">商品质量问题</option>
          <option value="5">收到商品损坏</option>
          <option value="6">其他</option>
        </select>
        <span class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg></span>
      </div>
      <div class="form-row">
        <label>退款金额</label>
        <div class="amount-row">
          <span class="symbol">&yen;</span>
          <input type="number" id="refundAmount" value="68.00" step="0.01">
        </div>
      </div>
      <div class="max-amount">最多可退 <b>&yen;68.00</b></div>
    </div>

    <!-- Description -->
    <div class="form-section">
      <div class="form-section-title">问题描述</div>
      <div class="form-row" style="flex-direction: column; align-items: flex-start;">
        <textarea id="description" placeholder="请描述您遇到的问题（选填）" maxlength="200"></textarea>
      </div>
      <div class="form-section-title" style="margin-top: 12px;">上传凭证</div>
      <div class="upload-area" id="uploadArea">
        <div class="upload-add" id="uploadAdd">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>上传图片</span>
        </div>
      </div>
      <div class="form-tip">最多上传3张图片</div>
    </div>

    <!-- Rules -->
    <div class="rules-section">
      <div class="rules-section-title">退款说明</div>
      <ul class="rules-list">
        <li>退款金额将原路返回至您的支付账户</li>
        <li>退款审核通过后，1-3个工作日内到账</li>
        <li>如有疑问，请联系客服咨询</li>
      </ul>
    </div>

  </div>

  <!-- Submit Button -->
  <div class="submit-section">
    <button class="btn-submit" id="submitBtn">提交申请</button>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var refundType = 'refund-only';
  var uploadedImages = [];

  // Refund type selection
  var typeItems = document.querySelectorAll('.refund-type-item');
  typeItems.forEach(function(item) {
    item.addEventListener('click', function() {
      typeItems.forEach(function(t) { t.classList.remove('selected'); });
      this.classList.add('selected');
      refundType = this.dataset.type;
    });
  });

  // Image upload simulation
  var uploadArea = document.getElementById('uploadArea');
  var uploadAdd = document.getElementById('uploadAdd');
  var sampleImages = [
    '../images/unsplash/1602143407151-7111542de6e8.jpg'
  ];

  uploadAdd.addEventListener('click', function() {
    if (uploadedImages.length >= 3) {
      alert('最多上传3张图片');
      return;
    }
    uploadedImages.push(sampleImages[0]);
    renderImages();
  });

  function renderImages() {
    var html = '';
    uploadedImages.forEach(function(src, idx) {
      html += '<div class="upload-item">' +
        '<img src="' + src + '" alt="">' +
        '<div class="delete-btn" data-idx="' + idx + '">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</div>' +
      '</div>';
    });
    html += '<div class="upload-add" id="uploadAdd">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
      '<span>上传图片</span>' +
    '</div>';
    uploadArea.innerHTML = html;

    document.getElementById('uploadAdd').addEventListener('click', function() {
      if (uploadedImages.length >= 3) {
        alert('最多上传3张图片');
        return;
      }
      uploadedImages.push(sampleImages[0]);
      renderImages();
    });

    document.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        var idx = parseInt(this.dataset.idx);
        uploadedImages.splice(idx, 1);
        renderImages();
      });
    });
  }

  // Submit
  document.getElementById('submitBtn').addEventListener('click', function() {
    var reason = document.getElementById('reasonSelect').value;
    if (!reason) {
      alert('请选择退款原因');
      return;
    }
    alert('退款申请已提交，请等待审核');
    location.href = 'refund.html';
  });
})();
</script>
</body>
</html>
