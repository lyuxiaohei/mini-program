<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>购物车 - 福利商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Cart edit bar */
  .cart-edit-bar {
    display: flex;
    align-items: center;
    padding: var(--space-sm) var(--space-md);
    background: var(--card-bg);
    font-size: var(--font-sm);
    color: var(--text-secondary);
    border-bottom: 1px solid var(--bg-color);
  }

  /* Cart item */
  .cart-list {
    padding: var(--space-sm) var(--space-md);
  }
  .cart-item-wrapper {
    position: relative;
    overflow: hidden;
    margin-bottom: var(--space-sm);
    border-radius: var(--radius-md);
  }
  .cart-item-wrapper .delete-btn {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 72px;
    background: var(--price-color);
    color: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-base);
    font-weight: 500;
    cursor: pointer;
    z-index: 0;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }
  .cart-item-wrapper .delete-btn:active { background: var(--price-color); }
  .cart-item {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    background: var(--card-bg);
    border-radius: var(--radius-md);
    padding: var(--space-md);
    position: relative;
    transition: transform 0.2s ease;
    z-index: 1;
  }
  .cart-item .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--text-disabled);
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .cart-item .checkbox.checked {
    background: var(--primary-start);
    border-color: var(--primary-start);
  }
  .cart-item .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid var(--card-bg);
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .cart-item .item-img {
    width: 80px;
    height: 80px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg-input);
  }
  .cart-item .item-img img { width: 100%; height: 100%; object-fit: cover; }
  .cart-item .item-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: var(--space-xs);
  }
  .cart-item .item-name {
    font-size: var(--font-sm);
    color: var(--text-color);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: var(--space-xs);
  }
  .cart-item .virtual-tag {
    font-size: var(--font-xs);
    color: var(--primary-start);
    background: rgba(255, 111, 0, 0.1);
    padding: 1px 4px;
    border-radius: var(--radius-xs);
    flex-shrink: 0;
  }
  .cart-item .item-stock-low {
    font-size: var(--font-sm);
    color: var(--price-color);
  }
  .cart-item .item-spec {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    background: var(--bg-color);
    padding: 2px var(--space-sm);
    border-radius: var(--radius-xs);
    display: inline-block;
    align-self: flex-start;
  }
  .cart-item .item-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 2px;
  }
  .cart-item .item-price {
    color: var(--price-color);
    font-size: var(--font-md);
    font-weight: 700;
  }
  .cart-item .item-price .symbol { font-size: var(--font-xs); }

  /* Quantity control */
  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
  }
  .qty-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--text-disabled);
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-base);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .qty-btn:first-child { border-radius: var(--radius-xs) 0 0 var(--radius-xs); }
  .qty-btn:last-child { border-radius: 0 var(--radius-xs) var(--radius-xs) 0; }
  .qty-btn:active { background: var(--bg-color); }
  .qty-btn.disabled { color: var(--text-disabled); pointer-events: none; }
  .qty-num {
    width: 32px;
    height: 24px;
    border-top: 1px solid var(--text-disabled);
    border-bottom: 1px solid var(--text-disabled);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-sm);
    color: var(--text-color);
  }

  /* Off-shelf item (已下架) */
  .cart-item.offshelf {
    /* 不使用整体opacity，只对图片区域处理 */
  }
  .cart-item.offshelf .item-img {
    position: relative;
    opacity: 0.6;
  }
  .cart-item.offshelf .item-img::after {
    content: '已失效';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    color: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-sm);
    border-radius: var(--radius-sm);
  }
  .cart-item.offshelf .item-name,
  .cart-item.offshelf .item-spec,
  .cart-item.offshelf .item-price {
    color: var(--text-tertiary);
  }
  .cart-item.offshelf .checkbox {
    display: none;
  }
  .cart-item.offshelf .qty-control {
    display: none;
  }
  .cart-item.offshelf .offshelf-text {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }

  /* Sold-out item (已售罄) — reuse offshelf layout */
  .cart-item.soldout .item-img {
    position: relative;
    opacity: 0.6;
  }
  .cart-item.soldout .item-img::after {
    content: '已售罄';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    color: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-sm);
    border-radius: var(--radius-sm);
  }
  .cart-item.soldout .item-name,
  .cart-item.soldout .item-spec,
  .cart-item.soldout .item-price { color: var(--text-tertiary); }
  .cart-item.soldout .checkbox { display: none; }
  .cart-item.soldout .qty-control { display: none; }
  .cart-item.soldout .soldout-text {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }

  /* No-stock in this area (该地区无库存) */
  .cart-item.noship .item-img {
    position: relative;
    opacity: 0.6;
  }
  .cart-item.noship .item-img::after {
    content: '无库存';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    color: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-sm);
    border-radius: var(--radius-sm);
  }
  .cart-item.noship .item-name,
  .cart-item.noship .item-spec,
  .cart-item.noship .item-price { color: var(--text-tertiary); }
  .cart-item.noship .checkbox { display: none; }
  .cart-item.noship .qty-control { display: none; }
  .cart-item.noship .noship-info {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }
  .cart-item.noship .noship-text {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }
  .cart-item.noship .noship-link {
    font-size: var(--font-sm);
    color: var(--primary-start);
    cursor: pointer;
    white-space: nowrap;
  }
  .cart-item.noship .noship-link:active { opacity: 0.7; }

  /* Bottom checkout bar */
  .checkout-bar {
    position: absolute;
    bottom: 56px;
    left: 0;
    right: 0;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    height: 56px;
    border-top: 1px solid var(--border-color);
    z-index: 200;
    padding-bottom: var(--space-sm);
  }
  .checkout-bar .select-all {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
    padding: 0 var(--space-md);
    font-size: var(--font-sm);
    color: var(--text-color);
    cursor: pointer;
  }
  .checkout-bar .select-all .checkbox {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--text-disabled);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .checkout-bar .select-all .checkbox.checked {
    background: var(--primary-start);
    border-color: var(--primary-start);
  }
  .checkout-bar .select-all .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid var(--card-bg);
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .checkout-bar .total-area {
    flex: 1;
    text-align: right;
    padding-right: var(--space-md);
  }
  .checkout-bar .total-label { font-size: var(--font-sm); color: var(--text-color); }
  .checkout-bar .total-price { font-size: var(--font-md); color: var(--price-color); font-weight: 700; }
  .checkout-bar .total-price .symbol { font-size: var(--font-sm); }
  .checkout-bar .btn-checkout {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    border: none;
    padding: 0 var(--space-xl);
    height: 40px;
    font-size: var(--font-base);
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius-xl);
    margin-right: var(--space-md);
  }
  .checkout-bar .btn-checkout:active { opacity: 0.85; }

  /* Empty state */
  .empty-cart {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px var(--space-xl);
    gap: var(--space-lg);
  }
  .empty-cart svg { width: 80px; height: 80px; color: var(--text-disabled); }
  .empty-cart p { font-size: var(--font-base); color: var(--text-tertiary); }
  .empty-cart a {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    padding: var(--space-sm) var(--space-xl);
    border-radius: var(--radius-xl);
    font-size: var(--font-base);
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">

      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>

      <span>收藏</span>

      <span>我的</span>

  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var cartItems = [
    { id: 1, name: '日本进口保温杯 不锈钢真空便携水杯500ml', spec: '白色 500ml', price: 68, qty: 1, checked: true, img: '../images/unsplash/1602143407151-7111542de6e8.jpg' },
    { id: 2, name: '无线蓝牙降噪耳机 迷你入耳式超长续航', spec: '黑色 标准版', price: 89, qty: 1, checked: true, img: '../images/unsplash/1505740420928-5e560c06d30e.jpg' },
    { id: 3, name: '纯棉短袖T恤男女款 夏季宽松百搭潮流', spec: '白色 L码', price: 39.9, qty: 2, checked: true, img: '../images/unsplash/1521572163474-6864f9cf17ab.jpg', stockLow: 2 },
    { id: 4, name: '便携式迷你充电宝 20000mAh大容量', spec: '白色', price: 59, qty: 1, checked: false, img: '../images/unsplash/1609091839311-d5365f9ff1c5.jpg', offshelf: true },
    { id: 5, name: '潮流太阳眼镜 防紫外线偏光墨镜', spec: '黑色', price: 128, qty: 1, checked: false, img: '../images/unsplash/1572635196237-14b3f281503f.jpg', soldout: true },
    { id: 6, name: '智能运动手环 心率血氧监测防水', spec: '黑色 标准版', price: 199, qty: 1, checked: false, img: '../images/unsplash/1575311373937-040b8e1fd5b6.jpg', noship: true },
    { id: 7, name: '100元话费充值', spec: '直充 全国通用', price: 98, qty: 1, checked: false, img: '../images/unsplash/虚拟商品主图.jpg', virtual: true },
    { id: 8, name: '视频会员月卡', spec: '卡密 官方直充', price: 19, qty: 2, checked: false, img: '../images/unsplash/虚拟商品详情图1.jpg', virtual: true }
  ];

  function renderCart() {
    var html = '';
    cartItems.forEach(function(item) {
      if (item.offshelf) {
        // 已下架商品：无勾选框、无数量控制、仅支持删除
        html += '<div class="cart-item-wrapper" data-id="' + item.id + '">' +
          '<div class="delete-btn" data-id="' + item.id + '">删除</div>' +
          '<div class="cart-item offshelf">' +
            '<a href="product_detail_off.html" class="item-img"><img src="' + item.img + '" alt=""></a>' +
            '<div class="item-info">' +
              '<div class="item-name">' + item.name + '</div>' +
              '<div class="item-spec">' + item.spec + '</div>' +
              '<div class="item-bottom">' +
                '<span class="item-price"><span class="symbol">&yen;</span>' + item.price.toFixed(2) + '</span>' +
                '<span class="offshelf-text">已下架</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      } else if (item.soldout) {
        html += '<div class="cart-item-wrapper" data-id="' + item.id + '">' +
          '<div class="delete-btn" data-id="' + item.id + '">删除</div>' +
          '<div class="cart-item soldout">' +
            '<div class="item-img"><img src="' + item.img + '" alt=""></div>' +
            '<div class="item-info">' +
              '<div class="item-name">' + item.name + '</div>' +
              '<div class="item-spec">' + item.spec + '</div>' +
              '<div class="item-bottom">' +
                '<span class="item-price"><span class="symbol">&yen;</span>' + item.price.toFixed(2) + '</span>' +
                '<span class="soldout-text">已售罄</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      } else if (item.noship) {
        html += '<div class="cart-item-wrapper" data-id="' + item.id + '">' +
          '<div class="delete-btn" data-id="' + item.id + '">删除</div>' +
          '<div class="cart-item noship">' +
            '<div class="item-img"><img src="' + item.img + '" alt=""></div>' +
            '<div class="item-info">' +
              '<div class="item-name">' + item.name + '</div>' +
              '<div class="item-spec">' + item.spec + '</div>' +
              '<div class="item-bottom">' +
                '<span class="item-price"><span class="symbol">&yen;</span>' + item.price.toFixed(2) + '</span>' +
                '<div class="noship-info">' +
                  '<span class="noship-text">该地区无库存</span>' +
                  '<span class="noship-link" onclick="showAddressPopup()">切换地址</span>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      } else {
        html += '<div class="cart-item-wrapper" data-id="' + item.id + '">' +
          '<div class="delete-btn" data-id="' + item.id + '">删除</div>' +
          '<div class="cart-item' + (item.virtual ? ' virtual' : '') + '">' +
            '<div class="checkbox' + (item.checked ? ' checked' : '') + '" data-id="' + item.id + '"></div>' +
            '<a href="' + (item.virtual ? 'product_detail_virtual.html' : 'product_detail.html') + '" class="item-img"><img src="' + item.img + '" alt=""></a>' +
            '<div class="item-info">' +
              '<div class="item-name">' + item.name + (item.virtual ? '<span class="virtual-tag">虚拟</span>' : '') + '</div>' +
              '<div class="item-spec">' + item.spec + '</div>' +
              (item.stockLow ? '<div class="item-stock-low">库存仅剩' + item.stockLow + '件</div>' : '') +
              '<div class="item-bottom">' +
                '<span class="item-price"><span class="symbol">&yen;</span>' + item.price.toFixed(2) + '</span>' +
                '<div class="qty-control">' +
                  '<div class="qty-btn' + (item.qty <= 1 ? ' disabled' : '') + '" data-action="minus" data-id="' + item.id + '">-</div>' +
                  '<div class="qty-num">' + item.qty + '</div>' +
                  '<div class="qty-btn" data-action="plus" data-id="' + item.id + '">+</div>' +
                '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>';
      }
    });
    document.getElementById('cartList').innerHTML = html;
    // Count only non-offshelf items
    var activeCount = cartItems.filter(function(i) { return !i.offshelf && !i.soldout && !i.noship; }).length;
    document.getElementById('cartCount').textContent = activeCount;
    updateTotal();
    bindEvents();
    bindSwipeEvents();
  }

  function updateTotal() {
    var total = 0, count = 0;
    cartItems.forEach(function(item) {
      if (item.checked && !item.offshelf && !item.soldout && !item.noship) {
        total += item.price * item.qty;
        count += item.qty;
      }
    });
    document.getElementById('totalAmount').textContent = total.toFixed(2);
    document.getElementById('checkoutCount').textContent = count;
    var allChecked = cartItems.filter(function(i) { return !i.offshelf && !i.soldout && !i.noship; }).length > 0 &&
      cartItems.filter(function(i) { return !i.offshelf && !i.soldout && !i.noship; }).every(function(i) { return i.checked; });
    document.getElementById('selectAllBox').classList.toggle('checked', allChecked);
  }

  function bindEvents() {
    // Checkbox toggle
    document.querySelectorAll('.cart-item .checkbox').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = +this.dataset.id;
        cartItems.forEach(function(item) {
          if (item.id === id) item.checked = !item.checked;
        });
        this.classList.toggle('checked');
        updateTotal();
      });
    });

    // Qty controls
    document.querySelectorAll('.qty-btn').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = +this.dataset.id;
        var action = this.dataset.action;
        cartItems.forEach(function(item) {
          if (item.id === id) {
            if (action === 'plus') item.qty++;
            if (action === 'minus' && item.qty > 1) item.qty--;
          }
        });
        renderCart();
      });
    });

    // Delete button
    document.querySelectorAll('.delete-btn').forEach(function(el) {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = +this.dataset.id;
        var wrapper = this.closest('.cart-item-wrapper');
        cartItems = cartItems.filter(function(item) { return item.id !== id; });
        wrapper.style.transition = 'height 0.2s, margin 0.2s, opacity 0.2s';
        wrapper.style.height = wrapper.offsetHeight + 'px';
        requestAnimationFrame(function() {
          wrapper.style.height = '0px';
          wrapper.style.marginBottom = '0px';
          wrapper.style.opacity = '0';
          wrapper.style.overflow = 'hidden';
        });
        setTimeout(function() {
          renderCart();
        }, 220);
      });
    });
  }

  // Swipe to delete
  function bindSwipeEvents() {
    var currentSwipe = null;
    var startX = 0;
    var DELETE_WIDTH = 72;

    // Reset all swiped items
    function resetAllSwipe() {
      document.querySelectorAll('.cart-item').forEach(function(el) {
        el.style.transform = 'translateX(0)';
      });
    }

    document.querySelectorAll('.cart-item-wrapper').forEach(function(wrapper) {
      var cartItem = wrapper.querySelector('.cart-item');

      // Touch events
      cartItem.addEventListener('touchstart', function(e) {
        if (currentSwipe && currentSwipe !== cartItem) {
          currentSwipe.style.transform = 'translateX(0)';
        }
        currentSwipe = cartItem;
        startX = e.touches[0].clientX;
        cartItem.style.transition = 'none';
      });

      cartItem.addEventListener('touchmove', function(e) {
        var diff = e.touches[0].clientX - startX;
        var offset = Math.min(0, Math.max(-DELETE_WIDTH, diff));
        cartItem.style.transform = 'translateX(' + offset + 'px)';
      });

      cartItem.addEventListener('touchend', function(e) {
        cartItem.style.transition = 'transform 0.2s ease';
        var diff = e.changedTouches[0].clientX - startX;
        if (diff < -DELETE_WIDTH / 2) {
          cartItem.style.transform = 'translateX(-' + DELETE_WIDTH + 'px)';
        } else {
          cartItem.style.transform = 'translateX(0)';
          currentSwipe = null;
        }
      });

      // Mouse events (for desktop preview)
      var mouseDown = false;
      cartItem.addEventListener('mousedown', function(e) {
        if (e.target.closest('.qty-btn') || e.target.closest('.checkbox') || e.target.closest('a')) return;
        if (currentSwipe && currentSwipe !== cartItem) {
          currentSwipe.style.transition = 'transform 0.2s ease';
          currentSwipe.style.transform = 'translateX(0)';
        }
        currentSwipe = cartItem;
        mouseDown = true;
        startX = e.clientX;
        cartItem.style.transition = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!mouseDown) return;
        var diff = e.clientX - startX;
        var offset = Math.min(0, Math.max(-DELETE_WIDTH, diff));
        cartItem.style.transform = 'translateX(' + offset + 'px)';
      });

      document.addEventListener('mouseup', function(e) {
        if (!mouseDown) return;
        mouseDown = false;
        cartItem.style.transition = 'transform 0.2s ease';
        var diff = e.clientX - startX;
        if (diff < -DELETE_WIDTH / 2) {
          cartItem.style.transform = 'translateX(-' + DELETE_WIDTH + 'px)';
        } else {
          cartItem.style.transform = 'translateX(0)';
          currentSwipe = null;
        }
      });
    });
  }

  // Select all
  document.getElementById('selectAll').addEventListener('click', function() {
    var activeItems = cartItems.filter(function(i) { return !i.offshelf && !i.soldout && !i.noship; });
    var allChecked = activeItems.every(function(i) { return i.checked; });
    activeItems.forEach(function(item) { item.checked = !allChecked; });
    renderCart();
  });

  // Checkout handler
  window.handleCheckout = function() {
    var checkedItems = cartItems.filter(function(i) { return i.checked && !i.offshelf && !i.soldout && !i.noship; });
    if (checkedItems.length === 0) {
      alert('请选择商品');
      return;
    }

    var virtualItems = checkedItems.filter(function(i) { return i.virtual; });
    var physicalItems = checkedItems.filter(function(i) { return !i.virtual; });

    if (virtualItems.length > 0 && physicalItems.length > 0) {
      alert('虚拟商品和实物商品需要分开下单');
      return;
    }

    if (virtualItems.length > 0) {
      if (virtualItems.length > 1) {
        alert('虚拟商品一次只能下单一个SKU，请取消多余商品的勾选');
        return;
      }
      location.href = 'order_virtual.html';
    } else {
      location.href = 'order_product.html';
    }
  };

  // Address switch popup for noship items
  window.showAddressPopup = function() {
    // Prototype: just show a simple address list overlay
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:flex;align-items:flex-end;justify-content:center;';
    var popup = document.createElement('div');
    popup.style.cssText = 'width:100%;background:var(--card-bg);border-radius:var(--radius-lg) var(--radius-lg) 0 0;padding:var(--space-lg);max-height:60%;overflow-y:auto;';
    popup.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-md);">' +
        '<span style="font-size:var(--font-md);font-weight:600;color:var(--text-color);">选择收货地址</span>' +
        '<span style="color:var(--text-tertiary);cursor:pointer;font-size:var(--font-base);" id="closeAddrPopup">关闭</span>' +
      '</div>' +
      '<div style="padding:var(--space-md);border-radius:var(--radius-md);background:var(--card-bg)9f5;border:2px solid var(--primary-start);margin-bottom:var(--space-sm);">' +
        '<div style="font-size:var(--font-base);font-weight:500;color:var(--text-color);">张三  138****8888</div>' +
        '<div style="font-size:var(--font-sm);color:var(--text-secondary);margin-top:var(--space-xs);">北京市朝阳区建国路88号 悦享大厦A座12层</div>' +
        '<div style="font-size:var(--font-sm);color:var(--primary-start);margin-top:var(--space-xs);">当前默认</div>' +
      '</div>' +
      '<div style="padding:var(--space-md);border-radius:var(--radius-md);background:var(--bg-input);margin-bottom:var(--space-sm);cursor:pointer;" onclick="alert(\'已切换默认地址（原型演示）\')">' +
        '<div style="font-size:var(--font-base);font-weight:500;color:var(--text-color);">李四  139****9999</div>' +
        '<div style="font-size:var(--font-sm);color:var(--text-secondary);margin-top:var(--space-xs);">上海市浦东新区陆家嘴环路1000号 恒生大厦8层</div>' +
        '<div style="font-size:var(--font-sm);color:var(--success-color);margin-top:var(--space-xs);">设为默认可购买</div>' +
      '</div>' +
      '<div style="padding:var(--space-md);border-radius:var(--radius-md);background:var(--bg-input);cursor:pointer;" onclick="location.href=\'address.html\'">' +
        '<div style="font-size:var(--font-sm);color:var(--primary-start);text-align:center;">管理收货地址</div>' +
      '</div>';
    overlay.appendChild(popup);
    document.querySelector('.phone-frame').appendChild(overlay);
    document.getElementById('closeAddrPopup').onclick = function() { overlay.remove(); };
    overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  };

  renderCart();
})();
</script>
<script src="../js/theme-switcher.js"></script>
</body>
</html>
