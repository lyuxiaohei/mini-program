<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>分类 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Category page specific */
  .category-body {
    display: flex;
    height: calc(100vh - 44px - 44px - 56px);
    overflow: hidden;
  }

  /* Left sidebar */
  .cate-sidebar {
    width: 88px;
    background: #f5f5f5;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .cate-sidebar::-webkit-scrollbar { width: 0; }
  .cate-sidebar-item {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 52px;
    padding: 0 6px;
    font-size: 12px;
    color: #666;
    cursor: pointer;
    position: relative;
    text-align: center;
    line-height: 1.3;
  }
  .cate-sidebar-item:active { background: #eee; }
  .cate-sidebar-item.active {
    background: #fff;
    color: #333;
    font-weight: 600;
  }
  .cate-sidebar-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 8px;
    bottom: 8px;
    width: 3px;
    background: linear-gradient(180deg, #ff6034, #ee0a24);
    border-radius: 0 2px 2px 0;
  }

  /* Right content */
  .cate-content {
    flex: 1;
    background: #fff;
    overflow-y: auto;
    padding: 12px;
  }
  .cate-content::-webkit-scrollbar { width: 0; }
  .cate-sub-title {
    font-size: 13px;
    font-weight: 600;
    color: #333;
    margin-bottom: 10px;
    padding-left: 4px;
  }
  .cate-sub-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .cate-sub-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
  }
  .cate-sub-item:active { opacity: 0.7; }
  .cate-sub-item img {
    width: 60px;
    height: 60px;
    border-radius: 10px;
    object-fit: cover;
    background: #f8f8f8;
  }
  .cate-sub-item span {
    font-size: 11px;
    color: #666;
    text-align: center;
    line-height: 1.2;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Category Body -->
  <div class="category-body" id="categoryBody">
    <div class="cate-sidebar" id="cateSidebar"></div>
    <div class="cate-content" id="cateContent"></div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <a href="home_page.html" class="tab-item">

    <div class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>

    <a href="cart.html" class="tab-item">

<script src="../js/common.js"></script>
<script>
(function() {
  var categories = [
    { name: '推荐', subs: [
      { group: '热门推荐', items: [
        { name: '限时秒杀', img: '../images/unsplash/1607082349566-187342175e2f.jpg' },
        { name: '品牌特卖', img: '../images/unsplash/1441986300917-64674bd600d8.jpg' },
        { name: '每日上新', img: '../images/unsplash/1512820790803-83ca734da794.jpg' },
        { name: '积分兑换', img: '../images/unsplash/1560472354-b33ff0c44a43.jpg' },
        { name: '超值套餐', img: '../images/unsplash/1504674900247-0877df9cc836.jpg' },
        { name: '新人专享', img: '../images/unsplash/1483985988355-763728e1935b.jpg' }
      ]}
    ]},
    { name: '数码家电', subs: [
      { group: '手机数码', items: [
        { name: '手机', img: '../images/unsplash/1583394838336-acd977736f90.jpg' },
        { name: '耳机', img: '../images/unsplash/1505740420928-5e560c06d30e.jpg' },
        { name: '充电宝', img: '../images/unsplash/1609091839311-d5365f9ff1c5.jpg' },
        { name: '数据线', img: '../images/unsplash/1585338107529-13afc5f02586.jpg' }
      ]},
      { group: '智能穿戴', items: [
        { name: '智能手表', img: '../images/unsplash/1523275335684-37898b6baf30.jpg' },
        { name: '智能手环', img: '../images/unsplash/1575311373937-040b8e1fd5b6.jpg' }
      ]}
    ]},
    { name: '服饰鞋包', subs: [
      { group: '男装', items: [
        { name: 'T恤', img: '../images/unsplash/1521572163474-6864f9cf17ab.jpg' },
        { name: '衬衫', img: '../images/unsplash/1596755094514-f87e34085b2c.jpg' },
        { name: '裤子', img: '../images/unsplash/1624378439575-d8705ad7ae80.jpg' }
      ]},
      { group: '鞋靴', items: [
        { name: '运动鞋', img: '../images/unsplash/1542291026-7eec264c27ff.jpg' },
        { name: '休闲鞋', img: '../images/unsplash/1491553895911-0055eca6402d.jpg' },
        { name: '配饰', img: '../images/unsplash/1572635196237-14b3f281503f.jpg' }
      ]}
    ]},
    { name: '美妆护肤', subs: [
      { group: '护肤', items: [
        { name: '面膜', img: '../images/unsplash/1596462502278-27bfdc403348.jpg' },
        { name: '精华', img: '../images/unsplash/1585386959984-a4155224a1ad.jpg' },
        { name: '防晒', img: '../images/unsplash/1556228578-0d85b1a4d571.jpg' }
      ]}
    ]},
    { name: '食品饮料', subs: [
      { group: '零食', items: [
        { name: '坚果', img: '../images/unsplash/1504674900247-0877df9cc836.jpg' },
        { name: '糕点', img: '../images/unsplash/1578985545062-69928b1d9587.jpg' },
        { name: '饮品', img: '../images/unsplash/1544145945-f90425340c7e.jpg' }
      ]}
    ]},
    { name: '家居生活', subs: [
      { group: '家居好物', items: [
        { name: '保温杯', img: '../images/unsplash/1602143407151-7111542de6e8.jpg' },
        { name: '收纳', img: '../images/unsplash/1586023492125-27b2c045efd7.jpg' },
        { name: '照明', img: '../images/unsplash/1586023492125-27b2c045efd7.jpg' }
      ]}
    ]},
    { name: '运动户外', subs: [
      { group: '运动装备', items: [
        { name: '跑鞋', img: '../images/unsplash/1491553895911-0055eca6402d.jpg' },
        { name: '瑜伽', img: '../images/unsplash/1513364776144-60967b0f800f.jpg' },
        { name: '水壶', img: '../images/unsplash/1602143407151-7111542de6e8.jpg' }
      ]}
    ]},
    { name: '蛋糕鲜花', subs: [
      { group: '蛋糕', items: [
        { name: '生日蛋糕', img: '../images/unsplash/1578985545062-69928b1d9587.jpg' },
        { name: '鲜花速递', img: '../images/unsplash/1561181286-d3fee7d55364.jpg' }
      ]}
    ]}
  ];

  var sidebar = document.getElementById('cateSidebar');
  var content = document.getElementById('cateContent');
  var currentIndex = 0;

  function renderSidebar() {
    var html = '';
    categories.forEach(function(cat, i) {
      html += '<div class="cate-sidebar-item' + (i === currentIndex ? ' active' : '') + '" data-index="' + i + '">' + cat.name + '</div>';
    });
    sidebar.innerHTML = html;
    sidebar.querySelectorAll('.cate-sidebar-item').forEach(function(el) {
      el.addEventListener('click', function() {
        currentIndex = +this.dataset.index;
        renderSidebar();
        renderContent();
      });
    });
  }

  function renderContent() {
    var cat = categories[currentIndex];
    var html = '';
    cat.subs.forEach(function(sub) {
      html += '<div class="cate-sub-title">' + sub.group + '</div>';
      html += '<div class="cate-sub-grid">';
      sub.items.forEach(function(item) {
        html += '<a href="product_list.html" class="cate-sub-item">' +
          '<img src="' + item.img + '" alt="' + item.name + '">' +
          '<span>' + item.name + '</span>' +
        '</a>';
      });
      html += '</div>';
    });
    content.innerHTML = html;
    content.scrollTop = 0;
  }

  renderSidebar();
  renderContent();
})();
</script>
</body>
</html>
