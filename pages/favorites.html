<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的收藏 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Edit bar */
  .edit-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
  }
  .edit-bar .count {
    font-size: 12px;
    color: #999;
  }
  .edit-bar .edit-btn {
    font-size: 13px;
    color: #ff6034;
    cursor: pointer;
  }

  /* Favorite item */
  .fav-list {
    padding: 8px 12px;
  }
  .fav-item {
    display: flex;
    background: #fff;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 8px;
    gap: 12px;
    position: relative;
  }
  .fav-item .checkbox {
    width: 20px;
    height: 20px;
    border: 1.5px solid #ddd;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 30px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .fav-item .checkbox.checked {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    border-color: #ff6034;
  }
  .fav-item .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .fav-item .checkbox.hidden { display: none; }
  .fav-item .fav-img {
    width: 100px;
    height: 100px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .fav-item .fav-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .fav-item .fav-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .fav-item .fav-name {
    font-size: 13px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .fav-item .fav-tags {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .fav-item .fav-tag {
    font-size: 10px;
    padding: 1px 4px;
    border-radius: 3px;
    border: 1px solid #ff6034;
    color: #ff6034;
  }
  .fav-item .fav-price {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .fav-item .price-now {
    color: #ee0a24;
    font-size: 16px;
    font-weight: 700;
  }
  .fav-item .price-now .symbol { font-size: 11px; }
  .fav-item .price-old {
    font-size: 11px;
    color: #bbb;
    text-decoration: line-through;
  }
  .fav-item .add-cart-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 14px;
    cursor: pointer;
  }
  .fav-item .add-cart-btn:active { opacity: 0.85; }

  /* Off-shelf item (已下架) */
  .fav-item.offshelf {
    /* 不使用整体opacity，只对图片区域处理 */
  }
  .fav-item.offshelf .fav-img {
    position: relative;
    opacity: 0.6;
  }
  .fav-item.offshelf .fav-img::after {
    content: '已失效';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    border-radius: 8px;
  }
  .fav-item.offshelf .fav-name,
  .fav-item.offshelf .fav-tags,
  .fav-item.offshelf .fav-price {
    color: #999;
  }
  .fav-item.offshelf .price-now,
  .fav-item.offshelf .price-old {
    color: #999;
  }
  .fav-item.offshelf .add-cart-btn {
    display: none;
  }
  .fav-item.offshelf .offshelf-text {
    font-size: 11px;
    color: #999;
    position: absolute;
    bottom: 12px;
    right: 12px;
  }
  /* 已下架商品的checkbox在编辑模式下也显示，支持删除 */
  .fav-item.offshelf .checkbox {
    display: flex;
  }
  .fav-item.offshelf .checkbox.hidden {
    display: none;
  }

  /* Floating cart button */
  .float-cart {
    position: absolute;
    right: 17px;
    bottom: 72px;
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(238, 10, 36, 0.35);
    cursor: pointer;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .float-cart:active { transform: scale(0.92); }
  .float-cart svg { width: 24px; height: 24px; color: #fff; display: block; }
  .float-cart .float-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #ffe014;
    color: #ee0a24;
    font-size: 11px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    line-height: 18px;
    border-radius: 9px;
    text-align: center;
    padding: 0 4px;
  }
  .float-cart.bounce {
    animation: cartBounce 0.4s ease;
  }
  @keyframes cartBounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.25); }
    50%  { transform: scale(0.9); }
    70%  { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* Flying image */
  .fly-img {
    position: absolute;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid #ff6034;
    overflow: hidden;
    z-index: 999;
    pointer-events: none;
    opacity: 1;
  }
  .fly-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .fly-img.flying {
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    opacity: 0.6;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: #999;
  }
  .empty-state svg {
    width: 80px;
    height: 80px;
    color: #ddd;
    margin-bottom: 16px;
  }
  .empty-state .empty-text {
    font-size: 14px;
    margin-bottom: 16px;
  }
  .empty-state .go-shopping {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-size: 13px;
    padding: 8px 24px;
    border-radius: 20px;
    cursor: pointer;
  }

  /* Bottom action bar */
  .action-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    max-width: 375px;
    margin: 0 auto;
    background: #fff;
    border-top: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    z-index: 100;
  }
  .action-bar .select-all {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .action-bar .select-all .checkbox {
    width: 20px;
    height: 20px;
    border: 1.5px solid #ddd;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .action-bar .select-all .checkbox.checked {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    border-color: #ff6034;
  }
  .action-bar .select-all .checkbox.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .action-bar .select-all span { font-size: 13px; color: #333; }
  .action-bar .delete-btn {
    background: #ee0a24;
    color: #fff;
    font-size: 13px;
    padding: 8px 20px;
    border-radius: 18px;
    cursor: pointer;
  }
  .action-bar .delete-btn:active { opacity: 0.85; }
  .action-bar .delete-btn.disabled {
    background: #ccc;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">我的收藏</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Edit Bar -->
  <div class="edit-bar">
    <span class="count">共 <span id="totalCount">4</span> 件商品</span>
    <span class="edit-btn" id="editBtn">管理</span>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 128px;">
    <div class="fav-list" id="favList"></div>
  </div>

  <!-- Bottom Action Bar -->
  <div class="action-bar" id="actionBar" style="display: none; bottom: 56px;">
    <div class="select-all" id="selectAll">
      <div class="checkbox"></div>
      <span>全选</span>
    </div>
    <div class="delete-btn disabled" id="deleteBtn">删除</div>
  </div>

  <!-- Floating Cart Button -->
  <div class="float-cart" id="floatCart" onclick="location.href='cart.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
    <span class="float-badge" id="floatBadge">3</span>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <a href="home_page.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </a>
    <a href="category.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>分类</span>
    </a>
    <a href="cart.html" class="tab-item">
      <div class="cart-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span class="badge">3</span>
      </div>
      <span>购物车</span>
    </a>
    <div class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span>收藏</span>
    </div>
    <a href="profile.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </a>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var isEditing = false;
  var selectedItems = new Set();

  // Favorite items data
  var favItems = [
    { id: 1, name: '日本进口保温杯 不锈钢真空便携水杯500ml', price: '68', original: '168', tag: '爆款', img: '../images/unsplash/1602143407151-7111542de6e8.jpg' },
    { id: 2, name: '无线蓝牙降噪耳机 迷你入耳式超长续航', price: '89', original: '299', tag: '新品', img: '../images/unsplash/1505740420928-5e560c06d30e.jpg' },
    { id: 3, name: '时尚运动鞋 透气网面跑步鞋轻便缓震', price: '159', original: '459', tag: '限时', img: '../images/unsplash/1542291026-7eec264c27ff.jpg' },
    { id: 4, name: '智能手表 多功能运动健康监测手环', price: '199', original: '599', tag: '爆款', img: '../images/unsplash/1523275335684-37898b6baf30.jpg' },
    { id: 5, name: '便携式迷你充电宝 20000mAh大容量', price: '59', original: '159', tag: '爆款', img: '../images/unsplash/1609091839311-d5365f9ff1c5.jpg', offshelf: true }
  ];

  // Count only non-offshelf items
  document.getElementById('totalCount').textContent = favItems.length;

  // Edit button
  var editBtn = document.getElementById('editBtn');
  var actionBar = document.getElementById('actionBar');

  editBtn.addEventListener('click', function() {
    isEditing = !isEditing;
    editBtn.textContent = isEditing ? '完成' : '管理';
    actionBar.style.display = isEditing ? 'flex' : 'none';
    renderList();
  });

  // Select all
  var selectAll = document.getElementById('selectAll');
  selectAll.addEventListener('click', function() {
    var checkbox = this.querySelector('.checkbox');

    if (selectedItems.size === favItems.length) {
      selectedItems.clear();
      checkbox.classList.remove('checked');
    } else {
      favItems.forEach(function(item) { selectedItems.add(item.id); });
      checkbox.classList.add('checked');
    }
    renderList();
    updateDeleteBtn();
  });

  // Delete button
  var deleteBtn = document.getElementById('deleteBtn');
  deleteBtn.addEventListener('click', function() {
    if (selectedItems.size > 0) {
      favItems = favItems.filter(function(item) { return !selectedItems.has(item.id); });
      selectedItems.clear();
      document.getElementById('totalCount').textContent = favItems.length;
      renderList();
      updateDeleteBtn();
      selectAll.querySelector('.checkbox').classList.remove('checked');
    }
  });

  function updateDeleteBtn() {
    deleteBtn.classList.toggle('disabled', selectedItems.size === 0);
    deleteBtn.textContent = selectedItems.size > 0 ? '删除(' + selectedItems.size + ')' : '删除';
  }

  function renderList() {
    var list = document.getElementById('favList');
    if (favItems.length === 0) {
      list.innerHTML = '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>' +
        '<div class="empty-text">暂无收藏商品</div>' +
        '<a href="home_page.html" class="go-shopping">去逛逛</a>' +
      '</div>';
      return;
    }

    var html = '';
    favItems.forEach(function(item) {
      var isChecked = selectedItems.has(item.id);
      if (item.offshelf) {
        // 已下架商品：无加入购物车按钮、编辑模式下可勾选删除
        html += '<div class="fav-item offshelf" data-id="' + item.id + '">' +
          '<div class="checkbox ' + (isEditing ? '' : 'hidden') + '" data-id="' + item.id + '"></div>' +
          '<div class="fav-img"><img src="' + item.img + '" alt="' + item.name + '"></div>' +
          '<div class="fav-info">' +
            '<div class="fav-name">' + item.name + '</div>' +
            '<div class="fav-tags"><span class="fav-tag">' + item.tag + '</span></div>' +
            '<div class="fav-price">' +
              '<span class="price-now"><span class="symbol">&yen;</span>' + item.price + '</span>' +
              '<span class="price-old">&yen;' + item.original + '</span>' +
            '</div>' +
          '</div>' +
          '<span class="offshelf-text">已下架</span>' +
        '</div>';
      } else {
        html += '<div class="fav-item">' +
          '<div class="checkbox ' + (isEditing ? '' : 'hidden') + (isChecked ? ' checked' : '') + '" data-id="' + item.id + '"></div>' +
          '<a href="product_detail.html" class="fav-img"><img src="' + item.img + '" alt="' + item.name + '"></a>' +
          '<div class="fav-info">' +
            '<a href="product_detail.html" class="fav-name">' + item.name + '</a>' +
            '<div class="fav-tags"><span class="fav-tag">' + item.tag + '</span></div>' +
            '<div class="fav-price">' +
              '<span class="price-now"><span class="symbol">&yen;</span>' + item.price + '</span>' +
              '<span class="price-old">&yen;' + item.original + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="add-cart-btn" data-id="' + item.id + '" data-img="' + item.img + '">加入购物车</div>' +
        '</div>';
      }
    });
    list.innerHTML = html;

    // Bind checkbox events
    document.querySelectorAll('.fav-item .checkbox').forEach(function(cb) {
      cb.addEventListener('click', function(e) {
        e.stopPropagation();
        var id = parseInt(this.dataset.id);
        if (!id) return;
        if (selectedItems.has(id)) {
          selectedItems.delete(id);
          this.classList.remove('checked');
        } else {
          selectedItems.add(id);
          this.classList.add('checked');
        }
        updateDeleteBtn();
        var allCheckbox = selectAll.querySelector('.checkbox');
        allCheckbox.classList.toggle('checked', selectedItems.size === favItems.length);
      });
    });

    // Bind add-to-cart with fly animation
    document.querySelectorAll('.add-cart-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        flyToCart(this);
      });
    });
  }

  // Cart count
  var cartCount = 3;

  function flyToCart(btn) {
    var frame = document.querySelector('.phone-frame');
    var favItem = btn.closest('.fav-item');
    var imgEl = favItem.querySelector('.fav-img img');
    var cartEl = document.getElementById('floatCart');
    var badgeEl = document.getElementById('floatBadge');

    // Get positions relative to phone-frame
    var frameRect = frame.getBoundingClientRect();
    var imgRect = imgEl.getBoundingClientRect();
    var cartRect = cartEl.getBoundingClientRect();

    // Create flying clone
    var fly = document.createElement('div');
    fly.className = 'fly-img';
    fly.innerHTML = '<img src="' + imgEl.src + '">';
    frame.appendChild(fly);

    // Start position (relative to frame)
    var startX = imgRect.left - frameRect.left + imgRect.width / 2 - 20;
    var startY = imgRect.top - frameRect.top + imgRect.height / 2 - 20;
    fly.style.left = startX + 'px';
    fly.style.top = startY + 'px';

    // Force reflow
    fly.offsetHeight;

    // End position (relative to frame)
    var endX = cartRect.left - frameRect.left + cartRect.width / 2 - 20;
    var endY = cartRect.top - frameRect.top + cartRect.height / 2 - 20;

    // Animate
    fly.classList.add('flying');
    fly.style.left = endX + 'px';
    fly.style.top = endY + 'px';
    fly.style.width = '20px';
    fly.style.height = '20px';
    fly.style.opacity = '0.3';

    fly.addEventListener('transitionend', function() {
      fly.remove();
      // Bounce cart button
      cartEl.classList.remove('bounce');
      cartEl.offsetHeight;
      cartEl.classList.add('bounce');
      // Update badge
      cartCount++;
      badgeEl.textContent = cartCount;
    });
  }

  renderList();
})();
</script>
</body>
</html>
