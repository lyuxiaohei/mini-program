<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>意见反馈 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Type selector */
  .type-section {
    background: var(--card-bg);
    margin: var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .section-title {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
    margin-bottom: var(--space-lg);
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }
  .section-title svg { width: 18px; height: 18px; color: var(--primary-start); }

  .type-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-md);
  }
  .type-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: var(--space-md) 8px;
    background: var(--bg-input);
    border-radius: var(--radius-md);
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
  }
  .type-item:active { background: var(--border-divider); }
  .type-item.selected {
    background: var(--selected-bg);
    border-color: var(--primary-start);
  }
  .type-icon {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: var(--space-sm);
  }
  .type-icon svg { width: 20px; height: 20px; color: var(--card-bg); }
  .type-name {
    font-size: var(--font-sm);
    color: var(--text-secondary);
  }
  .type-item.selected .type-name { color: var(--primary-start); font-weight: 500; }

  /* Content input */
  .content-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .content-textarea {
    width: 100%;
    height: 150px;
    border: none;
    outline: none;
    resize: none;
    font-size: var(--font-base);
    color: var(--text-color);
    line-height: 1.6;
    background: var(--bg-input);
    border-radius: var(--radius-sm);
    padding: var(--space-md);
  }
  .content-textarea::placeholder { color: var(--text-muted); }
  .content-count {
    text-align: right;
    font-size: var(--font-sm);
    color: var(--text-muted);
    margin-top: var(--space-sm);
  }

  /* Image upload */
  .image-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .image-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-md);
  }
  .image-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg-input);
  }
  .image-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .image-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .image-item .remove-btn svg { width: 12px; height: 12px; color: var(--card-bg); }
  .image-upload {
    aspect-ratio: 1;
    border-radius: var(--radius-sm);
    border: 2px dashed var(--text-disabled);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .image-upload:active { background: var(--bg-color); }
  .image-upload svg { width: 24px; height: 24px; color: var(--text-light); margin-bottom: var(--space-xs); }
  .image-upload span { font-size: var(--font-sm); color: var(--text-muted); }

  /* Contact info */
  .contact-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .contact-input {
    width: 100%;
    border: none;
    outline: none;
    font-size: var(--font-base);
    color: var(--text-color);
    background: var(--bg-input);
    border-radius: var(--radius-sm);
    padding: var(--space-md);
  }
  .contact-input::placeholder { color: var(--text-muted); }
  .contact-tip {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    margin-top: var(--space-sm);
  }

  /* Submit */
  .submit-section {
    padding: var(--space-lg) 12px 32px;
  }
  .btn-submit {
    width: 100%;
    height: 48px;
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    border: none;
    border-radius: var(--radius-xl);
    font-size: var(--font-md);
    font-weight: 600;
    cursor: pointer;
  }
  .btn-submit:active { opacity: 0.85; }
  .btn-submit:disabled {
    background: var(--text-light);
    cursor: not-allowed;
  }

  /* History */
  .history-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-lg) 16px;
    border-bottom: 1px solid var(--bg-color);
    cursor: pointer;
  }
  .history-header:active { background: var(--hover-bg); }
  .history-item {
    display: flex;
    align-items: flex-start;
    padding: var(--space-lg) 16px;
    border-bottom: 1px solid var(--bg-color);
    gap: var(--space-md);
  }
  .history-item:last-child { border-bottom: none; }
  .history-type {
    width: 36px;
    height: 36px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .history-type svg { width: 18px; height: 18px; color: var(--card-bg); }
  .history-info { flex: 1; }
  .history-title {
    font-size: var(--font-base);
    color: var(--text-color);
    margin-bottom: var(--space-xs);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-status {
    font-size: var(--font-sm);
    padding: 2px var(--space-sm);
    border-radius: var(--radius-md);
  }
  .history-status.processing {
    background: var(--warning-bg);
    color: var(--warning-color);
  }
  .history-status.replied {
    background: var(--success-bg);
    color: var(--success-color);
  }
  .history-content {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .history-time {
    font-size: var(--font-sm);
    color: var(--text-muted);
    margin-top: var(--space-xs);
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">意见反馈</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 16px;">

    <!-- Feedback Type -->
    <div class="type-section">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        反馈类型
      </div>
      <div class="type-grid" id="typeGrid">
        <div class="type-item" data-type="bug">
          <div class="type-icon" style="background: linear-gradient(135deg, var(--error-light), var(--price-color));">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          </div>
          <span class="type-name">功能异常</span>
        </div>
        <div class="type-item" data-type="suggest">
          <div class="type-icon" style="background: linear-gradient(135deg, var(--warning-color), var(--warning-dark));">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
          </div>
          <span class="type-name">产品建议</span>
        </div>
        <div class="type-item" data-type="complaint">
          <div class="type-icon" style="background: linear-gradient(135deg, var(--info-color), var(--info-color));">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <span class="type-name">投诉</span>
        </div>
        <div class="type-item" data-type="other">
          <div class="type-icon" style="background: linear-gradient(135deg, var(--text-secondary), var(--text-secondary));">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
          </div>
          <span class="type-name">其他</span>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="content-section">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        反馈内容
      </div>
      <textarea class="content-textarea" id="contentInput" placeholder="请详细描述您遇到的问题或建议，以便我们更好地为您服务..." maxlength="500"></textarea>
      <div class="content-count"><span id="contentCount">0</span>/500</div>
    </div>

    <!-- Images -->
    <div class="image-section">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        上传截图（选填）
      </div>
      <div class="image-grid" id="imageGrid">
        <div class="image-upload" id="uploadBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span>添加图片</span>
        </div>
      </div>
    </div>

    <!-- Contact -->
    <div class="contact-section">
      <div class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
        联系方式（选填）
      </div>
      <input type="text" class="contact-input" id="contactInput" placeholder="请输入手机号或邮箱，方便我们联系您">
      <div class="contact-tip">留下联系方式，我们将及时反馈处理结果</div>
    </div>

    <!-- Submit -->
    <div class="submit-section">
      <button class="btn-submit" id="submitBtn" disabled>提交反馈</button>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="history-header" onclick="alert('查看全部反馈记录')">
        <span class="section-title" style="margin-bottom:0;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          我的反馈记录
        </span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:16px;height:16px;color:var(--text-light);"><polyline points="9 18 15 12 9 6"/></svg>
      </div>
      <div id="historyList"></div>
    </div>

  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var selectedType = '';
  var images = [];
  var maxImages = 4;

  var typeGrid = document.getElementById('typeGrid');
  var contentInput = document.getElementById('contentInput');
  var contentCount = document.getElementById('contentCount');
  var imageGrid = document.getElementById('imageGrid');
  var uploadBtn = document.getElementById('uploadBtn');
  var submitBtn = document.getElementById('submitBtn');

  var historyList = [
    { type: 'bug', title: '功能异常', content: '登录页面无法正常显示验证码，点击获取验证码后没有反应...', time: '2026-04-05 14:30', status: 'replied' },
    { type: 'suggest', title: '产品建议', content: '希望增加商品对比功能，方便选择更合适的商品...', time: '2026-03-28 10:15', status: 'processing' }
  ];

  // Type selection
  typeGrid.querySelectorAll('.type-item').forEach(function(item) {
    item.addEventListener('click', function() {
      typeGrid.querySelectorAll('.type-item').forEach(function(i) { i.classList.remove('selected'); });
      this.classList.add('selected');
      selectedType = this.dataset.type;
      updateSubmitBtn();
    });
  });

  // Content input
  contentInput.addEventListener('input', function() {
    contentCount.textContent = this.value.length;
    updateSubmitBtn();
  });

  // Image upload
  uploadBtn.addEventListener('click', function() {
    if (images.length >= maxImages) {
      alert('最多上传' + maxImages + '张图片');
      return;
    }
    // Simulate image selection
    var mockImages = [
      '../images/unsplash/1602143407151-7111542de6e8.jpg',
      '../images/unsplash/1505740420928-5e560c06d30e.jpg'
    ];
    var img = mockImages[Math.floor(Math.random() * mockImages.length)];
    addImage(img);
  });

  function addImage(src) {
    images.push(src);
    renderImages();
    updateSubmitBtn();
  }

  function removeImage(index) {
    images.splice(index, 1);
    renderImages();
    updateSubmitBtn();
  }

  function renderImages() {
    var html = '';
    images.forEach(function(src, index) {
      html += '<div class="image-item">' +
        '<img src="' + src + '" alt="">' +
        '<div class="remove-btn" onclick="window.removeImage(' + index + ')">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</div>' +
      '</div>';
    });
    if (images.length < maxImages) {
      html += '<div class="image-upload" id="uploadBtn" onclick="document.getElementById(\'uploadBtn\').click()">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
        '<span>添加图片</span>' +
      '</div>';
    }
    imageGrid.innerHTML = html;

    // Re-attach event listener
    var newUploadBtn = document.getElementById('uploadBtn');
    if (newUploadBtn) {
      newUploadBtn.addEventListener('click', function() {
        if (images.length >= maxImages) {
          alert('最多上传' + maxImages + '张图片');
          return;
        }
        var mockImages = [
          '../images/unsplash/1602143407151-7111542de6e8.jpg',
          '../images/unsplash/1505740420928-5e560c06d30e.jpg'
        ];
        var img = mockImages[Math.floor(Math.random() * mockImages.length)];
        addImage(img);
      });
    }
  }

  window.removeImage = removeImage;

  function updateSubmitBtn() {
    submitBtn.disabled = !(selectedType && contentInput.value.trim().length >= 10);
  }

  // Submit
  submitBtn.addEventListener('click', function() {
    if (this.disabled) return;
    alert('感谢您的反馈，我们会尽快处理');
    history.back();
  });

  // Render history
  function renderHistory() {
    var typeIcons = {
      'bug': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
      'suggest': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>',
      'complaint': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>',
      'other': '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>'
    };
    var typeColors = {
      'bug': 'background: linear-gradient(135deg, var(--error-light), var(--price-color));',
      'suggest': 'background: linear-gradient(135deg, var(--warning-color), var(--warning-dark));',
      'complaint': 'background: linear-gradient(135deg, var(--info-color), var(--info-color));',
      'other': 'background: linear-gradient(135deg, var(--text-secondary), var(--text-secondary));'
    };

    var html = '';
    historyList.forEach(function(item) {
      html += '<div class="history-item">' +
        '<div class="history-type" style="' + typeColors[item.type] + '">' + typeIcons[item.type] + '</div>' +
        '<div class="history-info">' +
          '<div class="history-title">' +
            item.title +
            '<span class="history-status ' + item.status + '">' + (item.status === 'replied' ? '已回复' : '处理中') + '</span>' +
          '</div>' +
          '<div class="history-content">' + item.content + '</div>' +
          '<div class="history-time">' + item.time + '</div>' +
        '</div>' +
      '</div>';
    });
    document.getElementById('historyList').innerHTML = html;
  }

  renderHistory();
})();
</script>
<script src="../js/theme-switcher.js"></script>
</body>
</html>
