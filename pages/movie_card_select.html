<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>选择电影次卡 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .sub-nav { background: #fff; }
  .page-body {
    background: #f5f5f5;
    min-height: calc(100vh - 88px);
    padding-bottom: 70px;
  }
  .card-section {
    background: #fff;
    padding: 12px;
    margin-bottom: 8px;
  }
  .card-section-title {
    font-size: 14px;
    font-weight: 500;
    color: #333;
    margin-bottom: 10px;
  }
  .card-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .movie-card {
    position: relative;
    display: flex;
    align-items: flex-start;
    border: 2px solid #eee;
    border-radius: 10px;
    padding: 10px 10px 10px 6px;
    cursor: pointer;
    transition: all .15s;
  }
  .movie-card:active { transform: scale(.97); }
  .movie-card.active {
    border-color: #ff6034;
    background: #fff8f5;
  }
  .movie-card .mc-radio {
    flex-shrink: 0;
    width: 18px; height: 18px;
    border: 2px solid #ccc;
    border-radius: 50%;
    margin: 2px 8px 0 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
  }
  .movie-card.active .mc-radio { border-color: #ff6034; }
  .movie-card .mc-radio::after {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: transparent;
    transition: all .15s;
  }
  .movie-card.active .mc-radio::after { background: #ff6034; }
  .movie-card .mc-body { flex: 1; min-width: 0; position: relative; }
  .movie-card .mc-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 24px;
  }
  .movie-card .mc-detail-btn {
    position: absolute;
    right: 0;
    top: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ccc;
    cursor: pointer;
  }
  .movie-card .mc-detail-btn:active { color: #999; }
  .movie-card .mc-detail-btn svg { width: 16px; height: 16px; }
  .movie-card .mc-name {
    font-size: 13px;
    font-weight: 600;
    color: #333;
  }
  .movie-card.active .mc-name { color: #ff6034; }
  .movie-card .mc-badge {
    font-size: 9px;
    padding: 1px 5px;
    border-radius: 3px;
    background: #ff6034;
    color: #fff;
  }
  .movie-card .mc-info {
    font-size: 11px;
    color: #999;
    margin-top: 2px;
  }
  .movie-card .mc-info b { color: #333; }
  .movie-card.active .mc-info b { color: #ff6034; }
  .movie-card .mc-expire {
    font-size: 10px;
    color: #bbb;
    margin-top: 2px;
  }
  .movie-card .mc-expire.expiring-soon { color: #e65100; }
  .confirm-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    padding: 8px 12px 12px;
    border-top: 1px solid #eee;
    z-index: 200;
  }
  .confirm-bar .btn-confirm {
    width: 100%;
    height: 44px;
    border: none;
    border-radius: 22px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
  }
  .confirm-bar .btn-confirm:active { opacity: .85; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>
  <div class="sub-nav">
    <div class="nav-bar">
      <div class="back-btn" onclick="goBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">选择电影次卡</span>
    </div>
  </div>
  <div class="page-body">
    <div class="card-section">
      <div class="card-section-title">可用电影次卡</div>
      <div class="card-grid" id="cardGrid"></div>
    </div>
  </div>
  <div class="confirm-bar">
    <button class="btn-confirm" onclick="confirmSelect()">确认选择</button>
  </div>
</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var MOVIE_CARDS = [
    { id: 'M001', name: '单人观影次卡', remaining: 3, pricePerUse: 3500, expireDate: '2026-12-31 23:59:59' },
    { id: 'M002', name: 'VIP观影次卡', remaining: 1, pricePerUse: 6000, expireDate: '2026-09-30 23:59:59' }
  ];

  var selectedCard = null;
  var prevSelection = localStorage.getItem('selected_movie_card_id');
  selectedCard = prevSelection || null;

  function getCard(id) {
    for (var i = 0; i < MOVIE_CARDS.length; i++) {
      if (MOVIE_CARDS[i].id === id) return MOVIE_CARDS[i];
    }
    return null;
  }

  function renderCards() {
    var html = '';
    // "Not using" option
    html += '<div class="movie-card' + (selectedCard === null ? ' active' : '') + '" data-id="" onclick="selectCard(this)">';
    html += '<div class="mc-radio"></div>';
    html += '<div class="mc-body"><div class="mc-header"><span class="mc-name">不使用电影次卡</span></div>';
    html += '<div class="mc-info">不使用电影次卡抵扣</div>';
    html += '</div></div>';

    MOVIE_CARDS.forEach(function(c) {
      var isActive = c.id === selectedCard;
      html += '<div class="movie-card' + (isActive ? ' active' : '') + '" data-id="' + c.id + '">';
      html += '<div class="mc-radio" onclick="selectCard(this.parentElement)"></div>';
      html += '<div class="mc-body">';
      html += '<div class="mc-detail-btn" onclick="event.stopPropagation();goToDetail(\'' + c.id + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></div>';
      html += '<div class="mc-header" onclick="selectCard(this.parentElement.parentElement)"><span class="mc-name">' + c.name + '</span>';
      if (isActive) html += '<span class="mc-badge">已选</span>';
      html += '</div>';
      html += '<div class="mc-info" onclick="selectCard(this.parentElement.parentElement)">剩余 <b>' + c.remaining + '</b> 次，每次价值 <b>¥' + (c.pricePerUse / 100).toFixed(0) + '</b></div>';
      var diffMs = new Date(c.expireDate).getTime() - Date.now();
      var diffDays = Math.ceil(diffMs / 86400000);
      if (diffDays <= 30) {
        html += '<div class="mc-expire expiring-soon" onclick="selectCard(this.parentElement.parentElement)">' + diffDays + '天后过期</div>';
      } else {
        html += '<div class="mc-expire" onclick="selectCard(this.parentElement.parentElement)">在' + c.expireDate + '前有效</div>';
      }
      html += '</div></div>';
    });
    document.getElementById('cardGrid').innerHTML = html;
  }

  window.selectCard = function(el) {
    var id = el.dataset.id;
    if (id === '') { selectedCard = null; }
    else { selectedCard = selectedCard === id ? null : id; }
    renderCards();
  };

  window.confirmSelect = function() {
    if (selectedCard) {
      localStorage.setItem('selected_movie_card_id', selectedCard);
    } else {
      localStorage.removeItem('selected_movie_card_id');
    }
    location.href = 'order_movie.html';
  };

  window.goBack = function() {
    location.href = 'order_movie.html';
  };

  window.goToDetail = function(id) {
    localStorage.setItem('movie_pass_detail_id', id);
    location.href = 'movie_pass_detail.html';
  };

  renderCards();
})();
</script>
</body>
</html>
