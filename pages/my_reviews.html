<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的评价 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Filter tabs */
  .filter-bar {
    display: flex;
    background: var(--card-bg);
    padding: var(--space-md) 12px;
    gap: var(--space-sm);
    border-bottom: 1px solid var(--border-divider);
    position: sticky;
    top: 88px;
    z-index: 50;
  }
  .filter-tag {
    padding: var(--space-xs) var(--space-lg);
    border-radius: var(--radius-lg);
    font-size: var(--font-sm);
    color: var(--text-secondary);
    background: var(--bg-color);
    cursor: pointer;
  }
  .filter-tag:active { opacity: 0.7; }
  .filter-tag.active {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
  }

  /* Review card */
  .review-list { padding: var(--space-md); }
  .review-card {
    background: var(--card-bg);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-md);
    overflow: hidden;
  }
  .review-card-product {
    display: flex;
    align-items: center;
    padding: var(--space-md);
    gap: var(--space-md);
    border-bottom: 1px solid var(--bg-color);
  }
  .review-card-product .prod-img {
    width: 64px;
    height: 64px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg-input);
  }
  .review-card-product .prod-img img { width: 100%; height: 100%; object-fit: cover; }
  .review-card-product .prod-info { flex: 1; min-width: 0; }
  .review-card-product .prod-name {
    font-size: var(--font-sm);
    color: var(--text-color);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: var(--space-xs);
  }
  .review-card-product .prod-spec {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }

  /* Review content area */
  .review-content-area {
    padding: var(--space-md);
    background: var(--hover-bg);
  }
  .review-stars {
    display: flex;
    gap: 2px;
    margin-bottom: var(--space-sm);
  }
  .review-stars .star { font-size: var(--font-base); color: var(--primary-start); }
  .review-stars .star.empty { color: var(--text-disabled); }
  .review-text {
    font-size: var(--font-sm);
    color: var(--text-color);
    line-height: 1.6;
    margin-bottom: var(--space-sm);
  }
  .review-images {
    display: flex;
    gap: var(--space-sm);
    flex-wrap: wrap;
    margin-bottom: var(--space-sm);
  }
  .review-images img {
    width: 60px;
    height: 60px;
    border-radius: var(--radius-xs);
    object-fit: cover;
  }
  .review-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .review-date {
    font-size: var(--font-sm);
    color: var(--text-muted);
  }
  .btn-append {
    font-size: var(--font-sm);
    color: var(--primary-start);
    border: 1px solid var(--primary-start);
    background: var(--card-bg);
    padding: var(--space-xs) var(--space-md);
    border-radius: var(--radius-md);
    cursor: pointer;
  }
  .btn-append:active { opacity: 0.7; }

  /* Append review area */
  .append-section {
    border-top: 1px dashed var(--border-color);
    padding: var(--space-md) 12px;
    background: var(--hover-bg);
  }
  .append-label {
    font-size: var(--font-sm);
    color: var(--primary-start);
    font-weight: 500;
    margin-bottom: var(--space-xs);
  }
  .append-text {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .append-date {
    font-size: var(--font-sm);
    color: var(--text-muted);
    margin-top: var(--space-xs);
  }

  /* Append popup */
  .append-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    justify-content: center;
    align-items: flex-end;
  }
  .append-overlay.show { display: flex; }
  .append-popup {
    background: var(--card-bg);
    width: 100%;
    max-width: 430px;
    border-radius: var(--radius-lg) 16px 0 0;
    padding: var(--space-xl) 16px 24px;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .append-popup-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-lg);
  }
  .append-popup-header .title {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
  }
  .append-popup-header .close-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-tertiary);
  }
  .append-textarea {
    width: 100%;
    height: 100px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: var(--space-md);
    font-size: var(--font-sm);
    color: var(--text-color);
    resize: none;
    outline: none;
    box-sizing: border-box;
  }
  .append-textarea:focus { border-color: var(--primary-start); }
  .char-count {
    text-align: right;
    font-size: var(--font-sm);
    color: var(--text-muted);
    margin-top: var(--space-xs);
  }
  .append-submit {
    display: block;
    width: 100%;
    padding: var(--space-md);
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    font-size: var(--font-base);
    font-weight: 500;
    border: none;
    border-radius: var(--radius-xl);
    margin-top: var(--space-lg);
    cursor: pointer;
  }
  .append-submit:active { opacity: 0.8; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px var(--space-xl);
    color: var(--text-tertiary);
  }
  .empty-state svg { width: 60px; height: 60px; color: var(--text-disabled); margin-bottom: var(--space-md); }
  .empty-state .empty-text { font-size: var(--font-sm); }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">我的评价</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Filter -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-tag active" data-filter="all">全部</div>
    <div class="filter-tag" data-filter="good">好评</div>
    <div class="filter-tag" data-filter="mid">中评</div>
    <div class="filter-tag" data-filter="bad">差评</div>
  </div>

  <!-- Review List -->
  <div class="page-scroll" style="padding-bottom:16px;">
    <div class="review-list" id="reviewList"></div>
  </div>

  <!-- Append Review Popup -->
  <div class="append-overlay" id="appendOverlay">
    <div class="append-popup">
      <div class="append-popup-header">
        <span class="title">追加评价</span>
        <div class="close-btn" onclick="closeAppendPopup()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </div>
      </div>
      <textarea class="append-textarea" id="appendText" maxlength="200" placeholder="对之前的评价做补充..."></textarea>
      <div class="char-count"><span id="appendCharCount">0</span>/200</div>
      <button class="append-submit" onclick="submitAppend()">提交追加评价</button>
    </div>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var reviews = [
    {
      id: 1,
      name: '纯棉短袖T恤男女款 夏季宽松百搭潮流',
      spec: '白色 L码',
      img: '../images/unsplash/1521572163474-6864f9cf17ab.jpg',
      stars: 5,
      text: '面料很舒服，颜色和图片一样，尺码标准，物流也很快，下次还会回购！',
      images: ['../images/unsplash/1521572163474-6864f9cf17ab.jpg'],
      date: '2026-03-25',
      append: null
    },
    {
      id: 2,
      name: '时尚运动鞋 透气网面跑步鞋轻便缓震',
      spec: '黑色 42码',
      img: '../images/unsplash/1542291026-7eec264c27ff.jpg',
      stars: 4,
      text: '鞋子很轻便，穿着舒服，透气性好，就是颜色稍微有点偏差。',
      images: [],
      date: '2026-03-18',
      append: {
        text: '穿了一周了，鞋底耐磨性不错，跑了3次步都很舒服，推荐购买。',
        date: '2026-04-01'
      }
    },
    {
      id: 3,
      name: '精致蛋糕礼盒 手工制作生日庆典甜品',
      spec: '草莓味 8寸',
      img: '../images/unsplash/1578985545062-69928b1d9587.jpg',
      stars: 5,
      text: '蛋糕颜值超高，口感细腻不甜腻，朋友生日送的很有面子，包装也很精美！',
      images: ['../images/unsplash/1578985545062-69928b1d9587.jpg', '../images/unsplash/product_cake_800x1200.jpg'],
      date: '2026-03-10',
      append: null
    },
    {
      id: 4,
      name: '日本进口保温杯 不锈钢真空便携水杯500ml',
      spec: '白色 500ml',
      img: '../images/unsplash/1602143407151-7111542de6e8.jpg',
      stars: 5,
      text: '保温效果非常好，早上装的热水到晚上还是温的，外观有质感，值得购买！',
      images: ['../images/unsplash/product_watch_800x1200.jpg'],
      date: '2026-02-28',
      append: {
        text: '用了两个月依然保温很好，盖子密封性也没问题，质量靠谱。',
        date: '2026-04-15'
      }
    },
    {
      id: 5,
      name: '潮流太阳眼镜 防紫外线偏光墨镜',
      spec: '黑色',
      img: '../images/unsplash/1572635196237-14b3f281503f.jpg',
      stars: 3,
      text: '镜片质量还行，但是镜框有点松，戴久了会往下滑，性价比一般。',
      images: [],
      date: '2026-02-15',
      append: null
    },
    {
      id: 6,
      name: '无线蓝牙降噪耳机 迷你入耳式超长续航',
      spec: '黑色 标准版',
      img: '../images/unsplash/1505740420928-5e560c06d30e.jpg',
      stars: 2,
      text: '降噪效果不明显，续航也没有宣传的那么长，有点失望。',
      images: [],
      date: '2026-02-01',
      append: {
        text: '用了几天左耳接触不良，已联系客服申请售后处理。',
        date: '2026-02-10'
      }
    },
    {
      id: 7,
      name: '智能手表 多功能运动健康监测手环',
      spec: '黑色 标准版',
      img: '../images/unsplash/1523275335684-37898b6baf30.jpg',
      stars: 5,
      text: '功能很全，心率监测和睡眠分析都比较准，运动模式丰富，续航大概5天。',
      images: ['../images/unsplash/product_sneaker_800x1200.jpg', '../images/unsplash/product_headphone_800x1200.jpg'],
      date: '2026-01-20',
      append: null
    }
  ];

  var currentFilter = 'all';
  var appendingId = null;

  function renderStars(count) {
    var html = '';
    for (var i = 0; i < 5; i++) {
      html += '<span class="star ' + (i < count ? '' : 'empty') + '">★</span>';
    }
    return html;
  }

  function getFiltered() {
    return reviews.filter(function(r) {
      if (currentFilter === 'good') return r.stars >= 4;
      if (currentFilter === 'mid') return r.stars === 3;
      if (currentFilter === 'bad') return r.stars <= 2;
      return true;
    });
  }

  function renderList() {
    var list = document.getElementById('reviewList');
    var data = getFiltered();

    if (data.length === 0) {
      list.innerHTML = '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' +
        '<div class="empty-text">暂无评价记录</div>' +
      '</div>';
      return;
    }

    var html = '';
    data.forEach(function(r) {
      var imagesHtml = '';
      if (r.images && r.images.length > 0) {
        imagesHtml = '<div class="review-images">';
        r.images.forEach(function(img) {
          imagesHtml += '<img src="' + img + '" alt="">';
        });
        imagesHtml += '</div>';
      }

      var appendHtml = '';
      if (r.append) {
        appendHtml = '<div class="append-section">' +
          '<div class="append-label">追加评价</div>' +
          '<div class="append-text">' + r.append.text + '</div>' +
          '<div class="append-date">' + r.append.date + '</div>' +
        '</div>';
      }

      html += '<div class="review-card">' +
        '<a href="product_detail.html" class="review-card-product" style="text-decoration:none;color:inherit;">' +
          '<div class="prod-img"><img src="' + r.img + '" alt=""></div>' +
          '<div class="prod-info">' +
            '<div class="prod-name">' + r.name + '</div>' +
            '<div class="prod-spec">' + r.spec + '</div>' +
          '</div>' +
        '</a>' +
        '<div class="review-content-area">' +
          '<div class="review-stars">' + renderStars(r.stars) + '</div>' +
          '<div class="review-text">' + r.text + '</div>' +
          imagesHtml +
          '<div class="review-meta">' +
            '<span class="review-date">' + r.date + '</span>' +
            '<button class="btn-append" data-id="' + r.id + '">' +
              (r.append ? '已追评' : '追加评价') +
            '</button>' +
          '</div>' +
        '</div>' +
        appendHtml +
      '</div>';
    });
    list.innerHTML = html;

    // Bind append buttons
    document.querySelectorAll('.btn-append').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        e.preventDefault();
        var id = parseInt(this.dataset.id);
        var review = reviews.find(function(r) { return r.id === id; });
        if (review && !review.append) {
          openAppendPopup(id);
        }
      });
    });
  }

  function openAppendPopup(id) {
    appendingId = id;
    document.getElementById('appendText').value = '';
    document.getElementById('appendCharCount').textContent = '0';
    document.getElementById('appendOverlay').classList.add('show');
  }

  window.closeAppendPopup = function() {
    document.getElementById('appendOverlay').classList.remove('show');
    appendingId = null;
  };

  document.getElementById('appendText').addEventListener('input', function() {
    document.getElementById('appendCharCount').textContent = this.value.length;
  });

  window.submitAppend = function() {
    var text = document.getElementById('appendText').value.trim();
    if (!text) {
      alert('请输入追加评价内容');
      return;
    }
    var review = reviews.find(function(r) { return r.id === appendingId; });
    if (review) {
      var today = new Date();
      var dateStr = today.getFullYear() + '-' +
        String(today.getMonth() + 1).padStart(2, '0') + '-' +
        String(today.getDate()).padStart(2, '0');
      review.append = { text: text, date: dateStr };
    }
    closeAppendPopup();
    renderList();
    alert('追加评价成功！');
  };

  // Close popup on overlay click
  document.getElementById('appendOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeAppendPopup();
  });

  // Filter
  document.querySelectorAll('.filter-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      document.querySelectorAll('.filter-tag').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderList();
    });
  });

  renderList();
})();
</script>
<script src="../js/theme-switcher.js"></script>
</body>
</html>
