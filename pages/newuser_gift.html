<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>新人专享 - 福利商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Header */
  .newuser-header {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    padding: var(--space-xl) var(--space-lg);
    text-align: center;
    color: var(--card-bg);
    position: relative;
    overflow: hidden;
  }
  .newuser-header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -30%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.15), transparent);
    border-radius: 50%;
  }
  .newuser-header::after {
    content: '';
    position: absolute;
    bottom: -40%;
    right: -20%;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle, rgba(255,255,255,0.1), transparent);
    border-radius: 50%;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: var(--space-sm);
    background: rgba(255,255,255,0.2);
    padding: var(--space-sm) 14px;
    border-radius: var(--radius-xl);
    font-size: var(--font-sm);
    margin-bottom: var(--space-md);
  }
  .header-badge svg { width: 16px; height: 16px; }
  .header-title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: var(--space-sm);
    position: relative;
    z-index: 1;
  }
  .header-subtitle {
    font-size: var(--font-base);
    opacity: 0.9;
    position: relative;
    z-index: 1;
  }

  /* Gift pack card */
  .gift-card {
    background: var(--card-bg);
    margin: -20px var(--space-md) var(--space-md);
    border-radius: var(--radius-lg);
    overflow: hidden;
    position: relative;
    z-index: 1;
    box-shadow: var(--shadow-lg);
  }
  .gift-header {
    background: linear-gradient(135deg, var(--selected-bg), var(--selected-bg));
    padding: var(--space-lg);
    display: flex;
    align-items: center;
    gap: var(--space-lg);
  }
  .gift-icon {
    width: 64px;
    height: 64px;
    border-radius: var(--radius-lg);
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 12px rgba(238, 10, 36, 0.3);
  }
  .gift-icon svg { width: 36px; height: 36px; color: var(--card-bg); }
  .gift-info { flex: 1; }
  .gift-title {
    font-size: var(--font-lg);
    font-weight: 700;
    color: var(--text-color);
    margin-bottom: var(--space-xs);
  }
  .gift-value {
    font-size: var(--font-base);
    color: var(--primary-start);
    font-weight: 600;
  }
  .gift-status {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    border: none;
    padding: var(--space-md) 24px;
    border-radius: var(--radius-xl);
    font-size: var(--font-base);
    font-weight: 600;
    cursor: pointer;
  }
  .gift-status:active { opacity: 0.85; }
  .gift-status.received {
    background: var(--bg-color);
    color: var(--text-tertiary);
  }

  .gift-content {
    padding: var(--space-lg);
  }
  .gift-items {
    display: flex;
    gap: var(--space-md);
  }
  .gift-item {
    flex: 1;
    text-align: center;
    padding: var(--space-lg) var(--space-sm);
    background: var(--hover-bg);
    border-radius: var(--radius-md);
  }
  .gift-item-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--selected-bg), var(--selected-bg));
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto var(--space-sm);
  }
  .gift-item-icon svg { width: 20px; height: 20px; color: var(--primary-start); }
  .gift-item-name {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-bottom: var(--space-xs);
  }
  .gift-item-value {
    font-size: var(--font-lg);
    font-weight: 700;
    color: var(--primary-start);
  }

  /* Tasks section */
  .tasks-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .section-title {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
    margin-bottom: var(--space-lg);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .section-title svg { width: 18px; height: 18px; color: var(--primary-start); }

  .task-item {
    display: flex;
    align-items: center;
    padding: var(--space-lg);
    background: var(--hover-bg);
    border-radius: var(--radius-md);
    margin-bottom: var(--space-md);
  }
  .task-item:last-child { margin-bottom: 0; }
  .task-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: var(--space-md);
  }
  .task-icon svg { width: 22px; height: 22px; color: var(--card-bg); }
  .task-info { flex: 1; }
  .task-title {
    font-size: var(--font-base);
    font-weight: 600;
    color: var(--text-color);
    margin-bottom: var(--space-xs);
  }
  .task-desc {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }
  .task-reward {
    font-size: var(--font-base);
    color: var(--primary-start);
    font-weight: 600;
    margin-right: var(--space-md);
  }
  .task-btn {
    padding: var(--space-sm) var(--space-lg);
    border-radius: var(--radius-lg);
    font-size: var(--font-sm);
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
  }
  .task-btn:active { opacity: 0.85; }
  .task-btn.done {
    background: var(--bg-color);
    color: var(--text-tertiary);
  }

  /* Exclusive products */
  .products-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .product-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-md);
  }
  .product-item {
    background: var(--hover-bg);
    border-radius: var(--radius-md);
    overflow: hidden;
    cursor: pointer;
  }
  .product-item:active { opacity: 0.95; }
  .product-img {
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
  }
  .product-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .product-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    font-size: var(--font-xs);
    padding: 2px var(--space-sm);
    border-radius: var(--radius-md);
  }
  .product-info {
    padding: var(--space-md);
  }
  .product-name {
    font-size: var(--font-sm);
    color: var(--text-color);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    height: 36px;
  }
  .product-price-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-top: var(--space-sm);
  }
  .product-price {
    font-size: var(--font-md);
    font-weight: 700;
    color: var(--primary-start);
  }
  .product-price small { font-size: var(--font-sm); }
  .product-original {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    text-decoration: line-through;
  }

  /* Tips */
  .tips-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .tip-item {
    display: flex;
    align-items: flex-start;
    gap: var(--space-sm);
    padding: var(--space-sm) 0;
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .tip-item::before {
    content: '*';
    color: var(--primary-start);
    font-weight: 700;
  }

  /* Progress bar */
  .progress-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .progress-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: var(--space-md);
  }
  .progress-title {
    font-size: var(--font-base);
    color: var(--text-color);
    font-weight: 600;
  }
  .progress-text {
    font-size: var(--font-sm);
    color: var(--primary-start);
  }
  .progress-bar {
    height: 8px;
    background: var(--bg-color);
    border-radius: var(--radius-xs);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-start), var(--price-color));
    border-radius: var(--radius-xs);
    transition: width 0.3s;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">新人专享</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 16px;">

    <!-- Header -->
    <div class="newuser-header">
      <div class="header-badge">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        新用户专属福利
      </div>
      <div class="header-title">新人礼包</div>
      <div class="header-subtitle">注册即享超值好礼，限时领取</div>
    </div>

    <!-- Gift Pack -->
    <div class="gift-card">
      <div class="gift-header">
        <div class="gift-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>
        </div>
        <div class="gift-info">
          <div class="gift-title">新人大礼包</div>
          <div class="gift-value">总价值 &yen;188</div>
        </div>
        <button class="gift-status" id="receiveBtn">立即领取</button>
      </div>
      <div class="gift-content">
        <div class="gift-items">
          <div class="gift-item">
            <div class="gift-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </div>
            <div class="gift-item-name">积分</div>
            <div class="gift-item-value">500</div>
          </div>
          <div class="gift-item">
            <div class="gift-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            </div>
            <div class="gift-item-name">优惠券</div>
            <div class="gift-item-value">3张</div>
          </div>
          <div class="gift-item">
            <div class="gift-item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div class="gift-item-name">免邮券</div>
            <div class="gift-item-value">1张</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Tasks -->
    <div class="tasks-section">
      <div class="section-title">
        <span>新人任务</span>
        <span style="font-size:var(--font-sm);color:var(--text-tertiary);">完成任务享更多福利</span>
      </div>
      <div class="task-item">
        <div class="task-icon" style="background: linear-gradient(135deg, var(--success-color), var(--success-dark));">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
        <div class="task-info">
          <div class="task-title">完善个人信息</div>
          <div class="task-desc">填写真实姓名、手机号等信息</div>
        </div>
        <span class="task-reward">+50积分</span>
        <button class="task-btn" onclick="location.href='profile_edit.html'">去完成</button>
      </div>
      <div class="task-item">
        <div class="task-icon" style="background: linear-gradient(135deg, var(--info-color), var(--info-color));">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        </div>
        <div class="task-info">
          <div class="task-title">完成首单购物</div>
          <div class="task-desc">任意商品下单即可完成</div>
        </div>
        <span class="task-reward">+100积分</span>
        <button class="task-btn" onclick="location.href='home_page.html'">去购物</button>
      </div>
      <div class="task-item">
        <div class="task-icon" style="background: linear-gradient(135deg, var(--warning-color), var(--warning-dark));">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 9V5a3 3 0 00-3-3l-4 9v11h11.28a2 2 0 002-1.7l1.38-9a2 2 0 00-2-2.3zM7 22H4a2 2 0 01-2-2v-7a2 2 0 012-2h3"/></svg>
        </div>
        <div class="task-info">
          <div class="task-title">发表商品评价</div>
          <div class="task-desc">对已购商品发表真实评价</div>
        </div>
        <span class="task-reward">+20积分</span>
        <button class="task-btn done">已完成</button>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-title">新人任务进度</span>
        <span class="progress-text">1/3 已完成</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 33%;"></div>
      </div>
    </div>

    <!-- Exclusive Products -->
    <div class="products-section">
      <div class="section-title">
        <span>新人专享价</span>
        <span style="font-size:var(--font-sm);color:var(--text-tertiary);">仅限新用户购买</span>
      </div>
      <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Tips -->
    <div class="tips-section">
      <div class="section-title">活动说明</div>
      <div class="tip-item">新用户指注册后7天内未完成首单的用户</div>
      <div class="tip-item">新人礼包每个用户仅可领取一次</div>
      <div class="tip-item">积分及优惠券有效期为领取后30天内</div>
      <div class="tip-item">新人专享商品每人限购1件</div>
    </div>

  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var products = [
    { name: '无线蓝牙耳机', price: 29.9, original: 99, img: '../images/unsplash/1505740420928-5e560c06d30e.jpg' },
    { name: '便携保温杯', price: 19.9, original: 68, img: '../images/unsplash/1602143407151-7111542de6e8.jpg' },
    { name: '潮流太阳镜', price: 15.9, original: 59, img: '../images/unsplash/1572635196237-14b3f281503f.jpg' },
    { name: '纯棉T恤', price: 9.9, original: 39, img: '../images/unsplash/1521572163474-6864f9cf17ab.jpg' }
  ];

  var productGrid = document.getElementById('productGrid');
  var html = '';
  products.forEach(function(item) {
    html += '<a href="product_detail.html" class="product-item">' +
      '<div class="product-img">' +
        '<img src="' + item.img + '" alt="">' +
        '<span class="product-badge">新人价</span>' +
      '</div>' +
      '<div class="product-info">' +
        '<div class="product-name">' + item.name + '</div>' +
        '<div class="product-price-row">' +
          '<span class="product-price"><small>&yen;</small>' + item.price + '</span>' +
          '<span class="product-original">&yen;' + item.original + '</span>' +
        '</div>' +
      '</div>' +
    '</a>';
  });
  productGrid.innerHTML = html;

  // Receive button
  var receiveBtn = document.getElementById('receiveBtn');
  receiveBtn.addEventListener('click', function() {
    if (this.classList.contains('received')) return;
    alert('领取成功！积分和优惠券已发放到您的账户');
    this.classList.add('received');
    this.textContent = '已领取';
  });
})();
</script>
<script src="../js/theme-switcher.js"></script>
</body>
</html>
