<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>确认订单 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Address section */
  .address-section {
    background: #fff;
    padding: 14px 12px;
    margin-bottom: 8px;
    position: relative;
    cursor: pointer;
  }
  .address-section:active { background: #fafafa; }
  .address-section::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: repeating-linear-gradient(90deg, #ff6034 0, #ff6034 8px, #ee0a24 8px, #ee0a24 16px, #ff9800 16px, #ff9800 24px);
  }
  .address-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .address-row svg { width: 20px; height: 20px; color: #ff6034; flex-shrink: 0; margin-top: 2px; }
  .address-info { flex: 1; }
  .address-name-phone {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
  }
  .address-detail {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
  }
  .address-arrow {
    display: flex;
    align-items: center;
    color: #ccc;
    align-self: center;
  }
  .address-arrow svg { width: 16px; height: 16px; color: #ccc; }

  /* Product items */
  .order-products {
    background: #fff;
    padding: 12px;
    margin-bottom: 8px;
  }
  .order-product-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .order-product-item:last-child { border-bottom: none; }
  .order-product-item .prod-img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .order-product-item .prod-img img { width: 100%; height: 100%; object-fit: cover; }
  .order-product-item .prod-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .order-product-item .prod-name {
    font-size: 13px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .order-product-item .prod-spec {
    font-size: 11px;
    color: #999;
  }
  .order-product-item .prod-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .order-product-item .prod-price {
    color: #333;
    font-size: 14px;
    font-weight: 600;
  }
  .order-product-item .prod-qty {
    font-size: 13px;
    color: #999;
  }

  /* Quantity control */
  .qty-control {
    display: flex;
    align-items: center;
  }
  .qty-btn {
    width: 24px;
    height: 24px;
    border: 1px solid #ddd;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #666;
    cursor: pointer;
  }
  .qty-btn:first-child { border-radius: 4px 0 0 4px; }
  .qty-btn:last-child { border-radius: 0 4px 4px 0; }
  .qty-btn:active { background: #f5f5f5; }
  .qty-btn.disabled { color: #ddd; pointer-events: none; }
  .qty-num {
    width: 32px;
    height: 24px;
    border-top: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #333;
  }

  /* Options section */
  .order-options {
    background: #fff;
    margin-bottom: 8px;
  }
  .option-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    border-bottom: 1px solid #f5f5f5;
    cursor: pointer;
  }
  .option-item:last-child { border-bottom: none; }
  .option-item:active { background: #fafafa; }
  .option-item .opt-label { font-size: 14px; color: #333; }
  .option-item .opt-value {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: #999;
  }
  .option-item .opt-value svg { width: 14px; height: 14px; }
  .option-item .opt-value.highlight { color: #ff6034; }

  /* Price summary */
  .price-summary {
    background: #fff;
    padding: 12px;
    margin-bottom: 8px;
  }
  .summary-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
    color: #666;
  }
  .summary-row.total {
    padding-top: 8px;
    margin-top: 4px;
    border-top: 1px solid #f5f5f5;
    font-size: 15px;
    color: #333;
    font-weight: 600;
  }
  .summary-row .total-price {
    color: #ee0a24;
    font-size: 18px;
    font-weight: 700;
  }
  .summary-row .total-price .symbol { font-size: 12px; }

  /* Submit bar */
  .submit-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    border-top: 1px solid #eee;
    z-index: 200;
    padding: 0 12px 8px;
  }
  .submit-bar .total-area {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .submit-bar .total-label { font-size: 14px; color: #333; }
  .submit-bar .total-num { font-size: 20px; color: #ee0a24; font-weight: 700; }
  .submit-bar .total-num .symbol { font-size: 12px; }
  .submit-bar .btn-submit {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    border: none;
    padding: 0 32px;
    height: 42px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 21px;
  }
  .submit-bar .btn-submit:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">确认订单</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 70px;">

    <!-- Address -->
    <div class="address-section" onclick="location.href='address.html'">
      <div class="address-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <div class="address-info">
          <div class="address-name-phone">张三  138****8888</div>
          <div class="address-detail">北京市朝阳区建国路88号 悦享大厦A座12层</div>
        </div>
        <div class="address-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>

    <!-- Products -->
    <div class="order-products" id="orderProducts">
      <div class="order-product-item" data-price="68" data-qty="1">
        <div class="prod-img"><img src="https://images.unsplash.com/photo-1602143407151-7111542de6e8?auto=format&fit=crop&w=200&h=200&q=80" alt=""></div>
        <div class="prod-info">
          <div class="prod-name">日本进口保温杯 不锈钢真空便携水杯500ml</div>
          <div class="prod-spec">白色 500ml</div>
          <div class="prod-price-row">
            <span class="prod-price">&yen;68.00</span>
            <div class="qty-control">
              <div class="qty-btn disabled" data-action="minus">-</div>
              <div class="qty-num">1</div>
              <div class="qty-btn" data-action="plus">+</div>
            </div>
          </div>
        </div>
      </div>
      <div class="order-product-item" data-price="89" data-qty="1">
        <div class="prod-img"><img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=200&h=200&q=80" alt=""></div>
        <div class="prod-info">
          <div class="prod-name">无线蓝牙降噪耳机 迷你入耳式超长续航</div>
          <div class="prod-spec">黑色 标准版</div>
          <div class="prod-price-row">
            <span class="prod-price">&yen;89.00</span>
            <div class="qty-control">
              <div class="qty-btn disabled" data-action="minus">-</div>
              <div class="qty-num">1</div>
              <div class="qty-btn" data-action="plus">+</div>
            </div>
          </div>
        </div>
      </div>
      <div class="order-product-item" data-price="39.9" data-qty="1">
        <div class="prod-img"><img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=200&h=200&q=80" alt=""></div>
        <div class="prod-info">
          <div class="prod-name">纯棉短袖T恤男女款 夏季宽松百搭潮流</div>
          <div class="prod-spec">白色 L码</div>
          <div class="prod-price-row">
            <span class="prod-price">&yen;39.90</span>
            <div class="qty-control">
              <div class="qty-btn disabled" data-action="minus">-</div>
              <div class="qty-num">1</div>
              <div class="qty-btn" data-action="plus">+</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Options -->
    <div class="order-options">
      <div class="option-item">
        <span class="opt-label">配送方式</span>
        <div class="opt-value">
          <span>快递 免邮</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
      <div class="option-item">
        <span class="opt-label">积分抵扣</span>
        <div class="opt-value highlight">
          <span>-&yen;5.00（5豆，优先消耗即将过期积分）</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
      <div class="option-item">
        <span class="opt-label">留言</span>
        <div class="opt-value">
          <span>选填：对本次交易的说明</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
      </div>
    </div>

    <!-- Price Summary -->
    <div class="price-summary">
      <div class="summary-row">
        <span>商品金额</span>
        <span id="goodsAmount">&yen;196.90</span>
      </div>
      <div class="summary-row">
        <span>运费</span>
        <span>&yen;0.00</span>
      </div>
      <div class="summary-row">
        <span>积分抵扣</span>
        <span style="color:#ff6034;">-&yen;5.00</span>
      </div>
      <div class="summary-row total">
        <span>实付金额</span>
        <span class="total-price" id="summaryTotal"><span class="symbol">&yen;</span>191.90</span>
      </div>
    </div>

  </div><!-- end page-scroll -->

  <!-- Submit Bar -->
  <div class="submit-bar">
    <div class="total-area">
      <span class="total-label">合计：</span>
      <span class="total-num" id="bottomTotal"><span class="symbol">&yen;</span>191.90</span>
    </div>
    <a href="payment.html" class="btn-submit" style="display:flex;align-items:center;justify-content:center;text-decoration:none;">立即支付</a>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var discount = 5.00;

  function updatePrices() {
    var total = 0;
    var items = document.querySelectorAll('.order-product-item');
    items.forEach(function(item) {
      var price = parseFloat(item.dataset.price);
      var qty = parseInt(item.dataset.qty);
      total += price * qty;
    });
    var finalAmount = total - discount;
    document.getElementById('goodsAmount').innerHTML = '&yen;' + total.toFixed(2);
    document.getElementById('summaryTotal').innerHTML = '<span class="symbol">&yen;</span>' + finalAmount.toFixed(2);
    document.getElementById('bottomTotal').innerHTML = '<span class="symbol">&yen;</span>' + finalAmount.toFixed(2);
  }

  document.querySelectorAll('.qty-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var item = this.closest('.order-product-item');
      var qty = parseInt(item.dataset.qty);
      var action = this.dataset.action;

      if (action === 'plus') {
        qty++;
      } else if (action === 'minus' && qty > 1) {
        qty--;
      }

      item.dataset.qty = qty;
      item.querySelector('.qty-num').textContent = qty;

      var minusBtn = item.querySelector('[data-action="minus"]');
      minusBtn.classList.toggle('disabled', qty <= 1);

      updatePrices();
    });
  });
})();
</script>
</body>
</html>
