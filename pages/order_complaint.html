<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>订单投诉 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .complaint-content {
    padding: 12px;
    padding-bottom: 100px;
  }

  /* Order card */
  .order-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .order-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid #f5f5f5;
    margin-bottom: 12px;
  }
  .order-no {
    font-size: 12px;
    color: #999;
  }
  .order-status {
    font-size: 12px;
    color: #ff9800;
    font-weight: 500;
  }
  .order-product {
    display: flex;
    gap: 12px;
  }
  .order-img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .order-img img { width: 100%; height: 100%; object-fit: cover; }
  .order-info { flex: 1; min-width: 0; }
  .order-name {
    font-size: 14px;
    color: #333;
    line-height: 1.4;
    margin-bottom: 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .order-spec {
    font-size: 12px;
    color: #999;
    margin-bottom: 6px;
  }
  .order-price {
    font-size: 14px;
    color: #ee0a24;
    font-weight: 600;
  }

  /* Section */
  .section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title svg { width: 18px; height: 18px; color: #ff6034; }

  /* Complaint type */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .type-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 8px;
    background: #f8f8f8;
    border-radius: 10px;
    cursor: pointer;
    border: 2px solid transparent;
  }
  .type-item:active { background: #f0f0f0; }
  .type-item.selected {
    background: #fff5f0;
    border-color: #ff6034;
  }
  .type-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    background: #eee;
  }
  .type-item.selected .type-icon {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
  }
  .type-icon svg { width: 18px; height: 18px; color: #999; }
  .type-item.selected .type-icon svg { color: #fff; }
  .type-name {
    font-size: 12px;
    color: #666;
  }
  .type-item.selected .type-name { color: #ff6034; font-weight: 500; }

  /* Target select */
  .target-options {
    display: flex;
    gap: 10px;
  }
  .target-option {
    flex: 1;
    padding: 12px;
    border: 2px solid #eee;
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
  }
  .target-option.selected {
    border-color: #ff6034;
    background: #fff5f0;
  }
  .target-option .target-name {
    font-size: 14px;
    color: #333;
    font-weight: 500;
  }
  .target-option.selected .target-name { color: #ff6034; }

  /* Description */
  .desc-textarea {
    width: 100%;
    height: 120px;
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    resize: none;
    outline: none;
    line-height: 1.6;
  }
  .desc-textarea:focus { border-color: #ff6034; }
  .desc-textarea::placeholder { color: #bbb; }
  .desc-count {
    text-align: right;
    font-size: 12px;
    color: #bbb;
    margin-top: 6px;
  }

  /* Contact */
  .contact-input {
    width: 100%;
    padding: 12px;
    border: 1px solid #eee;
    border-radius: 8px;
    font-size: 14px;
    color: #333;
    outline: none;
  }
  .contact-input:focus { border-color: #ff6034; }
  .contact-input::placeholder { color: #bbb; }

  /* Upload */
  .upload-section {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .upload-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .upload-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    overflow: hidden;
    background: #f8f8f8;
  }
  .upload-item img { width: 100%; height: 100%; object-fit: cover; }
  .upload-item .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .upload-item .remove-btn svg { width: 12px; height: 12px; color: #fff; }
  .upload-btn {
    aspect-ratio: 1;
    border: 2px dashed #ddd;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .upload-btn svg { width: 24px; height: 24px; color: #ccc; margin-bottom: 4px; }
  .upload-btn span { font-size: 11px; color: #bbb; }

  /* Tips */
  .tips-box {
    background: #fff5f0;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 12px;
  }
  .tips-item {
    font-size: 12px;
    color: #666;
    line-height: 1.8;
    padding-left: 12px;
    position: relative;
  }
  .tips-item::before {
    content: '•';
    position: absolute;
    left: 0;
    color: #ff6034;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    padding: 12px 16px;
    border-top: 1px solid #eee;
    display: flex;
    gap: 12px;
    z-index: 200;
  }
  .btn-cancel {
    flex: 1;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 24px;
    background: #fff;
    color: #666;
    font-size: 15px;
    cursor: pointer;
  }
  .btn-submit {
    flex: 2;
    padding: 12px;
    border: none;
    border-radius: 24px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-submit:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">订单投诉</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll">
    <div class="complaint-content">

      <!-- Order info -->
      <div class="order-card">
        <div class="order-header">
          <span class="order-no">订单号：JS2026040888001</span>
          <span class="order-status">配送中</span>
        </div>
        <div class="order-product">
          <div class="order-img">
            <img src="https://images.unsplash.com/photo-1602143407151-7111542de6e8?auto=format&fit=crop&w=200&h=200&q=80" alt="">
          </div>
          <div class="order-info">
            <div class="order-name">日本进口保温杯 不锈钢真空便携水杯500ml</div>
            <div class="order-spec">白色 500ml</div>
            <div class="order-price">&yen;68.00</div>
          </div>
        </div>
      </div>

      <!-- Complaint type -->
      <div class="section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          投诉类型
        </div>
        <div class="type-grid" id="typeGrid">
          <div class="type-item" data-type="delay">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <span class="type-name">配送延迟</span>
          </div>
          <div class="type-item" data-type="attitude">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <span class="type-name">服务态度</span>
          </div>
          <div class="type-item" data-type="quality">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span class="type-name">商品质量</span>
          </div>
          <div class="type-item" data-type="price">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
            </div>
            <span class="type-name">价格问题</span>
          </div>
          <div class="type-item" data-type="fake">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <span class="type-name">疑似假货</span>
          </div>
          <div class="type-item" data-type="other">
            <div class="type-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
            </div>
            <span class="type-name">其他问题</span>
          </div>
        </div>
      </div>

      <!-- Complaint target -->
      <div class="section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          投诉对象
        </div>
        <div class="target-options">
          <div class="target-option selected" data-target="merchant">
            <span class="target-name">商家</span>
          </div>
          <div class="target-option" data-target="logistics">
            <span class="target-name">物流</span>
          </div>
          <div class="target-option" data-target="platform">
            <span class="target-name">平台</span>
          </div>
        </div>
      </div>

      <!-- Description -->
      <div class="section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          投诉描述
        </div>
        <textarea class="desc-textarea" id="descInput" placeholder="请详细描述您的投诉问题，以便我们更好地为您处理..." maxlength="500"></textarea>
        <div class="desc-count"><span id="descCount">0</span>/500</div>
      </div>

      <!-- Upload -->
      <div class="upload-section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          上传凭证（选填）
        </div>
        <div class="upload-grid" id="uploadGrid">
          <div class="upload-btn" onclick="alert('上传图片')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>添加图片</span>
          </div>
        </div>
      </div>

      <!-- Contact -->
      <div class="section">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg>
          联系方式（选填）
        </div>
        <input type="text" class="contact-input" placeholder="请输入手机号，方便我们联系您处理">
      </div>

      <!-- Tips -->
      <div class="tips-box">
        <div class="tips-item">投诉提交后，我们将在1-3个工作日内处理</div>
        <div class="tips-item">请如实描述问题，恶意投诉将影响您的信用</div>
        <div class="tips-item">如需紧急处理，请联系在线客服</div>
      </div>

    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <button class="btn-cancel" onclick="history.back()">取消</button>
    <button class="btn-submit" id="submitBtn">提交投诉</button>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  // Type selection
  var typeItems = document.querySelectorAll('.type-item');
  typeItems.forEach(function(item) {
    item.addEventListener('click', function() {
      typeItems.forEach(function(i) { i.classList.remove('selected'); });
      this.classList.add('selected');
    });
  });

  // Target selection
  var targetOptions = document.querySelectorAll('.target-option');
  targetOptions.forEach(function(opt) {
    opt.addEventListener('click', function() {
      targetOptions.forEach(function(o) { o.classList.remove('selected'); });
      this.classList.add('selected');
    });
  });

  // Description count
  var descInput = document.getElementById('descInput');
  var descCount = document.getElementById('descCount');
  descInput.addEventListener('input', function() {
    descCount.textContent = this.value.length;
  });

  // Submit
  document.getElementById('submitBtn').addEventListener('click', function() {
    var hasType = document.querySelector('.type-item.selected');
    if (!hasType) {
      alert('请选择投诉类型');
      return;
    }
    if (!descInput.value.trim()) {
      alert('请填写投诉描述');
      return;
    }
    alert('投诉已提交，我们会尽快处理');
    history.back();
  });
})();
</script>
</body>
</html>
