<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>订单详情 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Status header */
  .detail-status-header {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    padding: 16px 12px 20px;
    color: #fff;
  }
  .status-main {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .status-main svg { width: 24px; height: 24px; }
  .status-main .text { font-size: 17px; font-weight: 700; }
  .status-desc { font-size: 12px; opacity: 0.85; margin-left: 34px; }

  /* Address */
  .detail-address {
    background: #fff;
    padding: 12px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .detail-address svg { width: 18px; height: 18px; color: #ff6034; flex-shrink: 0; margin-top: 2px; }
  .detail-address .addr-text { font-size: 13px; color: #333; line-height: 1.6; }
  .detail-address .addr-name { font-weight: 600; }

  /* Logistics quick view */
  .logistics-quick {
    background: #fff;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    border-bottom: 1px solid #f5f5f5;
  }
  .logistics-quick:active { background: #fafafa; }
  .logistics-quick svg { width: 20px; height: 20px; color: #ff6034; flex-shrink: 0; }
  .logistics-quick .lg-info { flex: 1; }
  .logistics-quick .lg-status { font-size: 13px; color: #333; font-weight: 500; margin-bottom: 2px; }
  .logistics-quick .lg-desc { font-size: 12px; color: #999; }
  .logistics-quick .lg-arrow { color: #ccc; }
  .logistics-quick .lg-arrow svg { width: 16px; height: 16px; color: #ccc; }
  .lg-status-tag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .lg-status-tag.shipping { background: #fff5f0; color: #ff6034; }
  .lg-status-tag.delivered { background: #f0faf0; color: #4caf50; }

  /* Package card */
  .package-card {
    background: #fff;
    border-radius: 12px;
    margin: 8px 12px;
    overflow: hidden;
  }
  .package-card + .package-card { margin-top: 0; }

  /* Products */
  .detail-products {
    padding: 12px;
  }
  .detail-prod-row {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #f5f5f5;
  }
  .detail-prod-row:last-child { border-bottom: none; }
  .detail-prod-row .dp-img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .detail-prod-row .dp-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-prod-row .dp-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .detail-prod-row .dp-name {
    font-size: 13px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .detail-prod-row .dp-spec { font-size: 11px; color: #999; }
  .detail-prod-row .dp-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .detail-prod-row .dp-price { font-size: 14px; font-weight: 600; color: #333; }
  .detail-prod-row .dp-qty { font-size: 12px; color: #999; }

  /* Info section */
  .detail-info {
    background: #fff;
    padding: 12px;
    margin-top: 8px;
  }
  .info-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    font-size: 13px;
  }
  .info-item .lbl { color: #999; }
  .info-item .val { color: #333; }
  .info-item .val.red { color: #ee0a24; font-weight: 600; }
  .info-item.total-row {
    border-top: 1px solid #f5f5f5;
    margin-top: 6px;
    padding-top: 10px;
    font-weight: 600;
  }
  .info-item.total-row .val { color: #ee0a24; font-size: 16px; font-weight: 700; }

  /* Bottom actions */
  .detail-bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    height: 56px;
    border-top: 1px solid #eee;
    z-index: 200;
    padding: 0 12px 8px;
  }
  .detail-bottom-bar .btn-sm {
    padding: 7px 18px;
    border-radius: 16px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #666;
  }
  .detail-bottom-bar .btn-sm:active { opacity: 0.7; }
  .detail-bottom-bar .btn-sm.primary {
    border-color: #ff6034;
    color: #ff6034;
  }
  .detail-bottom-bar .btn-sm.danger {
    border-color: #ee0a24;
    color: #ee0a24;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">订单详情</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 64px;">
    <div id="detailAddress" class="detail-address"></div>
    <div id="packageList"></div>
    <div id="orderInfo" class="detail-info"></div>

  </div>

  <!-- Bottom Actions -->
  <div id="orderActions" class="detail-bottom-bar"></div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var detailAddress = document.getElementById('detailAddress');
  var packageList = document.getElementById('packageList');
  var orderInfo = document.getElementById('orderInfo');
  var orderActions = document.getElementById('orderActions');
  var orderNo = new URLSearchParams(window.location.search).get('orderNo') || 'JS202604210001';

  var orders = {
    JS202604210001: {
      orderNo: 'JS202604210001',
      createdAt: '2026-04-21 09:26:18',
      payMethod: '积分兑换',
      pointsDeduction: '-120豆',
      cashPay: '¥0.00',
      freight: '¥0.00',
      totalPay: '¥0.00',
      address: {
        name: '张三',
        phone: '138****8888',
        detail: '北京市朝阳区建国路88号 悦享大厦A座12层'

        {
          company: '顺丰速运',

          statusText: '运输中',
          desc: '【北京市】 快件已到达北京朝阳区营业点，正在派送中',
          products: [

            },

              spec: '白色 L码',
              price: '¥52.00',
              qty: 'x1',
              img: '../images/unsplash/1521572163474-6864f9cf17ab.jpg'
            }
          ]
        }
      ],
      actions: [
        { type: 'link', text: '查看物流', className: 'btn-sm primary', href: 'logistics.html?orderNo=JS202604210001' },
        { type: 'button', text: '确认收货', className: 'btn-sm danger', handler: "alert('已确认收货')" }
      ]
    },
    JS202604180002: {
      orderNo: 'JS202604180002',
      createdAt: '2026-04-18 14:08:32',
      payMethod: '积分兑换',
      pointsDeduction: '-80豆',
      cashPay: '¥0.00',
      freight: '¥0.00',
      totalPay: '¥0.00',
      address: {
        name: '张三',
        phone: '138****8888',
        detail: '北京市朝阳区朝外大街99号 国贸公寓3单元1002室'
      },
      packages: [
        {
          company: '中通快递',
          logisticsNo: 'ZT202604180002',
          statusClass: 'delivered',
          statusText: '已签收',
          desc: '【北京市】 已签收，签收人：本人签收',
          products: [
            {
              name: '无线蓝牙降噪耳机 迷你入耳式超长续航',
              spec: '黑色 标准版',
              price: '¥89.00',
              qty: 'x1',
              img: '../images/unsplash/1505740420928-5e560c06d30e.jpg'
            }
          ]
        }
      ],
      actions: [
        { type: 'link', text: '查看物流', className: 'btn-sm primary', href: 'logistics.html?orderNo=JS202604180002' },
        { type: 'button', text: '再次兑换', className: 'btn-sm', handler: "location.href='points_exchange.html'" }
      ]
    },
    JS202604090003: {
      orderNo: 'JS202604090003',
      createdAt: '2026-04-09 19:42:05',
      payMethod: '积分兑换',
      pointsDeduction: '-220豆',
      cashPay: '¥0.00',
      freight: '¥0.00',
      totalPay: '¥0.00',
      address: {
        name: '张三',
        phone: '138****8888',
        detail: '北京市海淀区中关村南大街27号 中关村国际广场B座1608室'
      },
      packages: [
        {
          company: '圆通速递',
          logisticsNo: 'YT202604090003',
          statusClass: 'shipping',
          statusText: '运输中',
          desc: '【北京市】 包裹离开分拨中心，正在发往目的地',
          products: [
            {
              name: '时尚运动鞋 透气网面跑步鞋轻便缓震',
              spec: '黑色 42码',
              price: '¥199.00',
              qty: 'x1',
              img: '../images/unsplash/1542291026-7eec264c27ff.jpg'
            },
            {
              name: '运动速干短袜',
              spec: '黑灰组合 2双装',
              price: '¥21.00',
              qty: 'x1',
              img: '../images/unsplash/1558618666-fcd25c85cd64.jpg'
            }
          ]
        }
      ],
      actions: [
        { type: 'button', text: '取消订单', className: 'btn-sm', handler: "location.href='order_cancel.html'" },
        { type: 'link', text: '查看物流', className: 'btn-sm primary', href: 'logistics.html?orderNo=JS202604090003' },
        { type: 'button', text: '确认收货', className: 'btn-sm danger', handler: "alert('已确认收货')" }
      ]
    }
  };

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, function(char) {
      return {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[char];
    });
  }

  function renderAddress(address) {
    detailAddress.innerHTML = '' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
      '<div class="addr-text">' +
        '<span class="addr-name">' + escapeHtml(address.name) + ' ' + escapeHtml(address.phone) + '</span><br>' +
        escapeHtml(address.detail) +
      '</div>';
  }

  function renderPackages(packages, currentOrderNo) {
    packageList.innerHTML = packages.map(function(pkg) {
      var productsHtml = pkg.products.map(function(product) {
        return '' +
          '<div class="detail-prod-row">' +
            '<div class="dp-img"><img src="' + escapeHtml(product.img) + '" alt="' + escapeHtml(product.name) + '"></div>' +
            '<div class="dp-info">' +
              '<div class="dp-name">' + escapeHtml(product.name) + '</div>' +
              '<div class="dp-spec">' + escapeHtml(product.spec) + '</div>' +
              '<div class="dp-bottom">' +
                '<span class="dp-price">' + escapeHtml(product.price) + '</span>' +
                '<span class="dp-qty">' + escapeHtml(product.qty) + '</span>' +
              '</div>' +
            '</div>' +
          '</div>';
      }).join('');

      return '' +
        '<div class="package-card">' +
          '<a href="logistics.html?orderNo=' + encodeURIComponent(currentOrderNo) + '" class="logistics-quick">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>' +
            '<div class="lg-info">' +
              '<div class="lg-status">' + escapeHtml(pkg.company) + ' ' + escapeHtml(pkg.logisticsNo) + ' <span class="lg-status-tag ' + escapeHtml(pkg.statusClass) + '">' + escapeHtml(pkg.statusText) + '</span></div>' +
              '<div class="lg-desc">' + escapeHtml(pkg.desc) + '</div>' +
            '</div>' +
            '<div class="lg-arrow">' +
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>' +
            '</div>' +
          '</a>' +
          '<div class="detail-products">' + productsHtml + '</div>' +
        '</div>';
    }).join('');
  }

  function renderOrderInfo(order) {
    orderInfo.innerHTML = '' +
      '<div class="info-item">' +
        '<span class="lbl">订单编号</span>' +
        '<span class="val">' + escapeHtml(order.orderNo) + '</span>' +
      '</div>' +
      '<div class="info-item">' +
        '<span class="lbl">下单时间</span>' +
        '<span class="val">' + escapeHtml(order.createdAt) + '</span>' +
      '</div>' +
      '<div class="info-item">' +
        '<span class="lbl">支付方式</span>' +
        '<span class="val">' + escapeHtml(order.payMethod) + '</span>' +
      '</div>' +
      '<div class="info-item">' +
        '<span class="lbl">积分抵扣</span>' +
        '<span class="val red">' + escapeHtml(order.pointsDeduction) + '</span>' +
      '</div>' +
      '<div class="info-item">' +
        '<span class="lbl">现金支付</span>' +
        '<span class="val">' + escapeHtml(order.cashPay) + '</span>' +
      '</div>' +
      '<div class="info-item">' +
        '<span class="lbl">运费</span>' +
        '<span class="val">' + escapeHtml(order.freight) + '</span>' +
      '</div>' +
      '<div class="info-item total-row">' +
        '<span class="lbl">实付金额</span>' +
        '<span class="val">' + escapeHtml(order.totalPay) + '</span>' +
      '</div>';
  }

  function renderActions(actions) {
    orderActions.innerHTML = actions.map(function(action) {
      if (action.type === 'link') {
        return '<a href="' + escapeHtml(action.href) + '" class="' + escapeHtml(action.className) + '">' + escapeHtml(action.text) + '</a>';
      }
      return '<button class="' + escapeHtml(action.className) + '" onclick="' + action.handler + '">' + escapeHtml(action.text) + '</button>';
    }).join('');
  }

  var currentOrder = orders[orderNo] || orders.JS202604210001;
  renderAddress(currentOrder.address);
  renderPackages(currentOrder.packages, currentOrder.orderNo);
  renderOrderInfo(currentOrder);
  renderActions(currentOrder.actions);
})();
</script>
</body>
</html>
