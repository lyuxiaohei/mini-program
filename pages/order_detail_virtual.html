<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>订单详情 - 福利商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .phone-frame { height: 100vh; overflow: hidden; }
  .page-scroll { height: 100%; overflow-y: auto; }

  /* 发货提示 */
  .virtual-tip {
    margin: var(--space-sm) 12px;
    padding: var(--space-sm) var(--space-md);
    background: var(--bg-color);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Product card */
  .package-card {
    background: var(--card-bg);
    border-radius: var(--radius-md);
    margin: var(--space-sm) 12px;
    overflow: hidden;
  }
  .detail-products { padding: var(--space-md); }
  .detail-prod-row {
    display: flex;
    gap: var(--space-md);
  }
  .detail-prod-row .dp-img {
    width: 72px; height: 72px;
    border-radius: var(--radius-sm);
    overflow: hidden; flex-shrink: 0;
    background: var(--bg-input);
  }
  .detail-prod-row .dp-img img { width: 100%; height: 100%; object-fit: cover; }
  .detail-prod-row .dp-info {
    flex: 1; display: flex; flex-direction: column;
    justify-content: space-between; min-width: 0;
  }
  .detail-prod-row .dp-name { font-size: var(--font-sm); color: var(--text-color); line-height: 1.4; }
  .detail-prod-row .dp-spec { font-size: var(--font-sm); color: var(--text-tertiary); }
  .detail-prod-row .dp-bottom { display: flex; align-items: center; justify-content: space-between; }
  .detail-prod-row .dp-price { font-size: var(--font-base); font-weight: 600; color: var(--text-color); }
  .detail-prod-row .dp-qty { font-size: var(--font-sm); color: var(--text-tertiary); }

  /* Virtual card info section */
  .virtual-info-card {
    background: var(--card-bg);
    margin: var(--space-sm) 12px;
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .virtual-info-card .vi-section {
    padding: var(--space-md);
    border-bottom: 1px solid var(--bg-color);
  }
  .virtual-info-card .vi-section:last-child { border-bottom: none; }
  .vi-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-md);
    margin-bottom: var(--space-sm);
  }
  .vi-row:last-child { margin-bottom: 0; }
  .vi-row .vi-label { font-size: var(--font-sm); color: var(--text-tertiary); flex-shrink: 0; }
  .vi-row .vi-value { font-size: var(--font-sm); color: var(--text-color); text-align: right; word-break: break-all; }
  .vi-row .vi-value.mono { font-family: monospace; letter-spacing: 1px; }
  .vi-row > div {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: var(--space-sm);
    flex: 1;
    min-width: 0;
  }
  .vi-row > div .vi-value.mono {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vi-row .vi-value.copy-btn {
    color: var(--primary-start);
    cursor: pointer;
    font-size: var(--font-xs);
    flex-shrink: 0;
  }
  .vi-card-title {
    font-size: var(--font-sm);
    font-weight: 600;
    color: var(--text-color);
    margin-bottom: var(--space-sm);
    padding-bottom: var(--space-xs);
    border-bottom: 1px dashed var(--border-divider);
  }
  .vi-section.toggle-cards {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-xs);
    color: var(--primary-start);
    font-size: var(--font-sm);
    cursor: pointer;
  }
  .vi-section.toggle-cards:active { opacity: 0.7; }
  .vi-section.toggle-cards svg { width: 14px; height: 14px; transition: transform 0.2s; }
  .vi-section.toggle-cards.expanded svg { transform: rotate(180deg); }

  /* Info section */
  .detail-info {
    background: var(--card-bg);
    padding: var(--space-md);
    margin: var(--space-sm) 12px;
    border-radius: var(--radius-md);
  }
  .info-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-xs) 0;
    font-size: var(--font-sm);
  }
  .info-item .lbl { color: var(--text-tertiary); }
  .info-item .val { color: var(--text-color); }
  .info-item .val.red { color: var(--price-color); font-weight: 600; }
  .info-item.total-row {
    border-top: 1px solid var(--bg-color);
    margin-top: var(--space-sm);
    padding-top: var(--space-md);
    font-weight: 600;
  }
  .info-item.total-row .val { color: var(--price-color); font-size: var(--font-md); font-weight: 700; }

  /* Bottom bar */
  .detail-bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: var(--space-sm);
    height: 56px;
    border-top: 1px solid var(--border-color);
    z-index: 200;
    padding: 0 var(--space-md) var(--space-sm);
  }
  .detail-bottom-bar .btn-sm {
    padding: var(--space-sm) var(--space-xl);
    border-radius: var(--radius-lg);
    font-size: var(--font-sm);
    cursor: pointer;
    border: 1px solid var(--text-disabled);
    background: var(--card-bg);
    color: var(--text-secondary);
  }
  .detail-bottom-bar .btn-sm:active { opacity: 0.7; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">订单详情</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 64px;">

    <!-- 发货提示 -->
    <div class="virtual-tip">卡密已发送至充值账号，请注意查收</div>

    <!-- Product Card -->
    <div class="package-card">
      <div class="detail-products" id="productList"></div>
    </div>

    <!-- Virtual Card Info -->
    <div class="virtual-info-card" id="virtualInfo"></div>

    <!-- Order Info -->
    <div class="detail-info">
      <div class="info-item">
        <span class="lbl">订单编号</span>
        <span class="val">JS2026042805013</span>
      </div>
      <div class="info-item">
        <span class="lbl">下单时间</span>
        <span class="val">2026-04-28 10:23</span>
      </div>
      <div class="info-item">
        <span class="lbl">支付方式</span>
        <span class="val">积分支付</span>
      </div>
      <div class="info-item">
        <span class="lbl">积分抵扣</span>
        <span class="val red">-19800积分（¥198.00）</span>
      </div>
      <div class="info-item total-row">
        <span>实付金额</span>
        <span class="val">19800积分</span>
      </div>
    </div>

  </div>

  <!-- Bottom Bar -->
  <div class="detail-bottom-bar">
    <a href="product_detail_virtual.html" class="btn-sm">再次购买</a>
  </div>

</div>
<script>
  // 订单数据：多件虚拟商品时，每件对应一组独立卡密（卡密数量 = 商品数量）
  var order = {
    account: '13800001111',
    products: [
      {
        name: '100元话费充值',
        spec: '卡密 官方直充',
        price: '99.00',
        qty: 2,
        img: '../images/unsplash/虚拟商品主图.jpg',
        cards: [
          { no: 'CAM8XK-2026-0714-A8B3', key: '7Q9W2E4R6T8Y', link: 'https://vip.film.qq.com/exchange/?code=7Q9W2E4R6T8Y' },
          { no: 'CAM8XK-2026-0714-B9C4', key: 'P3Q4R5S6T7U8', link: 'https://vip.film.qq.com/exchange/?code=P3Q4R5S6T7U8' }
        ]
      }
    ]
  };

  // 渲染商品行
  var prodHtml = '';
  order.products.forEach(function(p) {
    prodHtml += '<div class="detail-prod-row">' +
      '<div class="dp-img"><img src="' + p.img + '" alt="' + p.name + '"></div>' +
      '<div class="dp-info">' +
        '<div class="dp-name">' + p.name + '</div>' +
        '<div class="dp-spec">' + p.spec + '</div>' +
        '<div class="dp-bottom">' +
          '<span class="dp-price">&yen;' + p.price + '</span>' +
          '<span class="dp-qty">x' + p.qty + '</span>' +
        '</div>' +
      '</div>' +
    '</div>';
  });
  document.getElementById('productList').innerHTML = prodHtml;

  // 渲染卡密信息：充值方式/账号 + 每组卡密（多张时显示"卡密 N / 总数"序号）
  var totalCards = order.products.reduce(function(sum, p) { return sum + (p.cards ? p.cards.length : 0); }, 0);
  var showIndex = totalCards > 1;

  var infoHtml = '<div class="vi-section">' +
    '<div class="vi-row"><span class="vi-label">充值方式</span><span class="vi-value">卡密</span></div>' +
    '<div class="vi-row"><span class="vi-label">充值账号</span><span class="vi-value">' + order.account + '</span></div>' +
  '</div>';

  var cardIndex = 0;
  order.products.forEach(function(p) {
    (p.cards || []).forEach(function(c) {
      cardIndex++;
      var hidden = cardIndex > 1; // 仅展示第一条，其余默认折叠
      infoHtml += '<div class="vi-section' + (hidden ? ' card-more' : '') + '"' + (hidden ? ' style="display:none"' : '') + '>' +
        (showIndex ? '<div class="vi-card-title">卡密 ' + cardIndex + ' / ' + totalCards + '</div>' : '') +
        '<div class="vi-row"><span class="vi-label">卡号</span><div><span class="vi-value mono">' + c.no + '</span><span class="vi-value copy-btn" onclick="copyText(\'' + c.no + '\')">复制</span></div></div>' +
        '<div class="vi-row"><span class="vi-label">密钥</span><div><span class="vi-value mono">' + c.key + '</span><span class="vi-value copy-btn" onclick="copyText(\'' + c.key + '\')">复制</span></div></div>' +
        '<div class="vi-row"><span class="vi-label">兑换链接</span><div><span class="vi-value mono">' + c.link + '</span><span class="vi-value copy-btn" onclick="copyText(\'' + c.link + '\')">复制</span></div></div>' +
      '</div>';
    });
  });
  if (totalCards > 1) {
    infoHtml += '<div class="vi-section toggle-cards" onclick="toggleCards()">' +
      '<span id="toggleText">展开剩余 ' + (totalCards - 1) + ' 条卡密</span>' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>' +
    '</div>';
  }
  document.getElementById('virtualInfo').innerHTML = infoHtml;

  var cardsExpanded = false;
  function toggleCards() {
    cardsExpanded = !cardsExpanded;
    var moreEls = document.querySelectorAll('.card-more');
    for (var i = 0; i < moreEls.length; i++) {
      moreEls[i].style.display = cardsExpanded ? 'block' : 'none';
    }
    var toggleEl = document.querySelector('.toggle-cards');
    if (toggleEl) toggleEl.classList.toggle('expanded', cardsExpanded);
    var toggleTextEl = document.getElementById('toggleText');
    if (toggleTextEl) toggleTextEl.textContent = cardsExpanded ? '收起' : ('展开剩余 ' + (totalCards - 1) + ' 条卡密');
  }

  function copyText(text) {
    var val = String(text);
    if (navigator.clipboard) navigator.clipboard.writeText(val);
    alert('已复制：' + val);
  }
</script>
<script src="../js/theme-switcher.js"></script>
</body>
</html>
