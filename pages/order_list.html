  var currentTab = 'all';

  /**
   * 判断订单是否处于「待发货」及之前（未发货），此类仅开放仅退款入口。
   * @param {{ status: string }} order 订单对象
   * @returns {boolean}
   */
  function isUnshippedRefundOnlyPhase(order) {
    return order.status === 'shipped';
  }

  /**
   * 判断订单是否已发货（含部分发货、待收货、已关闭等），可展示退换/售后入口。
   * @param {{ status: string }} order 订单对象
   * @returns {boolean}
   */
  function isShippedReturnPhase(order) {
    return ['delivered', 'partial-ship', 'partial-received', 'completed', 'reviewed'].indexOf(order.status) !== -1;
  }

  /**
   * 判断单行商品是否已发起售后（用于多商品订单行展示）。
   * @param {{ hasAfterSales?: boolean, afterSaleCase?: string }} productLine 商品行
   * @returns {boolean}
   */
  function productLineHasAfterSales(productLine) {
    return !!(productLine && (productLine.hasAfterSales || productLine.afterSaleCase));
  }

  /**
   * 是否在对应商品数据下方单独展示「售后详情」入口（商品行售后或单商品整单售后）。
   * @param {{ hasAfterSales?: boolean, products?: Array }} order 订单对象
   * @param {{ hasAfterSales?: boolean, afterSaleCase?: string }} p 商品行
   * @returns {boolean}
   */
  function shouldShowAftersaleDetailBelowProduct(order, p) {
    if (productLineHasAfterSales(p)) return true;
    if (order.products && order.products.length === 1 && order.hasAfterSales) return true;
    return false;
  }

  /**
   * 单笔仅一件商品且存在售后：整张单归入「退换/售后」Tab；不在「待收货」重复出现。
   * @param {{ products?: Array, hasAfterSales?: boolean }} order 订单对象
   * @returns {boolean}
   */
  function orderQualifiesForAftersaleTab(order) {
    if (!order.products || order.products.length !== 1) return false;
    var p0 = order.products[0];
    return !!(order.hasAfterSales || productLineHasAfterSales(p0));
  }

  /**
   * 是否属于「待收货」类状态。
   * @param {{ status: string }} order 订单对象
   * @returns {boolean}
   */
  function isDeliveredLikeStatus(order) {
    return order.status === 'delivered' || order.status === 'partial-ship' || order.status === 'partial-received';
  }

  /**
   * 当前卡片是否按「待收货」Tab 的规则展示（全部 Tab 下仅待收货列表中的订单为 true）。
   * @param {{ status: string, products?: Array, hasAfterSales?: boolean }} order 订单对象
   * @returns {boolean}
   */
  function useDeliveredTabDisplayForOrder(order) {
    if (currentTab === 'delivered') return true;
    if (currentTab !== 'all') return false;
    return isDeliveredLikeStatus(order) && !orderQualifiesForAftersaleTab(order);
  }

  /**
   * 按当前 Tab 筛选订单列表。
   * @returns {typeof orders}
   */
  function getFilteredOrders() {
    if (currentTab === 'all') return orders;
    if (currentTab === 'aftersale') {
      return orders.filter(orderQualifiesForAftersaleTab);
    }
    if (currentTab === 'completed') {
      return orders.filter(function(o) { return o.status === 'completed' || o.status === 'reviewed'; });
    }
    if (currentTab === 'delivered') {
      return orders.filter(function(o) {
        if (!isDeliveredLikeStatus(o)) return false;
        if (orderQualifiesForAftersaleTab(o)) return false;
        return true;
      });
    }
    return orders.filter(function(o) { return o.status === currentTab; });
  }

  /**
   * 解析订单关联的售后详情 case 字符串（用于类型展示）。
   * @param {{ afterSaleCase?: string, products?: Array }} order 订单对象
   * @returns {string}
   */
  function getOrderAfterSaleCaseKey(order) {
    if (order.afterSaleCase) return String(order.afterSaleCase);
    if (order.products && order.products.length === 1 && order.products[0].afterSaleCase) {
      return String(order.products[0].afterSaleCase);
    }
    return '';
  }

  /**
   * 将 case 或显式字段映射为售后类型 key：refund-only | refund-return | exchange。
   * @param {{ afterSaleType?: string, afterSaleCase?: string, products?: Array }} order 订单对象
   * @returns {'refund-only'|'refund-return'|'exchange'}
   */
  function getAfterSaleTypeKey(order) {
    var t = order.afterSaleType;
    if (t === 'refund_only' || t === 'refund-only') return 'refund-only';
    if (t === 'refund_return' || t === 'refund-return') return 'refund-return';
    if (t === 'exchange') return 'exchange';
    var c = getOrderAfterSaleCaseKey(order).toLowerCase();
    if (c.indexOf('refund_only') !== -1 || c.indexOf('refund-only') !== -1) return 'refund-only';
    if (c.indexOf('exchange') !== -1) return 'exchange';
    if (c.indexOf('refund_return') !== -1 || c.indexOf('refund-return') !== -1) return 'refund-return';
    return 'refund-return';
  }

  /**
   * 退换/售后 Tab 卡片右上角展示的售后类型文案。
   * @param {{ afterSaleType?: string, afterSaleCase?: string, products?: Array }} order 订单对象
   * @returns {string}
   */
  function getAfterSaleTypeLabel(order) {
    var key = getAfterSaleTypeKey(order);
    if (key === 'refund-only') return '仅退款';
    if (key === 'exchange') return '换货';
    return '退货退款';
  }

  /**
   * 生成订单列表「仅退款」入口跳转地址：固定仅退款模式与订单号。
   * @param {string} orderId 订单号
   * @returns {string}
   */
  function getApplyRefundOnlyUrl(orderId) {
    var params = new URLSearchParams();
    params.set('type', 'refund-only');
    params.set('orderId', orderId);
    return 'apply_refund.html?' + params.toString();
  }

  var orderListTruckSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>';
  var orderListArrowSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>';

  /**
   * 待收货 Tab 卡片右上角：部分签收、运输中等展示为「待收货状态」。
   * @param {{ status: string, statusText: string }} order 订单对象
   * @returns {string}
   */
  function getDeliveredTabOrderStatusLabel(order) {
    if (order.status === 'partial-received') return '待收货';
    if (order.statusText === '部分签收') return '待收货';
    if (order.statusText === '运输中') return '待收货';
    return order.statusText;
  }

  /**
   * 全部 Tab 卡片右上角：部分发货、部分签收、运输中等展示为「待收货」。
   * @param {{ statusText?: string }} order 订单对象
   * @returns {string}
   */
  function getAllTabOrderStatusLabel(order) {
    var t = order.statusText || '';
    if (t === '部分发货' || t === '部分签收' || t === '运输中') return '待收货';
    return order.statusText;
  }

  /**
   * 根据商品下标找到所属包裹（拆单数据）。
   * @param {{ packages?: Array }} order 订单对象
   * @param {number} prodIdx 商品在 order.products 中的下标
   * @returns {object|null}
   */
  function findPackageForProductIndex(order, prodIdx) {
    if (!order.packages || !order.packages.length) return null;
    for (var i = 0; i < order.packages.length; i++) {
      var pkg = order.packages[i];
      if (pkg.products && pkg.products.indexOf(prodIdx) !== -1) return pkg;
    }
    return null;
  }

  /**
   * 待收货 Tab：单个商品下方物流条（可点击进物流页）。
   * @param {{ id: string, packages?: Array }} order 订单对象
   * @param {number} prodIdx 商品下标
   * @param {object|null|undefined} pkgHint 已知包裹时直接传入，避免重复查找
   * @returns {string}
   */
  function buildProductLogisticsStripHtml(order, prodIdx, pkgHint) {
    if (!useDeliveredTabDisplayForOrder(order)) return '';
    var pkg = pkgHint !== undefined && pkgHint !== null ? pkgHint : findPackageForProductIndex(order, prodIdx);
    var carrier = '';
    var waybillNo = '';
    var traceTip = '';
    var statusKey = 'shipping';
    var statusLabel = '运输中';
    if (pkg) {
      carrier = pkg.carrier || '';
      waybillNo = pkg.waybillNo || '';
      traceTip = pkg.traceTip || '';
      statusKey = pkg.status || 'shipping';
      statusLabel = pkg.statusText || '运输中';
    } else {
      carrier = '顺丰速运';
      waybillNo = 'SF' + String(order.id).replace(/\D/g, '').slice(-10);
      if (waybillNo === 'SF') waybillNo = 'SF00000000';
      traceTip = '快件运输中，点击查看物流详情';
      statusKey = 'shipping';
      statusLabel = '运输中';
    }
    var titleLine = (carrier && waybillNo) ? (carrier + ' ' + waybillNo) : '物流信息 · 待更新';
    return '<a href="logistics.html" class="ol-per-product-log" onclick="event.stopPropagation()">' +
      '<span class="ol-lg-icon">' + orderListTruckSvg + '</span>' +
      '<div class="ol-lg-info">' +
        '<div class="ol-lg-status">' + titleLine + ' <span class="ol-lg-tag ' + statusKey + '">' + statusLabel + '</span></div>' +
        '<div class="ol-lg-desc">' + (traceTip || '点击查看物流详情') + '</div>' +
      '</div>' +
      '<span class="ol-lg-arrow">' + orderListArrowSvg + '</span>' +
    '</a>';
  }

  /**
   * 待收货列表中是否按包裹拆行并展示物流条（与 order_detail 拆单一致）。
   * @param {{ packageLogisticsLayout?: boolean, packages?: Array }} order 订单对象
   * @returns {boolean}
   */
  function useOrderListPackageSplitLayout(order) {
    return useDeliveredTabDisplayForOrder(order) &&
      order.packageLogisticsLayout === true &&
      order.packages &&
      order.packages.length > 0;
  }

  /**
   * 渲染单个商品行 HTML（订单卡片内复用）。
   * @param {{ id: string, products: Array }} order 订单对象
   * @param {{ name: string, spec: string, price: string, qty: number, img: string, hasAfterSales?: boolean, afterSaleCase?: string }} p 商品行
   * @returns {string}
   */
  function buildOrderProductRowHtml(order, p) {
    var deliveredUi = useDeliveredTabDisplayForOrder(order);
    var shipLikeUi = (currentTab === 'shipped' || (currentTab === 'all' && order.status === 'shipped'));
    var multiLineAftersale = deliveredUi &&
      order.products.length > 1 &&
      productLineHasAfterSales(p);
    var shippedMultiLineAftersale = shipLikeUi &&
      order.products.length > 1 &&
      productLineHasAfterSales(p);
    var rowMuted = multiLineAftersale || shippedMultiLineAftersale;
    var rowClass = 'order-product-row' + (rowMuted ? ' aftersale-line-muted' : '');
    var saleCaseForLine = p.afterSaleCase || order.afterSaleCase || 'refund_return_approved';
    var detailLink = 'refund_detail.html?case=' + encodeURIComponent(saleCaseForLine) + '&orderId=' + encodeURIComponent(order.id);
    var aftersaleDetailChevronHtml =
      '<span class="op-aftersale-detail-label">售后详情</span><span class="op-aftersale-detail-chevron">&gt;</span>';
    var aftersaleDetailRowHtml = '';
    if (shouldShowAftersaleDetailBelowProduct(order, p)) {
      aftersaleDetailRowHtml =
        '<div class="op-aftersale-detail-row op-aftersale-detail-row--unified" onclick="event.stopPropagation()">' +
          '<a href="' + detailLink + '" class="op-aftersale-detail-link op-aftersale-detail-link--unified" onclick="event.stopPropagation()">' +
            aftersaleDetailChevronHtml +
          '</a>' +
        '</div>';
    }
    return '<div class="' + rowClass + '">' +
      '<a href="product_detail.html" class="op-img" onclick="event.stopPropagation()"><img src="' + p.img + '" alt=""></a>' +
      '<div class="op-info">' +
        '<div class="op-name">' + p.name + '</div>' +
        '<div class="op-bottom">' +
          '<span class="op-price">&yen;' + p.price + '</span>' +
          '<span class="op-meta">' +
            '<span class="op-qty">x' + p.qty + '</span>' +
          '</span>' +
        '</div>' +
      '</div>' +
    '</div>' +
    aftersaleDetailRowHtml;
  }

  /**
   * 按包裹拆单：单件包裹为「商品 + 物流」；多件同一包裹为先并列商品行，末尾一条共享物流；每包裹末尾「操作行」。
   * @param {{ id: string, packages: Array, products: Array }} order 订单对象
   * @returns {string}
   */
  function buildSplitPackageBodyHtml(order) {
    var html = '<div class="ol-package-split-wrap">';
    order.packages.forEach(function(pkg, pkgIndex) {
      var rows = '';
      var multiInPkg = pkg.products && pkg.products.length > 1;
      pkg.products.forEach(function(prodIdx) {
        var p = order.products[prodIdx];
        if (p) {
          rows += buildOrderProductRowHtml(order, p);
          if (!multiInPkg) {
            rows += buildProductLogisticsStripHtml(order, prodIdx, pkg);
          }
        }
      });
      if (multiInPkg) {
        var refIdx = pkg.products[0];
        rows += buildProductLogisticsStripHtml(order, refIdx, pkg);
      }
      var hasWaybill = !!(pkg.carrier && pkg.waybillNo);
      var actionBtnClass = 'ol-pkg-btn' + (hasWaybill ? '' : ' muted');
      var extraActionHtml = '';
      if (order.id === 'JS2026040799009') {
        if (pkgIndex === 0) {
          extraActionHtml = '<a href="apply_refund.html?orderId=' + encodeURIComponent(order.id) + '" class="ol-pkg-btn ol-pkg-btn-outline">退换/售后</a>';
        } else if (pkgIndex === 1) {
          extraActionHtml = '<a href="' + getApplyRefundOnlyUrl(order.id) + '" class="ol-pkg-btn ol-pkg-btn-outline">仅退款</a>';
        }
      } else if (order.id === 'JS2026040188010' && pkgIndex === 1) {
        extraActionHtml = '<a href="apply_refund.html?orderId=' + encodeURIComponent(order.id) + '" class="ol-pkg-btn ol-pkg-btn-outline">退换/售后</a>';
      }
      html += '<div class="ol-package-block">' +
        '<div class="ol-package-products">' + rows + '</div>' +
        '<div class="ol-package-actions" onclick="event.stopPropagation()">' +
          extraActionHtml +
          '<a href="logistics.html" class="' + actionBtnClass + '">查看物流</a>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
    return html;
  }

  /**
   * 为订单列表绑定「更多」菜单点击（仅初始化一次，事件委托在 #orderList）。
   */
  function bindOrderListActionMoreMenusOnce() {
    var listEl = document.getElementById('orderList');
    if (!listEl || listEl.dataset.actionMoreBound === '1') return;
    listEl.dataset.actionMoreBound = '1';
    listEl.addEventListener('click', function(e) {
      var trigger = e.target.closest('.action-more-trigger');
      if (trigger) {
        e.preventDefault();
        e.stopPropagation();
        var wrap = trigger.closest('.action-more-wrap');
        var panel = wrap && wrap.querySelector('.action-more-panel');
        if (!panel) return;
        var willOpen = !panel.classList.contains('is-open');
        listEl.querySelectorAll('.action-more-panel.is-open').forEach(function(p) {
          p.classList.remove('is-open');
        });
        if (willOpen) panel.classList.add('is-open');
        return;
      }
      if (!e.target.closest('.action-more-wrap')) {
        listEl.querySelectorAll('.action-more-panel.is-open').forEach(function(p) {
          p.classList.remove('is-open');
        });
      }
    });
  }

  /**
   * 将售后相关操作插入订单底部按钮区（去重）。
   * @param {string[]} actionList 已有操作文案列表
   * @param {{ status: string, id: string, hasAfterSales?: boolean, products?: Array }} order 订单对象
   */
  function mergeAfterSaleActions(actionList, order) {
    if (order.hasAfterSales) {
      if (actionList.indexOf('售后') === -1) actionList.unshift('售后');
      return;
    }
    if (order.products && order.products.length === 1 && productLineHasAfterSales(order.products[0])) {
      if (actionList.indexOf('售后') === -1) actionList.unshift('售后');
      return;
    }
    if (isUnshippedRefundOnlyPhase(order)) {
      if (actionList.indexOf('仅退款') === -1) actionList.unshift('仅退款');
      return;
    }
    if (isShippedReturnPhase(order)) {
      var skipFooterExchange =
        (order.id === 'JS2026040799009' || order.id === 'JS2026040188010') && useDeliveredTabDisplayForOrder(order);
      if (!skipFooterExchange && actionList.indexOf('退换/售后') === -1) {
        actionList.unshift('退换/售后');
      }
    }
  }

  function renderOrders() {
    var filtered = getFilteredOrders();
    if (filtered.length === 0) {
      document.getElementById('orderList').innerHTML =
        '<div class="order-empty" style="display:flex;">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>' +
          '<p>暂无相关订单</p>' +
          '<a href="home_page.html">去逛逛</a>' +
        '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(order) {
      var deliveredView = useDeliveredTabDisplayForOrder(order);
      var useSplitLayout = useOrderListPackageSplitLayout(order);
      var prodsHtml = '';
      if (useSplitLayout) {
        prodsHtml = buildSplitPackageBodyHtml(order);
      } else {
        order.products.forEach(function(p, idx) {
          prodsHtml += buildOrderProductRowHtml(order, p);
          if (deliveredView) {
            prodsHtml += buildProductLogisticsStripHtml(order, idx, null);
          }
        });
      }

      var pkgHtml = '';
      if (order.packages && !useSplitLayout) {
        pkgHtml = '<div class="package-summary">';
        order.packages.forEach(function(pkg) {
          pkgHtml += '<span class="pkg-tag ' + pkg.status + '">' + pkg.no + '：' + pkg.statusText + '</span>';
        });
        pkgHtml += '</div>';
      }

      var actionsHtml = '';
      var actionList = order.actions.slice();
      mergeAfterSaleActions(actionList, order);
      if (useSplitLayout) {
        actionList = actionList.filter(function(a) { return a !== '查看物流'; });
      }
      if (deliveredView && actionList.indexOf('查看详情') === -1) {
        actionList.unshift('查看详情');
      }
      if (deliveredView && actionList.indexOf('确认收货') === -1) {
        actionList.push('确认收货');
      }
      if (currentTab === 'all' || currentTab === 'completed' || currentTab === 'shipped') {
        actionList = actionList.map(function(a) {
          return a === '售后' ? '售后详情' : a;
        });
      }
      actionList = actionList.filter(function(a) {
        return a !== '售后' && a !== '售后详情';
      });
      var useDeliveredAftersaleOverflow =
        deliveredView &&
        actionList.indexOf('退换/售后') !== -1 &&
        actionList.length >= 3;
      var listForActions = useDeliveredAftersaleOverflow
        ? actionList.filter(function(a) { return a !== '退换/售后'; })
        : actionList;
      var moreWrapHtml = '';
      if (useDeliveredAftersaleOverflow) {
        var applyAfterHref = 'apply_refund.html?orderId=' + encodeURIComponent(order.id);
        moreWrapHtml =
          '<div class="action-more-wrap">' +
            '<button type="button" class="action-more-trigger" aria-label="更多">' +
              '<span class="action-more-dots" aria-hidden="true"><span></span><span></span><span></span></span>' +
            '</button>' +
            '<div class="action-more-panel">' +
              '<a href="' + applyAfterHref + '" class="action-more-item" onclick="event.stopPropagation()">退换/售后</a>' +
            '</div>' +
          '</div>';
      }
      listForActions.forEach(function(a, i) {
        var cls = i === listForActions.length - 1 ? ' primary' : '';
        if (a === '去支付') cls = ' danger';
        var href = '#';
        if (a === '查看详情') href = 'order_detail.html';
        if (a === '确认收货') href = 'order_detail.html';
        if (a === '查看物流') href = 'logistics.html';
        if (a === '去支付') href = 'order_pay.html';
        if (a === '取消订单') href = 'order_cancel.html';
        if (a === '仅退款') href = getApplyRefundOnlyUrl(order.id);
        if (a === '退换/售后') href = 'apply_refund.html?orderId=' + encodeURIComponent(order.id);
        if (a === '评价') href = 'write_review.html';
        if (a === '再次购买') href = 'product_detail.html';
        actionsHtml += '<a href="' + href + '" class="btn-sm' + cls + '" onclick="event.stopPropagation()">' + a + '</a>';
      });
      actionsHtml = moreWrapHtml + actionsHtml;

      var totalHtml = '共' + order.products.reduce(function(s, p) { return s + p.qty; }, 0) + '件 合计 ';
      if (order.payMode === 'beans') {
        totalHtml += '<b>' + order.beansUsed + '苏银豆</b>';
      } else if (order.payMode === 'combo') {
        totalHtml += '<b>' + order.beansUsed + '苏银豆+&yen;' + order.cashPaid + '</b>';
      } else {
        totalHtml += '<b>&yen;' + order.total + '</b>';
      }

      var headerStatusText = order.statusText;
      var headerStatusClass = 'order-status ' + order.status;
      if (currentTab === 'aftersale') {
        headerStatusText = getAfterSaleTypeLabel(order);
        headerStatusClass = 'order-status after-sale-header type-' + getAfterSaleTypeKey(order);
      } else if (deliveredView) {
        headerStatusText = getDeliveredTabOrderStatusLabel(order);
      } else if (currentTab === 'all') {
        headerStatusText = getAllTabOrderStatusLabel(order);
      }

      html += '<div class="order-card">' +
        '<div class="order-card-header">' +
          '<span class="order-no">' + order.id + '</span>' +
          '<span class="' + headerStatusClass + '">' + headerStatusText + '</span>' +
        '</div>' +
        '<div class="order-card-body" onclick="location.href=\'order_detail.html\'">' + prodsHtml + '</div>' +
        pkgHtml +
        '<div class="order-card-footer">' +
          '<span class="total-text">' + totalHtml + '</span>' +
          '<div class="action-btns">' + actionsHtml + '</div>' +
        '</div>' +
      '</div>';
    });
    document.getElementById('orderList').innerHTML = html;

    var aftersaleCount = 0;
    orders.forEach(function(o) {
      if (orderQualifiesForAftersaleTab(o)) aftersaleCount++;
    });
    var badgeEl = document.getElementById('aftersaleTabBadge');
    if (badgeEl) {
      if (aftersaleCount > 0) {
        badgeEl.textContent = String(aftersaleCount);
        badgeEl.style.display = 'flex';
      } else {
        badgeEl.style.display = 'none';
      }
    }
  }

  // Tab switch
  document.querySelectorAll('.order-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.order-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentTab = this.dataset.tab;
      renderOrders();
    });
  });

  bindOrderListActionMoreMenusOnce();
  renderOrders();
})();
</script>
</body>
</html>
