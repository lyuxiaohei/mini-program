<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的订单 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Tab bar */
  .order-tabs-bar {
    position: sticky;
    top: 88px;
    z-index: 50;
    background: #fff;
    display: flex;
    border-bottom: 1px solid #f0f0f0;
  }
  .order-tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    position: relative;
  }
  .order-tab.active {
    color: #333;
    font-weight: 600;
  }
  .order-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 2px;
    background: #ff6034;
    border-radius: 1px;
  }
  .order-tab .tab-badge {
    position: absolute;
    top: 6px;
    right: calc(50% - 22px);
    background: #ee0a24;
    color: #fff;
    font-size: 9px;
    min-width: 14px;
    height: 14px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
  }

  /* Order card */
  .order-list-content {
    padding: 8px 12px;
  }
  .order-card {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .order-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 12px 8px;
    border-bottom: 1px solid #f5f5f5;
  }
  .order-card-header .order-no {
    font-size: 12px;
    color: #999;
  }
  .order-card-header .order-status {
    font-size: 13px;
    font-weight: 600;
  }
  .order-card-header .order-status.pending { color: #ff9800; }
  .order-card-header .order-status.shipped { color: #2196f3; }
  .order-card-header .order-status.delivered { color: #4caf50; }
  .order-card-header .order-status.completed { color: #999; }
  .order-card-header .order-status.cancelled { color: #999; }

  .order-card-body {
    padding: 10px 12px;
    cursor: pointer;
  }
  .order-product-row {
    display: flex;
    gap: 10px;
    padding: 6px 0;
  }
  .order-product-row .op-img {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .order-product-row .op-img img { width: 100%; height: 100%; object-fit: cover; }
  .order-product-row .op-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .order-product-row .op-name {
    font-size: 13px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .order-product-row .op-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .order-product-row .op-price { font-size: 14px; font-weight: 600; color: #333; }
  .order-product-row .op-qty { font-size: 12px; color: #999; }

  .order-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px 12px;
    border-top: 1px solid #f5f5f5;
  }
  .order-card-footer .total-text {
    font-size: 13px;
    color: #666;
  }
  .order-card-footer .total-text b { color: #333; font-size: 15px; }
  .order-card-footer .action-btns {
    display: flex;
    gap: 8px;
  }
  .btn-sm {
    padding: 5px 14px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #666;
  }
  .btn-sm:active { opacity: 0.7; }
  .btn-sm.primary {
    border-color: #ff6034;
    color: #ff6034;
  }
  .btn-sm.danger {
    border-color: #ee0a24;
    color: #ee0a24;
  }

  /* Empty */
  .order-empty {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 12px;
  }
  .order-empty svg { width: 64px; height: 64px; color: #ddd; }
  .order-empty p { font-size: 14px; color: #999; }
  .order-empty a {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    padding: 8px 24px;
    border-radius: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">我的订单</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="order-tabs-bar" id="orderTabs">
    <div class="order-tab active" data-tab="all">全部</div>
    <div class="order-tab" data-tab="pending">待付款<span class="tab-badge">1</span></div>
    <div class="order-tab" data-tab="shipped">待发货</div>
    <div class="order-tab" data-tab="delivered">待收货<span class="tab-badge">2</span></div>
    <div class="order-tab" data-tab="completed">已完成</div>
  </div>

  <!-- Order List -->
  <div class="page-scroll" style="padding-top: 0; padding-bottom: 16px;">
    <div class="order-list-content" id="orderList"></div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var orders = [
    {
      id: 'JS2026040888001',
      status: 'pending',
      statusText: '待付款',
      total: '171.90',
      products: [
        { name: '日本进口保温杯 不锈钢真空便携水杯500ml', spec: '白色 500ml', price: '68.00', qty: 1, img: 'https://images.unsplash.com/photo-1602143407151-7111542de6e8?auto=format&fit=crop&w=200&h=200&q=80' },
        { name: '无线蓝牙降噪耳机 迷你入耳式超长续航', spec: '黑色 标准版', price: '89.00', qty: 1, img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=200&h=200&q=80' },
        { name: '纯棉短袖T恤男女款 夏季宽松百搭潮流', spec: '白色 L码', price: '39.90', qty: 1, img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=200&h=200&q=80' }
      ],
      actions: ['取消订单', '去支付']
    },
    {
      id: 'JS2026040677002',
      status: 'shipped',
      statusText: '待发货',
      total: '89.00',
      products: [
        { name: '无线蓝牙降噪耳机 迷你入耳式超长续航', spec: '白色 标准版', price: '89.00', qty: 1, img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=200&h=200&q=80' }
      ],
      actions: ['查看详情']
    },
    {
      id: 'JS2026040355003',
      status: 'delivered',
      statusText: '待收货',
      total: '159.00',
      products: [
        { name: '时尚运动鞋 透气网面跑步鞋轻便缓震', spec: '黑色 42码', price: '159.00', qty: 1, img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=200&h=200&q=80' }
      ],
      actions: ['查看物流', '确认收货']
    },
    {
      id: 'JS2026033122004',
      status: 'delivered',
      statusText: '运输中',
      total: '199.00',
      products: [
        { name: '智能手表 多功能运动健康监测手环', spec: '黑色 标准版', price: '199.00', qty: 1, img: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=200&h=200&q=80' }
      ],
      actions: ['查看物流', '确认收货']
    },
    {
      id: 'JS2026032555005',
      status: 'completed',
      statusText: '已完成',
      total: '79.00',
      products: [
        { name: '潮流太阳眼镜 防紫外线偏光墨镜', spec: '黑色', price: '79.00', qty: 1, img: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?auto=format&fit=crop&w=200&h=200&q=80' }
      ],
      actions: ['再次购买', '评价']
    },
    {
      id: 'JS2026032011006',
      status: 'completed',
      statusText: '已完成',
      total: '128.00',
      products: [
        { name: '精致蛋糕礼盒 手工制作生日庆典甜品', spec: '草莓味 8寸', price: '128.00', qty: 1, img: 'https://images.unsplash.com/photo-1578985545062-69928b1d9587?auto=format&fit=crop&w=200&h=200&q=80' }
      ],
      actions: ['再次购买', '评价']
    }
  ];

  var currentTab = 'all';

  function renderOrders() {
    var filtered = currentTab === 'all' ? orders : orders.filter(function(o) { return o.status === currentTab; });
    if (filtered.length === 0) {
      document.getElementById('orderList').innerHTML =
        '<div class="order-empty" style="display:flex;">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 10h20"/></svg>' +
          '<p>暂无相关订单</p>' +
          '<a href="home_page.html">去逛逛</a>' +
        '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(order) {
      var prodsHtml = '';
      order.products.forEach(function(p) {
        prodsHtml += '<div class="order-product-row">' +
          '<a href="product_detail.html" class="op-img"><img src="' + p.img + '" alt=""></a>' +
          '<div class="op-info">' +
            '<div class="op-name">' + p.name + '</div>' +
            '<div class="op-bottom">' +
              '<span class="op-price">&yen;' + p.price + '</span>' +
              '<span class="op-qty">x' + p.qty + '</span>' +
            '</div>' +
          '</div>' +
        '</div>';
      });

      var actionsHtml = '';
      order.actions.forEach(function(a, i) {
        var cls = i === order.actions.length - 1 ? ' primary' : '';
        if (a === '去支付') cls = ' danger';
        var href = '#';
        if (a === '查看详情') href = 'order_detail.html';
        if (a === '查看物流') href = 'logistics.html';
        if (a === '去支付') href = 'payment.html';
        if (a === '取消订单') href = 'order_cancel.html';
        actionsHtml += '<a href="' + href + '" class="btn-sm' + cls + '">' + a + '</a>';
      });

      html += '<div class="order-card">' +
        '<div class="order-card-header">' +
          '<span class="order-no">' + order.id + '</span>' +
          '<span class="order-status ' + order.status + '">' + order.statusText + '</span>' +
        '</div>' +
        '<div class="order-card-body" onclick="location.href=\'order_detail.html\'">' + prodsHtml + '</div>' +
        '<div class="order-card-footer">' +
          '<span class="total-text">共' + order.products.length + '件 合计 <b>&yen;' + order.total + '</b></span>' +
          '<div class="action-btns">' + actionsHtml + '</div>' +
        '</div>' +
      '</div>';
    });
    document.getElementById('orderList').innerHTML = html;
  }

  // Tab switch
  document.querySelectorAll('.order-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.order-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentTab = this.dataset.tab;
      renderOrders();
    });
  });

  renderOrders();
})();
</script>
</body>
</html>
