<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>确认订单（电影票） - 福利商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>

  /* Address section */
  .address-section {
    background: var(--card-bg);
    padding: var(--space-lg) 12px;
    margin-bottom: var(--space-sm);
    position: relative;
    cursor: pointer;
  }
  .address-section:active { background: var(--hover-bg); }
  .address-section::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: repeating-linear-gradient(90deg, var(--primary-start) 0, var(--primary-start) 8px, var(--price-color) 8px, var(--price-color) 16px, var(--warning-color) 16px, var(--warning-color) 24px);
  }
  .address-row {
    display: flex;
    align-items: flex-start;
    gap: var(--space-sm);
  }
  .address-row svg { width: 20px; height: 20px; color: var(--primary-start); flex-shrink: 0; margin-top: 2px; }
  .address-info { flex: 1; }
  .address-name-phone {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
    margin-bottom: var(--space-xs);
  }
  .address-detail {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .address-arrow {
    display: flex;
    align-items: center;
    color: var(--text-light);
    align-self: center;
  }
  .address-arrow svg { width: 16px; height: 16px; color: var(--text-light); }

  /* Product items */
  .order-products {
    background: var(--card-bg);
    padding: var(--space-md);
    margin-bottom: var(--space-sm);
  }
  .order-product-item {
    display: flex;
    gap: var(--space-md);
    padding: var(--space-sm) 0;
    border-bottom: 1px solid var(--bg-color);
  }
  .order-product-item:last-child { border-bottom: none; }
  .order-product-item .prod-img {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg-input);
  }
  .order-product-item .prod-img img { width: 100%; height: 100%; object-fit: cover; }
  .order-product-item .prod-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }
  .order-product-item .prod-name {
    font-size: var(--font-sm);
    color: var(--text-color);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .order-product-item .prod-spec {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }
  .order-product-item .prod-price-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .order-product-item .prod-price {
    color: var(--text-color);
    font-size: var(--font-base);
    font-weight: 600;
  }
  .order-product-item .prod-qty {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }

  /* Quantity control */
  .qty-control {
    display: flex;
    align-items: center;
  }
  .qty-btn {
    width: 24px;
    height: 24px;
    border: 1px solid var(--text-disabled);
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-base);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .qty-btn:first-child { border-radius: var(--radius-xs) 0 0 4px; }
  .qty-btn:last-child { border-radius: 0 var(--radius-xs) var(--radius-xs) 0; }
  .qty-btn:active { background: var(--bg-color); }
  .qty-btn.disabled { color: var(--text-disabled); pointer-events: none; }
  .qty-num {
    width: 32px;
    height: 24px;
    border-top: 1px solid var(--text-disabled);
    border-bottom: 1px solid var(--text-disabled);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: var(--font-sm);
    color: var(--text-color);
  }

  /* Options section */
  .order-options {
    background: var(--card-bg);
    margin-bottom: var(--space-sm);
  }
  .option-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md);
    border-bottom: 1px solid var(--bg-color);
    cursor: pointer;
  }
  .option-item:last-child { border-bottom: none; }
  .option-item:active { background: var(--hover-bg); }
  .option-item .opt-label { font-size: var(--font-base); color: var(--text-color); }
  .option-item .opt-value {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }
  .option-item .opt-value svg { width: 14px; height: 14px; }
  .option-item .opt-value.highlight { color: var(--primary-start); }

  /* Remark */
  .remark-row {
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md);
    margin-bottom: var(--space-sm);
    cursor: pointer;
  }
  .remark-row:active { background: var(--hover-bg); }
  .remark-row .rr-label { font-size: var(--font-base); color: var(--text-color); }
  .remark-row .rr-value {
    display: flex;
    align-items: center;
    gap: var(--space-xs);
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    max-width: 60%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .remark-row .rr-value svg { width: 14px; height: 14px; flex-shrink: 0; }

  .remark-drawer-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 300;
    display: none;
    align-items: flex-end;
  }
  .remark-drawer-overlay.show { display: flex; }
  .remark-drawer {
    width: 100%;
    background: var(--card-bg);
    border-radius: var(--radius-lg) 16px 0 0;
    padding: 0 var(--space-lg) var(--space-xl);
    animation: drawerUp .25s ease;
  }
  @keyframes drawerUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .remark-drawer-handle { width: 36px; height: 4px; border-radius: var(--radius-xs); background: var(--text-disabled); margin: var(--space-md) auto 14px; }
  .remark-drawer-title { font-size: var(--font-md); font-weight: 600; color: var(--text-color); margin-bottom: var(--space-md); }
  .remark-drawer textarea {
    width: 100%; height: 80px;
    border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: var(--space-md);
    font-size: var(--font-base); color: var(--text-color); resize: none; outline: none; box-sizing: border-box;
  }
  .remark-drawer textarea:focus { border-color: var(--primary-start); }
  .remark-drawer textarea::placeholder { color: var(--text-light); }
  .remark-drawer-counter { text-align: right; font-size: var(--font-sm); color: var(--text-light); margin-top: var(--space-xs); }
  .remark-drawer-counter .current { color: var(--text-tertiary); }
  .remark-drawer .drawer-btn {
    width: 100%; height: 44px; border: none; border-radius: var(--radius-xl);
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg); font-size: var(--font-md); font-weight: 600; cursor: pointer; margin-top: var(--space-md);
  }
  .remark-drawer .drawer-btn:active { opacity: .85; }

  /* Payment mode */
  .pay-mode-section {
    background: var(--card-bg);
    margin-bottom: var(--space-sm);
  }
  .pay-mode-title {
    padding: var(--space-md) 12px 8px;
    font-size: var(--font-base);
    font-weight: 600;
    color: var(--text-color);
    border-bottom: 1px solid var(--border-divider);
  }
  .pay-mode-item {
    display: flex;
    align-items: center;
    padding: var(--space-sm) 12px;
    border-bottom: 1px solid var(--bg-color);
    cursor: pointer;
  }
  .pay-mode-item:last-child { border-bottom: none; }
  .pay-mode-item:active { background: var(--hover-bg); }
  .pay-mode-item .pm-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: var(--space-md);
    flex-shrink: 0;
  }
  .pay-mode-item .pm-icon svg { width: 20px; height: 20px; color: var(--card-bg); }
  .pay-mode-item .pm-icon.beans { background: linear-gradient(135deg, var(--warning-color), var(--primary-start)); }
  .pay-mode-item .pm-icon.cash { background: linear-gradient(135deg, var(--success-color), var(--info-color)); }
  .pay-mode-item .pm-icon.combo { background: linear-gradient(135deg, var(--primary-start), var(--price-color)); }
  .pay-mode-item .pm-info { flex: 1; }
  .pay-mode-item .pm-name { font-size: var(--font-sm); color: var(--text-color); font-weight: 500; }
  .pay-mode-item .pm-desc { font-size: var(--font-sm); color: var(--text-tertiary); margin-top: 2px; }
  .pay-mode-item .pm-desc .hl { color: var(--primary-start); }
  .pay-mode-item .pm-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--text-disabled);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .pay-mode-item .pm-radio.checked {
    background: var(--primary-start);
    border-color: var(--primary-start);
  }
  .pay-mode-item .pm-radio.checked::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid var(--card-bg);
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  /* Pay channel (WeChat/Alipay) */
  .pay-channel-section {
    display: none;
    background: var(--card-bg);
    margin-bottom: var(--space-sm);
    padding: 0 var(--space-md) var(--space-sm);
  }
  .pay-channel-section.show { display: block; }
  .pay-channel-item {
    display: flex;
    align-items: center;
    padding: var(--space-md) 0;
    border-bottom: 1px solid var(--bg-color);
    cursor: pointer;
  }
  .pay-channel-item:last-child { border-bottom: none; }
  .pay-channel-item .ch-icon {
    width: 28px;
    height: 28px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: var(--space-sm);
  }
  .pay-channel-item .ch-icon svg { width: 18px; height: 18px; color: var(--card-bg); }
  .pay-channel-item .ch-icon.wechat { background: var(--wechat-green); }
  .pay-channel-item .ch-icon.alipay { background: var(--info-light); }
  .pay-channel-item .ch-name { flex: 1; font-size: var(--font-sm); color: var(--text-color); }
  .pay-channel-item .ch-radio {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--text-disabled);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .pay-channel-item .ch-radio.checked {
    background: var(--primary-start);
    border-color: var(--primary-start);
  }
  .pay-channel-item .ch-radio.checked::after {
    content: '';
    width: 5px;
    height: 9px;
    border: 2px solid var(--card-bg);
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }

  /* Combo points input */
  .combo-input-section {
    display: none;
    background: var(--card-bg);
    margin-bottom: var(--space-sm);
    padding: var(--space-md);
  }
  .combo-input-section.show { display: block; }
  .combo-input-row {
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }
  .combo-input-row label {
    font-size: var(--font-sm);
    color: var(--text-color);
    white-space: nowrap;
  }
  .combo-input-row input {
    flex: 1;
    height: 28px;
    border: 1px solid var(--text-disabled);
    border-radius: var(--radius-sm);
    padding: 0 var(--space-sm);
    font-size: var(--font-sm);
    color: var(--text-color);
    text-align: center;
    outline: none;
  }
  .combo-input-row input:focus { border-color: var(--primary-start); }
  .combo-input-row .unit {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    white-space: nowrap;
  }
  .combo-input-row .max-btn {
    font-size: var(--font-sm);
    color: var(--primary-start);
    background: var(--warning-bg);
    border: 1px solid var(--warning-light);
    border-radius: var(--radius-xs);
    padding: var(--space-xs) 8px;
    cursor: pointer;
    white-space: nowrap;
  }
  .combo-input-row .max-btn:active { background: var(--warning-bg); }
  .combo-input-hint {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    margin-top: var(--space-sm);
  }
  .combo-input-hint .hl { color: var(--primary-start); }
  .combo-input-error {
    font-size: var(--font-sm);
    color: var(--price-color);
    margin-top: var(--space-xs);
    display: none;
  }
  .combo-input-error.show { display: block; }

  /* Summary row clickable */
  .summary-row.clickable {
    cursor: pointer;
    padding: var(--space-sm) 0;
  }
  .summary-row.clickable:active { opacity: .7; }
  .summary-row.clickable .sr-arrow { width: 14px; height: 14px; color: var(--text-light); flex-shrink: 0; margin-left: var(--space-xs); }

  /* Product allocation inline */
  .prod-alloc {
    display: none;
    align-items: center;
    justify-content: space-between;
    margin-top: var(--space-xs);
    padding-top: var(--space-xs);
    border-top: 1px dashed var(--border-divider);
  }
  .prod-alloc.show { display: flex; }
  .prod-alloc .alloc-tag {
    font-size: var(--font-xs);
    padding: 1px var(--space-xs);
    border-radius: var(--radius-xs);
    white-space: nowrap;
  }
  .alloc-tag.matched { background: var(--success-bg); color: var(--success-color); }
  .alloc-tag.unmatched { background: var(--bg-color); color: var(--text-muted); }
  .prod-alloc .alloc-detail {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    white-space: nowrap;
  }
  .alloc-detail .alloc-points { color: var(--primary-start); font-weight: 500; }
  .alloc-detail .alloc-cash { color: var(--text-color); }

  /* Price summary */
  .price-summary {
    background: var(--card-bg);
    padding: var(--space-md);
    margin-bottom: var(--space-sm);
  }
  .summary-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-xs) 0;
    font-size: var(--font-sm);
    color: var(--text-secondary);
  }
  .summary-row.total {
    padding-top: var(--space-sm);
    margin-top: var(--space-xs);
    border-top: 1px solid var(--bg-color);
    font-size: var(--font-base);
    color: var(--text-color);
    font-weight: 600;
  }
  .summary-row .total-price {
    color: var(--price-color);
    font-size: var(--font-lg);
    font-weight: 700;
  }
  .summary-row .total-price .symbol { font-size: var(--font-sm); }

  /* Submit bar */
  .submit-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    border-top: 1px solid var(--border-color);
    z-index: 200;
    padding: 0 var(--space-md) var(--space-sm);
  }
  .submit-bar .total-area {
    display: flex;
    align-items: baseline;
    gap: var(--space-xs);
  }
  .submit-bar .total-label { font-size: var(--font-base); color: var(--text-color); }
  .submit-bar .total-num { font-size: var(--font-xl); color: var(--price-color); font-weight: 700; }
  .submit-bar .total-num .symbol { font-size: var(--font-sm); }
  .submit-bar .btn-submit {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    color: var(--card-bg);
    border: none;
    padding: 0 var(--space-2xl);
    height: 42px;
    font-size: var(--font-md);
    font-weight: 600;
    cursor: pointer;
    border-radius: var(--radius-xl);
  }
  .submit-bar .btn-submit:active { opacity: 0.85; }

  /* Pay popup - centered dialog */
  .pay-popup-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .pay-popup-overlay.show { display: flex; }
  .pay-popup {
    position: relative;
    width: calc(100% - 48px);
    max-width: 320px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    z-index: 301;
    overflow: hidden;
    animation: popupFadeIn 0.2s ease;
  }
  @keyframes popupFadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Step 1: confirm */
  .pay-step { display: none; }
  .pay-step.active { display: block; }
  .pay-popup-header {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--space-xl) 16px 0;
    position: relative;
  }
  .pay-popup-header .popup-title {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--text-color);
  }
  .pay-popup-header .popup-close {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-tertiary);
  }
  .pay-popup-header .popup-close svg { width: 18px; height: 18px; }
  .pay-popup-amount {
    text-align: center;
    padding: var(--space-xl) 16px 12px;
  }
  .pay-popup-amount .amount {
    font-size: 36px;
    font-weight: 700;
    color: var(--text-color);
  }
  .pay-popup-amount .amount .symbol { font-size: var(--font-xl); }
  .pay-popup-channel {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin: var(--space-sm) 16px 0;
    padding: var(--space-md) 14px;
    background: var(--bg-input);
    border-radius: var(--radius-md);
  }
  .pay-popup-channel .ch-icon {
    width: 32px;
    height: 32px;
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .pay-popup-channel .ch-icon svg { width: 20px; height: 20px; color: var(--card-bg); }
  .pay-popup-channel .ch-name { flex: 1; font-size: var(--font-base); color: var(--text-color); font-weight: 500; }
  .pay-popup-beans {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: var(--space-sm) 16px 0;
    padding: var(--space-md) 14px;
    background: var(--card-bg)9f5;
    border-radius: var(--radius-sm);
    font-size: var(--font-sm);
    color: var(--text-secondary);
  }
  .pay-popup-beans .val { color: var(--primary-start); font-weight: 600; }
  .pay-popup-btn {
    display: block;
    width: calc(100% - 32px);
    margin: var(--space-xl) 16px 24px;
    height: 44px;
    background: var(--wechat-green);
    color: var(--card-bg);
    border: none;
    border-radius: var(--radius-sm);
    font-size: var(--font-md);
    font-weight: 600;
    cursor: pointer;
  }
  .pay-popup-btn:active { opacity: 0.85; }

  /* Step 2: password */
  .pwd-header {
    text-align: center;
    padding: var(--space-xl) 16px 4px;
    position: relative;
  }
  .pwd-header .pwd-back {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-tertiary);
  }
  .pwd-header .pwd-back svg { width: 18px; height: 18px; }
  .pwd-header .pwd-title {
    font-size: var(--font-lg);
    font-weight: 600;
    color: var(--text-color);
  }
  .pwd-body {
    text-align: center;
    padding: var(--space-lg) 16px 0;
  }
  .pwd-body .pwd-channel-name {
    font-size: var(--font-base);
    color: var(--text-color);
    font-weight: 500;
    margin-bottom: var(--space-md);
  }
  .pwd-body .pwd-amount {
    font-size: 28px;
    font-weight: 700;
    color: var(--text-color);
    margin-bottom: var(--space-xl);
  }
  .pwd-body .pwd-amount .symbol { font-size: var(--font-md); }
  .pwd-grid {
    display: flex;
    justify-content: center;
    gap: var(--space-sm);
    padding: 0 var(--space-xl);
  }
  .pwd-dot {
    width: 40px;
    height: 44px;
    border: 1px solid var(--text-disabled);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--card-bg);
  }
  .pwd-dot::after {
    content: '';
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text-color);

<script>
(function() {
  var POINTS_BATCHES = [
    { id: 'B005', type: 'general', label: '通兑商品积分', name: '签到积分', subLabel: '全场通用', balance: 12000, matchAttr: null, matchValue: null, expireDate: '2027-01-01 00:00:00' },
    { id: 'B006', type: 'general', label: '通兑商品积分', name: '活动积分', subLabel: '全场通用', balance: 50000, matchAttr: null, matchValue: null, expireDate: '2027-06-30 00:00:00' }
  ];

  var MOVIE_CARDS = [
    { id: 'M001', name: '单人观影次卡', remaining: 3, pricePerUse: 3500, expireDate: '2026-12-31 23:59:59' },
    { id: 'M002', name: 'VIP观影次卡', remaining: 1, pricePerUse: 6000, expireDate: '2026-09-30 23:59:59' }
  ];

  var movieActive = false;
  var pointsActive = false;
  var selectedMovieCard = null;
  var selectedBatch = null;
  var currentMode = 'cash';
  var currentChannel = 'wechat';

  var ticketPrice = 5000;
  var ticketQty = 1;

  function getBatch(id) {
    for (var i = 0; i < POINTS_BATCHES.length; i++) {
      if (POINTS_BATCHES[i].id === id) return POINTS_BATCHES[i];
    }
    return null;
  }

  function getMovieCard(id) {
    for (var i = 0; i < MOVIE_CARDS.length; i++) {
      if (MOVIE_CARDS[i].id === id) return MOVIE_CARDS[i];
    }
    return null;
  }

  function getMovieCardCover() {
    if (!selectedMovieCard) return { uses: 0, value: 0 };
    var card = getMovieCard(selectedMovieCard);
    if (!card) return { uses: 0, value: 0 };
    var uses = Math.min(card.remaining, ticketQty);
    var perUse = Math.min(card.pricePerUse, ticketPrice);
    return { uses: uses, value: uses * perUse };
  }

  function getMaxConsumable() {
    var b = getBatch(selectedBatch);
    if (!b) return 0;
    return b.balance;
  }

  function findBestBatch() {
    var best = null, bestVal = 0;
    POINTS_BATCHES.forEach(function(b) {
      if (b.balance > bestVal) { bestVal = b.balance; best = b.id; }
    });
    return best;
  }

  function getTotal() {
    return ticketPrice * ticketQty;
  }

  function usesCash(mode) { return mode === 'cash' || mode === 'combo'; }

  // ===== Entry Rows =====

  function renderMovieEntry() {
    if (movieActive && selectedMovieCard) {
      var card = getMovieCard(selectedMovieCard);
      var total = getTotal();
      var used = Math.min(getMovieCardCover().value, total);
      return '<div class="summary-row clickable" onclick="goToMovieCardSelect()"><span>' + card.name + '</span><div style="display:flex;align-items:center;gap:2px;"><span style="color:var(--primary-start);">-¥' + (used / 100).toFixed(2) + '</span><svg class="sr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>';
    }
    return '<div class="summary-row clickable" onclick="goToMovieCardSelect()"><span>电影次卡</span><div style="display:flex;align-items:center;gap:2px;"><span style="color:var(--text-tertiary);">不使用</span><svg class="sr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>';
  }

  function renderPointsEntry() {
    if (pointsActive && selectedBatch) {
      var b = getBatch(selectedBatch);
      var total = getTotal();
      var pointsUsed = Math.min(getMaxConsumable(), total);
      return '<div class="summary-row clickable" onclick="goToBatchSelect()"><span>' + b.name + '抵扣</span><div style="display:flex;align-items:center;gap:2px;"><span style="color:var(--primary-start);">-' + pointsUsed + '积分（¥' + (pointsUsed / 100).toFixed(2) + '）</span><svg class="sr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>';
    }
    return '<div class="summary-row clickable" onclick="goToBatchSelect()"><span>积分抵扣</span><div style="display:flex;align-items:center;gap:2px;"><span style="color:var(--text-tertiary);">不使用</span><svg class="sr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></div></div>';
  }

  // ===== Payment Modes =====

  function payModeHtml(mode, name) {
    return '<div class="pay-mode-item" data-mode="' + mode + '" onclick="selectPayMode(this)">' +
      '<div class="pm-info"><div class="pm-name">' + name + '</div></div>' +
      '<div class="pm-radio"></div></div>';
  }

  function renderPayModes() {
    var html = '';
    var total = getTotal();

    if (!movieActive && !pointsActive) {
      html += payModeHtml('cash', '现金支付');
      currentMode = 'cash';
    }
    else if (movieActive) {
      var cardValue = getMovieCardCover().value;
      if (cardValue >= total) {
        currentMode = 'movie';
      } else {
        html += payModeHtml('combo', '组合支付');
        currentMode = 'combo';
      }
    }
    else if (pointsActive) {
      html += payModeHtml('points', '积分支付');
      if (getMaxConsumable() < total) {
        html += payModeHtml('combo', '组合支付');
      }
      currentMode = 'points';
    }

    document.getElementById('payModeList').innerHTML = html;

    var first = document.querySelector('#payModeList .pay-mode-item');
    if (first) {
      first.querySelector('.pm-radio').classList.add('checked');
      currentMode = first.dataset.mode;
    }

    renderSummary();
  }

  // ===== Price Summary =====

  function calcAmounts() {
    var total = getTotal();
    var movieUsed = 0, pointsUsed = 0;
    if (movieActive) {
      movieUsed = Math.min(getMovieCardCover().value, total);
    } else if (pointsActive) {
      pointsUsed = Math.min(getMaxConsumable(), total);
    }
    var cashAmount = total - movieUsed - pointsUsed;
    if (cashAmount < 0) cashAmount = 0;
    return { total: total, movieUsed: movieUsed, pointsUsed: pointsUsed, cashAmount: cashAmount };
  }

  function renderSummary() {
    var info = calcAmounts();
    var html = '<div class="summary-row"><span>票款金额</span><span>¥' + (info.total / 100).toFixed(2) + '</span></div>';

    html += renderMovieEntry();
    html += renderPointsEntry();

    if (info.cashAmount > 0 && usesCash(currentMode)) {
      html += '<div class="summary-row"><span>现金支付</span><span>¥' + (info.cashAmount / 100).toFixed(2) + '</span></div>';
    }
    html += '<div class="summary-row total"><span>实付金额</span><span class="total-price"><span class="symbol">¥</span>' + (info.cashAmount / 100).toFixed(2) + '</span></div>';
    document.getElementById('priceSummary').innerHTML = html;

    document.getElementById('bottomTotal').innerHTML = '<span class="symbol">¥</span>' + (info.cashAmount / 100).toFixed(2);
    document.getElementById('btnSubmit').textContent = '立即支付';

    document.getElementById('payChannel').classList.toggle('show', usesCash(currentMode));

    var payModeSection = document.querySelector('.pay-mode-section');
    if (payModeSection) {
      payModeSection.style.display = (movieActive || pointsActive) ? '' : 'none';
    }
  }

  // ===== Navigation =====

  window.goToMovieCardSelect = function() {
    localStorage.setItem('nav_source', 'movie');
    if (selectedMovieCard) localStorage.setItem('selected_movie_card_id', selectedMovieCard);
    location.href = 'movie_card_select.html';
  };

  window.goToBatchSelect = function() {
    localStorage.setItem('nav_source', 'batch');
    localStorage.setItem('order_type', 'movie');
    localStorage.setItem('return_page', 'order_movie.html');
    if (selectedBatch) localStorage.setItem('selected_batch_id', selectedBatch);
    location.href = 'points_batch_select.html';
  };

  // ===== Payment Mode Selection =====

  window.selectPayMode = function(el) {
    document.querySelectorAll('#payModeList .pay-mode-item .pm-radio').forEach(function(r) { r.classList.remove('checked'); });
    el.querySelector('.pm-radio').classList.add('checked');
    currentMode = el.dataset.mode;
    renderSummary();
  };

  window.selectChannel = function(el) {
    document.querySelectorAll('.pay-channel-item .ch-radio').forEach(function(r) { r.classList.remove('checked'); });
    el.querySelector('.ch-radio').classList.add('checked');
    currentChannel = el.dataset.channel;
    renderSummary();
  };

  // ===== Quantity Buttons =====

  document.querySelectorAll('.qty-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (this.dataset.action === 'plus' && ticketQty < 10) ticketQty++;
      else if (this.dataset.action === 'minus' && ticketQty > 1) ticketQty--;
      document.querySelector('.qty-num').textContent = ticketQty;
      document.querySelector('[data-action="minus"]').classList.toggle('disabled', ticketQty <= 1);
      renderSummary();
    });
  });

  // ===== Remark Drawer =====

  document.getElementById('remarkInput').addEventListener('input', function() {
    document.getElementById('remarkCount').textContent = this.value.length;
  });

  window.openRemarkDrawer = function() {
    document.getElementById('remarkDrawer').classList.add('show');
  };

  window.closeRemarkDrawer = function(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('remarkDrawer').classList.remove('show');
  };

  window.confirmRemark = function() {
    var val = document.getElementById('remarkInput').value.trim();
    document.getElementById('remarkPreview').textContent = val || '选填';
    document.getElementById('remarkDrawer').classList.remove('show');
  };

  // ===== Payment Popup =====

  var channelData = {
    wechat: { name: '微信支付', color: 'var(--wechat-green)' },
    alipay: { name: '支付宝', color: 'var(--info-light)' }
  };

  window.handleSubmit = function() {
    if (!usesCash(currentMode)) { location.href = 'pay_success.html'; return; }
    var info = calcAmounts();
    var ch = channelData[currentChannel] || channelData.wechat;
    document.getElementById('popupAmount').innerHTML = '<span class="symbol">&yen;</span>' + (info.cashAmount / 100).toFixed(2);
    document.getElementById('popupChIcon').style.background = ch.color;
    document.getElementById('popupChName').textContent = ch.name;
    document.getElementById('payStep1').classList.add('active');
    document.getElementById('payStep2').classList.remove('active');
    document.getElementById('pwdInput').value = '';
    updatePwdDots();
    document.getElementById('payPopupOverlay').classList.add('show');
    document.getElementById('payPopupOverlay').onclick = function(e) { if (e.target === this) closePayPopup(); };
  };

  window.closePayPopup = function() { document.getElementById('payPopupOverlay').classList.remove('show'); };

  window.showPwdStep = function() {
    var info = calcAmounts();
    var ch = channelData[currentChannel] || channelData.wechat;
    document.getElementById('pwdChannelName').textContent = ch.name;
    document.getElementById('pwdAmount').innerHTML = '<span class="symbol">&yen;</span>' + (info.cashAmount / 100).toFixed(2);
    document.getElementById('payStep1').classList.remove('active');
    document.getElementById('payStep2').classList.add('active');
    document.getElementById('pwdInput').value = '';
    updatePwdDots();
    setTimeout(function() { document.getElementById('pwdInput').focus(); }, 100);
  };

  window.showConfirmStep = function() {
    document.getElementById('payStep2').classList.remove('active');
    document.getElementById('payStep1').classList.add('active');
  };

  function updatePwdDots() {
    var val = document.getElementById('pwdInput').value;
    document.querySelectorAll('.pwd-dot').forEach(function(dot, i) { dot.classList.toggle('filled', i < val.length); });
  }

  document.getElementById('pwdInput').addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 6);
    updatePwdDots();
    if (this.value.length === 6) { setTimeout(function() { location.href = 'pay_success.html'; }, 300); }
  });

  // ===== Init =====
  selectedMovieCard = localStorage.getItem('selected_movie_card_id') || null;
  selectedBatch = localStorage.getItem('selected_batch_id') || null;
  movieActive = !!selectedMovieCard;
  pointsActive = !!selectedBatch;

  renderPayModes();

  // ===== Handle page return =====
  window.addEventListener('pageshow', function(e) {
    var source = localStorage.getItem('nav_source');
    localStorage.removeItem('nav_source');

    if (source === 'movie') {
      var newCard = localStorage.getItem('selected_movie_card_id');
      if (newCard) {
        movieActive = true; selectedMovieCard = newCard;
        pointsActive = false; selectedBatch = null;
        localStorage.removeItem('selected_batch_id');
      } else { movieActive = false; selectedMovieCard = null; }
      renderPayModes();
    }
    else if (source === 'batch') {
      var newBatch = localStorage.getItem('selected_batch_id');
      if (newBatch) {
        pointsActive = true; selectedBatch = newBatch;
        movieActive = false; selectedMovieCard = null;
        localStorage.removeItem('selected_movie_card_id');
      } else { pointsActive = false; selectedBatch = null; }
      renderPayModes();
    }
  });
})();

</script>


<script src="../js/theme-switcher.js"></script>
</body>
</html>
