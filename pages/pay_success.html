<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>支付成功 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .success-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 20px;
    background: #fff;
  }
  .success-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4caf50, #2e7d32);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
    animation: scaleIn 0.4s ease;
  }
  @keyframes scaleIn {
    0% { transform: scale(0); }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .success-icon svg { width: 36px; height: 36px; color: #fff; }
  .success-title {
    font-size: 18px;
    font-weight: 700;
    color: #333;
    margin-bottom: 6px;
  }
  .success-desc {
    font-size: 13px;
    color: #999;
    margin-bottom: 20px;
  }

  /* Order info card */
  .order-info-card {
    background: #fff;
    margin: 8px 12px;
    border-radius: 12px;
    padding: 14px;
  }
  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
  }
  .info-row .label { color: #999; }
  .info-row .value { color: #333; font-weight: 500; }
  .info-row .value.price { color: #ee0a24; font-size: 16px; font-weight: 700; }

  /* Recommend */
  .rec-section {
    margin: 12px;
  }
  .rec-title {
    font-size: 14px;
    font-weight: 600;
    color: #333;
    text-align: center;
    margin-bottom: 10px;
  }

  /* Buttons */
  .success-actions {
    display: flex;
    gap: 12px;
    width: 100%;
    padding: 0 12px;
  }
  .btn-outline {
    flex: 1;
    height: 42px;
    border: 1px solid #ff6034;
    color: #ff6034;
    background: #fff;
    border-radius: 21px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    line-height: 42px;
  }
  .btn-outline:active { background: #fff5f0; }
  .btn-solid {
    flex: 1;
    height: 42px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    border: none;
    border-radius: 21px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    line-height: 42px;
  }
  .btn-solid:active { opacity: 0.85; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">支付结果</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll">

    <!-- Success Header -->
    <div class="success-container">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="success-title">支付成功</div>
      <div class="success-desc">感谢您的购买，商品将尽快为您发出</div>
      <div class="success-actions">
        <a href="order_detail.html" class="btn-outline">查看订单</a>
        <a href="home_page.html" class="btn-solid">返回首页</a>
      </div>
    </div>

    <!-- Order Info -->
    <div class="order-info-card">
      <div class="info-row">
        <span class="label">订单编号</span>
        <span class="value">JS2026040888001</span>
      </div>
      <div class="info-row">
        <span class="label">支付方式</span>
        <span class="value">苏银豆+现金组合</span>
      </div>
      <div class="info-row">
        <span class="label">苏银豆抵扣</span>
        <span class="value">172豆 (&yen;171.90)</span>
      </div>
      <div class="info-row">
        <span class="label">现金支付</span>
        <span class="value">&yen;0.00</span>
      </div>
      <div class="info-row">
        <span class="label">实付金额</span>
        <span class="value price">&yen;171.90</span>
      </div>
    </div>

    <!-- Recommend -->
    <div class="rec-section">
      <div class="rec-title">—— 猜你喜欢 ——</div>
      <div class="product-grid" id="recGrid"></div>
    </div>

  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var recProducts = [
    { name: '时尚运动鞋 透气网面跑步鞋', price: '159', original: '459', tag: '限时', sold: '8960', img: '../images/unsplash/1542291026-7eec264c27ff.jpg' },
    { name: '智能手表 多功能运动健康监测', price: '199', original: '599', tag: '爆款', sold: '3.5万', img: '../images/unsplash/1523275335684-37898b6baf30.jpg' },
    { name: '潮流太阳眼镜 防紫外线偏光墨镜', price: '79', original: '239', tag: '特惠', sold: '4.1万', img: '../images/unsplash/1572635196237-14b3f281503f.jpg' },
    { name: '精致蛋糕礼盒 手工制作甜品', price: '128', original: '258', tag: '热卖', sold: '3250', img: '../images/unsplash/1578985545062-69928b1d9587.jpg' }
  ];
  var html = '';
  recProducts.forEach(function(p) {
    html += '<a href="product_detail.html" class="product-card">' +
      '<div class="product-img"><img src="' + p.img + '" alt="' + p.name + '"></div>' +
      '<div class="product-info"><div class="product-name">' + p.name + '</div>' +
      '<div class="product-tags"><span class="tag">' + p.tag + '</span></div></div>' +
      '<div class="product-bottom">' +
        '<span class="price-now"><span class="symbol">&yen;</span>' + p.price + '</span>' +
        '<span class="price-old">&yen;' + p.original + '</span>' +
        '<span class="sold">已售' + p.sold + '</span>' +
      '</div></a>';
  });
  document.getElementById('recGrid').innerHTML = html;
})();
</script>
</body>
</html>
