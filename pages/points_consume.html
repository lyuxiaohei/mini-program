<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>兑换记录 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .consume-sub-nav {
    background: linear-gradient(180deg, rgba(65, 67, 72, 0.96) 0%, rgba(86, 83, 77, 0.92) 100%);
  }
  .consume-sub-nav .status-bar,
  .consume-sub-nav .nav-title,
  .consume-sub-nav .back-btn svg {
    color: #fff;
  }
  .consume-sub-nav .status-bar .icons svg {
    fill: #fff;
  }
  .title-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .title-wrap .bean {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffd56a, #ff9b3d);
  }
  .consume-page {
    background: #f5f6f8;
    min-height: calc(100vh - 88px);
  }
  .main {
    padding: 12px 12px 16px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .stat-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .stat-card {
    padding: 14px 10px;
    text-align: center;
  }
  .stat-card strong {
    display: block;
    font-size: 24px;
    color: #ee0a24;
    margin-bottom: 4px;
  }
  .stat-card span {
    font-size: 12px;
    color: #8a8f99;
  }
  .filter-bar {
    background: #fff;
    border-radius: 16px;
    margin-bottom: 12px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .time-select {
    width: 100%;
    height: 46px;
    border: none;
    background: transparent;
    padding: 0 16px;
    font-size: 14px;
    color: #222;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }
  .filter-select-wrap {
    position: relative;
  }
  .filter-select-wrap::after {
    content: "";
    position: absolute;
    right: 18px;
    top: 50%;
    width: 8px;
    height: 8px;
    border-right: 2px solid #98a2b3;
    border-bottom: 2px solid #98a2b3;
    transform: translateY(-65%) rotate(45deg);
    pointer-events: none;
  }
  .record-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .consume-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
    overflow: hidden;
    cursor: pointer;
  }
  .consume-card:active {
    opacity: 0.92;
  }
  .consume-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px;
  }
  .consume-thumb {
    width: 72px;
    height: 72px;
    border-radius: 12px;
    overflow: hidden;
    background: #f2f4f7;
    flex-shrink: 0;
  }
  .consume-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .consume-main {
    flex: 1;
    min-width: 0;
  }
  .consume-main strong {
    display: block;
    font-size: 14px;
    color: #222;
    margin: 0;
    line-height: 1.4;
  }
  .consume-main span {
    display: block;
    margin-top: 8px;
    font-size: 12px;
    color: #667085;
    line-height: 1.6;
  }
  .consume-side {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .consume-points {
    color: #f04d4f;
    font-size: 18px;
    font-weight: 700;
    white-space: nowrap;
  }
  .consume-arrow {
    font-size: 18px;
    color: #c4c8d0;
  }
  .consume-card.hidden {
    display: none;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="sub-nav consume-sub-nav">
    <div class="status-bar">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">
        <span class="title-wrap"><span class="bean"></span><span>兑换记录</span></span>
      </span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <div class="page-scroll consume-page">
    <div class="main">
      <div class="stats">
        <div class="stat-card">
          <strong>3</strong>
          <span>兑换次数</span>
        </div>
        <div class="stat-card">
          <strong>420</strong>
          <span>已消费积分</span>
        </div>
        <div class="stat-card">
          <strong>2,860</strong>
          <span>剩余积分</span>
        </div>
      </div>

      <div class="filter-bar">
        <div class="filter-select-wrap">
          <select id="timeSelect" class="time-select" aria-label="选择兑换记录时间">
            <option value="all">全部时间</option>
            <option value="2026">2026年</option>
            <option value="2025">2025年</option>
          </select>
        </div>
      </div>

      <div class="record-list">
        <div class="consume-card" data-year="2026" data-order-no="JS202604210001">
          <div class="consume-item">
            <div class="consume-thumb">
              <img src="../images/unsplash/1602143407151-7111542de6e8.jpg" alt="日本进口保温杯">
            </div>
            <div class="consume-main">
              <strong>日本进口保温杯 不锈钢真空便携水杯500ml</strong>
              <span>兑换时间：2026-04-21 09:26</span>
            </div>
            <div class="consume-side">
              <div class="consume-points">-120</div>
              <div class="consume-arrow">›</div>
            </div>
          </div>
        </div>

        <div class="consume-card" data-year="2026" data-order-no="JS202604180002">
          <div class="consume-item">
            <div class="consume-thumb">
              <img src="../images/unsplash/1505740420928-5e560c06d30e.jpg" alt="无线蓝牙降噪耳机">
            </div>
            <div class="consume-main">
              <strong>无线蓝牙降噪耳机 迷你入耳式超长续航</strong>
              <span>兑换时间：2026-04-18 14:08</span>
            </div>
            <div class="consume-side">
              <div class="consume-points">-80</div>
              <div class="consume-arrow">›</div>
            </div>
          </div>
        </div>

        <div class="consume-card" data-year="2026" data-order-no="JS202604090003">
          <div class="consume-item">
            <div class="consume-thumb">
              <img src="../images/unsplash/1542291026-7eec264c27ff.jpg" alt="时尚运动鞋">
            </div>
            <div class="consume-main">
              <strong>时尚运动鞋 透气网面跑步鞋轻便缓震</strong>
              <span>兑换时间：2026-04-09 19:42</span>
            </div>
            <div class="consume-side">
              <div class="consume-points">-220</div>
              <div class="consume-arrow">›</div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var timeSelect = document.getElementById('timeSelect');
  var cards = document.querySelectorAll('.consume-card');

  function updateList() {
    var selectedYear = timeSelect.value;
    cards.forEach(function(card) {
      var matched = selectedYear === 'all' || card.dataset.year === selectedYear;
      card.classList.toggle('hidden', !matched);
    });
  }

  cards.forEach(function(card) {
    card.addEventListener('click', function() {
      location.href = 'order_detail.html?orderNo=' + encodeURIComponent(card.dataset.orderNo);
    });
  });

  timeSelect.addEventListener('change', updateList);
  updateList();
})();
</script>
</body>
</html>
