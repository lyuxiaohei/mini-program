<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>积分变动明细 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .detail-sub-nav {
    background: linear-gradient(180deg, rgba(65, 67, 72, 0.96) 0%, rgba(86, 83, 77, 0.92) 100%);
  }
  .detail-sub-nav .status-bar,
  .detail-sub-nav .nav-title,
  .detail-sub-nav .back-btn svg {
    color: #fff;
  }
  .detail-sub-nav .status-bar .icons svg {
    fill: #fff;
  }
  .detail-title {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .detail-title .bean {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffd56a, #ff9b3d);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.35);
  }
  .detail-page {
    background: #f5f6f8;
    min-height: calc(100vh - 88px);
  }
  .hero-wrap {
    padding: 0 12px 12px;
    background: linear-gradient(180deg, rgba(86, 83, 77, 0.92) 0%, rgba(86, 83, 77, 0) 100%);
  }
  .summary-box {
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .record-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .summary-filter {
    display: flex;
    justify-content: flex-end;
    margin-top: 14px;
  }
  .year-select {
    height: 32px;
    border: 1px solid #eceef2;
    border-radius: 999px;
    padding: 0 12px;
    font-size: 12px;
    color: #444;
    background: #fafafb;
    outline: none;
  }
  .summary-title {
    font-size: 15px;
    font-weight: 700;
    color: #222;
    margin-bottom: 4px;
  }
  .summary-number {
    font-size: 30px;
    font-weight: 700;
    color: #ee0a24;
    white-space: nowrap;
  }
  .tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-top: 16px;
    padding-bottom: 2px;
  }
  .tabs::-webkit-scrollbar {
    display: none;
  }
  .tab {
    flex-shrink: 0;
    padding: 8px 12px;
    background: #f5f6f8;
    border-radius: 999px;
    font-size: 12px;
    color: #666;
    cursor: pointer;
  }
  .tab.active {
    background: #fff1eb;
    color: #ee0a24;
    font-weight: 600;
  }
  .main {
    padding: 0 12px 16px;
  }
  .record-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .record-card {
    background: #fff;
    border-radius: 16px;
    padding: 14px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .record-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .record-title {
    font-size: 16px;
    font-weight: 700;
    color: #222;
    line-height: 1.5;
  }
  .record-points {
    white-space: nowrap;
    font-size: 18px;
    font-weight: 700;
  }
  .record-points.plus {
    color: #12a150;
  }
  .record-points.minus,
  .record-points.expire {
    color: #ee0a24;
  }
  .record-meta {
    display: grid;
    gap: 6px;
    font-size: 12px;
    color: #667085;
    line-height: 1.6;
  }
  .record-meta-row {
    word-break: break-word;
  }
  .empty-state {
    display: none;
    padding: 28px 16px;
    text-align: center;
    font-size: 12px;
    color: #8a8f99;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .empty-state.active {
    display: block;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="sub-nav detail-sub-nav">
    <div class="status-bar">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">
        <span class="detail-title"><span class="bean"></span><span>积分变动明细</span></span>
      </span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <div class="page-scroll detail-page">
    <div class="hero-wrap">
      <div class="summary-box">
        <div class="record-row">
          <div>
            <div class="summary-title">当前可用积分</div>
          </div>
          <div class="summary-number">2,860</div>
        </div>
        <div class="summary-filter">
          <select id="yearSelect" class="year-select" aria-label="选择积分明细年份">
            <option value="all">全部时间</option>
            <option value="2026">2026年</option>
            <option value="2025">2025年</option>
          </select>
        </div>
        <div class="tabs">
          <span class="tab active" data-filter="all">全部</span>
          <span class="tab" data-filter="increase">增加</span>
          <span class="tab" data-filter="deduct">扣除</span>
          <span class="tab" data-filter="expire">失效</span>
        </div>
      </div>
    </div>

    <div class="main">
      <div id="recordList" class="record-list"></div>
      <div id="emptyState" class="empty-state">当前年份下暂无对应积分明细</div>
    </div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var yearSelect = document.getElementById('yearSelect');
  var recordList = document.getElementById('recordList');
  var emptyState = document.getElementById('emptyState');
  var currentFilter = 'all';

  var records = [
    {
      year: '2026',
      type: 'deduct',
      title: '订单消费扣减',
      points: 120,
      method: '扣除',
      time: '2026-04-08 09:15',
      content: '订单号：JS24040801，消费积分120',
      balance: '2,860',
      expireTime: ''
    },
    {
      year: '2026',
      type: 'increase',
      title: '订单退回积分',
      points: 120,
      method: '增加',
      time: '2026-04-08 09:03',
      content: '订单号：JS24040801，退回积分120',
      balance: '2,980',
      expireTime: '2026-06-30 23:59'
    },
    {
      year: '2026',
      type: 'increase',
      title: '春季会员活动补发',
      points: 200,
      method: '增加',
      time: '2026-04-07 14:22',
      content: '新增积分200（活动补发）',
      balance: '2,860',
      expireTime: '2026-05-18 23:59'
    },
    {
      year: '2026',
      type: 'deduct',
      title: '异常修正扣减',
      points: 60,
      method: '扣除',
      time: '2026-04-06 11:40',
      content: '扣除积分60（异常修正）',
      balance: '2,660',
      expireTime: ''
    },
    {
      year: '2025',
      type: 'increase',
      title: '年度补发积分',
      points: 100,
      method: '增加',
      time: '2025-12-18 16:25',
      content: '新增积分100，批次号Q25121801',
      balance: '2,720',
      expireTime: '2026-12-31 23:59'
    },
    {
      year: '2025',
      type: 'expire',
      title: '签到奖励积分失效',
      points: 80,
      method: '失效',
      time: '2025-11-30 23:59',
      content: '积分失效（2025年度到期）',
      balance: '2,620',
      expireTime: '2025-11-30 23:59'
    }
  ];

  function getPointsClass(type) {
    if (type === 'increase') return 'plus';
    if (type === 'expire') return 'expire';
    return 'minus';
  }

  function renderList() {
    var selectedYear = yearSelect.value;
    var filtered = records.filter(function(record) {
      var matchYear = selectedYear === 'all' || record.year === selectedYear;
      var matchFilter = currentFilter === 'all' || record.type === currentFilter;
      return matchYear && matchFilter;
    });

    recordList.innerHTML = filtered.map(function(record) {
      var pointsClass = getPointsClass(record.type);
      var pointPrefix = record.type === 'increase' ? '+' : '-';
      var expireTimeRow = record.expireTime
        ? '<div class="record-meta-row">失效时间：' + record.expireTime + '</div>'
        : '';
      return '' +
        '<div class="record-card">' +
          '<div class="record-head">' +
            '<div class="record-title">' + record.title + '</div>' +
            '<div class="record-points ' + pointsClass + '">' + pointPrefix + record.points + '</div>' +
          '</div>' +
          '<div class="record-meta">' +
            '<div class="record-meta-row">时间：' + record.time + '</div>' +
            '<div class="record-meta-row">方式：' + record.method + '</div>' +
            '<div class="record-meta-row">交易内容：' + record.content + '</div>' +
            expireTimeRow +
            '<div class="record-meta-row">余额：' + record.balance + '</div>' +
          '</div>' +
        '</div>';
    }).join('');

    emptyState.classList.toggle('active', filtered.length === 0);
  }

  document.querySelectorAll('.tab[data-filter]').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.tab[data-filter]').forEach(function(item) {
        item.classList.toggle('active', item === tab);
      });
      currentFilter = tab.dataset.filter;
      renderList();
    });
  });

  yearSelect.addEventListener('change', renderList);
  renderList();
})();
</script>
</body>
</html>
