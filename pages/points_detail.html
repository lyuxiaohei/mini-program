<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>积分明细 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Points header */
  .points-header {
    background: linear-gradient(135deg, #ff9800, #f57c00);
    padding: 24px 16px;
    color: #fff;
  }
  .points-label {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 8px;
  }
  .points-value {
    font-size: 40px;
    font-weight: 700;
  }
  .points-unit {
    font-size: 14px;
    font-weight: 400;
    margin-left: 4px;
  }

  /* Tab bar */
  .detail-tabs-bar {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    position: sticky;
    top: 88px;
    z-index: 50;
  }
  .detail-tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
    color: #666;
    cursor: pointer;
    position: relative;
  }
  .detail-tab:active { background: #f8f8f8; }
  .detail-tab.active {
    color: #ff9800;
    font-weight: 600;
  }
  .detail-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 2px;
    background: #ff9800;
    border-radius: 1px;
  }

  /* Detail list */
  .detail-list {
    padding: 12px;
  }
  .detail-item {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    padding: 14px;
    display: flex;
    align-items: center;
  }
  .detail-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .detail-icon svg { width: 20px; height: 20px; color: #fff; }
  .detail-icon.income { background: linear-gradient(135deg, #4caf50, #2e7d32); }
  .detail-icon.expense { background: linear-gradient(135deg, #ff9800, #f57c00); }

  .detail-info { flex: 1; min-width: 0; }
  .detail-title {
    font-size: 14px;
    color: #333;
    margin-bottom: 4px;
  }
  .detail-time {
    font-size: 11px;
    color: #bbb;
  }

  .detail-right {
    text-align: right;
    flex-shrink: 0;
  }
  .detail-amount {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .detail-amount.income { color: #4caf50; }
  .detail-amount.expense { color: #333; }
  .detail-balance {
    font-size: 11px;
    color: #bbb;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: #999;
  }
  .empty-state svg {
    width: 80px;
    height: 80px;
    color: #ddd;
    margin-bottom: 16px;
  }
  .empty-state .empty-text { font-size: 14px; }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">积分明细</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Points Header -->
  <div class="points-header">
    <div class="points-label">当前积分</div>
    <div class="points-value">1,280<span class="points-unit">豆</span></div>
  </div>

  <!-- Tabs -->
  <div class="detail-tabs-bar">
    <div class="detail-tab active" data-tab="all">全部</div>
    <div class="detail-tab" data-tab="income">收入</div>
    <div class="detail-tab" data-tab="expense">支出</div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 16px;">
    <div class="detail-list" id="detailList"></div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var details = [
    { type: 'income', title: '购物返积分', desc: '订单JS2026040888001', amount: 128, balance: 1280, time: '2026-04-08 14:35' },
    { type: 'expense', title: '积分兑换商品', desc: '保温杯', amount: -500, balance: 1152, time: '2026-04-07 10:20' },
    { type: 'income', title: '签到奖励', desc: '连续签到第7天', amount: 10, balance: 1652, time: '2026-04-07 08:00' },
    { type: 'income', title: '邀请好友奖励', desc: '邀请成功1人', amount: 200, balance: 1642, time: '2026-04-05 16:42' },
    { type: 'expense', title: '积分兑换优惠券', desc: '满100减20优惠券', amount: -100, balance: 1442, time: '2026-04-03 11:15' },
    { type: 'income', title: '新用户注册奖励', desc: '注册送积分', amount: 500, balance: 1542, time: '2026-04-01 09:30' },
    { type: 'income', title: '完善信息奖励', desc: '完善个人信息', amount: 50, balance: 1042, time: '2026-04-01 10:00' }
  ];

  var currentTab = 'all';
  var list = document.getElementById('detailList');

  function renderList() {
    var filtered = currentTab === 'all' ? details : details.filter(function(d) { return d.type === currentTab; });

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>' +
        '<div class="empty-text">暂无记录</div>' +
      '</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(item) {
      var amountStr = item.amount > 0 ? '+' + item.amount : item.amount;
      html += '<div class="detail-item">' +
        '<div class="detail-icon ' + item.type + '">' +
          (item.type === 'income'
            ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>') +
        '</div>' +
        '<div class="detail-info">' +
          '<div class="detail-title">' + item.title + '</div>' +
          '<div class="detail-time">' + item.desc + ' · ' + item.time + '</div>' +
        '</div>' +
        '<div class="detail-right">' +
          '<div class="detail-amount ' + item.type + '">' + amountStr + '</div>' +
          '<div class="detail-balance">余额 ' + item.balance + '</div>' +
        '</div>' +
      '</div>';
    });
    list.innerHTML = html;
  }

  // Tab switching
  document.querySelectorAll('.detail-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.detail-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentTab = this.dataset.tab;
      renderList();
    });
  });

  renderList();
})();
</script>
</body>
</html>
