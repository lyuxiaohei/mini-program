<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>积分卡券兑换 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .exchange-page {
    background: #f5f6f8;
    min-height: calc(100vh - 88px);
  }
  .hero-wrap {
    padding: 0 12px 12px;
    background: linear-gradient(180deg, rgba(86, 83, 77, 0.92) 0%, rgba(86, 83, 77, 0) 100%);
  }
  .exchange-card {
    position: relative;
    overflow: hidden;
    border-radius: 18px;
    padding: 18px 16px 16px;
    color: #fff;
    background:
      radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 30%),
      linear-gradient(135deg, #ff8d53 0%, #ff6034 42%, #ee0a24 100%);
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.14);
  }
  .exchange-card::before {
    content: "";
    position: absolute;
    right: -24px;
    top: -30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .exchange-card::after {
    content: "";
    position: absolute;
    left: -30px;
    bottom: -40px;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .card-head {
    position: relative;
    z-index: 1;
  }
  .card-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.16);
    font-size: 12px;
    color: rgba(255,255,255,0.92);
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    line-height: 1.15;
    margin-bottom: 0;
  }
  .form-card {
    margin: 0 12px;
    background: #fff;
    border-radius: 16px;
    padding: 18px 16px 20px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .form-title {
    font-size: 17px;
    font-weight: 700;
    color: #222;
    margin-bottom: 16px;
  }
  .form-label {
    font-size: 13px;
    color: #666;
    margin-bottom: 8px;
  }
  .exchange-input {
    width: 100%;
    height: 52px;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 0 14px;
    font-size: 15px;
    color: #333;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .exchange-input:focus {
    border-color: #ff6034;
    box-shadow: 0 0 0 3px rgba(255, 96, 52, 0.08);
  }
  .exchange-input::placeholder {
    color: #c7ccd6;
  }
  .exchange-btn {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: 23px;
    margin-top: 18px;
    font-size: 15px;
    font-weight: 600;
    background: #ebedf1;
    color: #b6bcc7;
    cursor: not-allowed;
  }
  .exchange-btn.active {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    cursor: pointer;
  }
  .exchange-btn.active:active {
    opacity: 0.88;
  }
  .tips-card {
    margin: 16px 12px 20px;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .tips-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .tips-title {
    font-size: 15px;
    font-weight: 600;
    color: #333;
  }
  .tips-list {
    list-style: none;
  }
  .tips-list li {
    font-size: 13px;
    color: #666;
    line-height: 1.9;
    padding-left: 14px;
    position: relative;
  }
  .tips-list li + li {
    margin-top: 10px;
  }
  .tips-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 9px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #ff8d53;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">积分卡券兑换</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <div class="page-scroll exchange-page">
    <div class="hero-wrap">
      <div class="exchange-card">
        <div class="card-head">
          <span class="card-badge">卡券权益</span>
          <div class="card-title">卡券兑换</div>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-title">请输入积分卡卡密</div>
      <input id="exchangeInput" class="exchange-input" type="text" placeholder="请输入兑换码">
      <button id="exchangeBtn" class="exchange-btn" type="button" disabled>立即兑换</button>
    </div>

    <div class="tips-card">
      <div class="tips-head">
        <div class="tips-title">温馨提示</div>
      </div>
      <ul class="tips-list">
        <li>本卡券不挂失、不兑现、不找零、不记名，过期作废，请尽快使用。</li>
        <li>积分兑换成功后，您可以选购商品选择积分支付，我们会按照您的收货信息安排发货，请您关注订单状态。</li>
        <li>客服电话：4008880866，服务时间：周一至周五 9:00-18:00。</li>
      </ul>
    </div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var input = document.getElementById('exchangeInput');
  var button = document.getElementById('exchangeBtn');

  function updateButtonState() {
    var hasValue = input.value.trim().length > 0;
    button.disabled = !hasValue;
    button.classList.toggle('active', hasValue);
  }

  input.addEventListener('input', updateButtonState);

  button.addEventListener('click', function() {
    if (button.disabled) return;
    alert('兑换成功，积分卡券已生效');
    input.value = '';
    updateButtonState();
  });
})();
</script>
</body>
</html>
