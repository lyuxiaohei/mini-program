<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>积分兑换电影票 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .movie-sub-nav {
    background: linear-gradient(180deg, rgba(35, 36, 44, 0.98) 0%, rgba(58, 42, 48, 0.94) 100%);
  }
  .movie-sub-nav .status-bar,
  .movie-sub-nav .nav-title,
  .movie-sub-nav .back-btn svg {
    color: #fff;
  }
  .movie-sub-nav .status-bar .icons svg {
    fill: #fff;
  }
  .movie-page {
    background: #f5f6f8;
    min-height: calc(100vh - 88px);
  }
  .hero-wrap {
    padding: 0 12px 12px;
    background: linear-gradient(180deg, rgba(58, 42, 48, 0.94) 0%, rgba(58, 42, 48, 0) 100%);
  }
  .movie-card {
    position: relative;
    overflow: hidden;
    border-radius: 18px;
    padding: 18px 16px 16px;
    color: #fff;
    background:
      radial-gradient(circle at top right, rgba(255,255,255,0.18), transparent 30%),
      linear-gradient(135deg, #44506b 0%, #272a39 46%, #7a2330 100%);
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.14);
  }
  .movie-card::before {
    content: "";
    position: absolute;
    right: -24px;
    top: -30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
  }
  .movie-card::after {
    content: "";
    position: absolute;
    left: -30px;
    bottom: -40px;
    width: 110px;
    height: 110px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
  }
  .card-head {
    position: relative;
    z-index: 1;
  }
  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    font-size: 12px;
    color: rgba(255,255,255,0.88);
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 0;
  }
  .form-card {
    margin: 0 12px;
    background: #fff;
    border-radius: 16px;
    padding: 18px 16px 20px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .form-title {
    font-size: 17px;
    font-weight: 700;
    color: #222;
    margin-bottom: 16px;
  }
  .exchange-input {
    width: 100%;
    height: 52px;
    border: 1px solid #e8e8e8;
    border-radius: 12px;
    padding: 0 14px;
    font-size: 15px;
    color: #333;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .exchange-input:focus {
    border-color: #ff6034;
    box-shadow: 0 0 0 3px rgba(255, 96, 52, 0.08);
  }
  .exchange-input::placeholder {
    color: #c7ccd6;
  }
  .helper-row {
    margin-top: 12px;
    padding: 10px 12px;
    border-radius: 12px;
    background: #fff7f2;
    font-size: 12px;
    color: #7a4b36;
    line-height: 1.7;
  }
  .exchange-btn {
    width: 100%;
    height: 46px;
    border: none;
    border-radius: 23px;
    margin-top: 18px;
    font-size: 15px;
    font-weight: 600;
    background: #ebedf1;
    color: #b6bcc7;
    cursor: not-allowed;
  }
  .exchange-btn.active {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    cursor: pointer;
  }
  .exchange-btn.active:active {
    opacity: 0.88;
  }
  .tips-card {
    margin: 16px 12px 20px;
    background: #fff;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .tips-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 12px;
  }
  .tips-title {
    font-size: 15px;
    font-weight: 600;
    color: #333;
  }
  .tips-link {
    color: #2f6fff;
    font-size: 14px;
    text-decoration: none;
  }
  .tips-list {
    list-style: none;
  }
  .tips-list li {
    font-size: 13px;
    color: #666;
    line-height: 1.9;
    padding-left: 14px;
    position: relative;
  }
  .tips-list li + li {
    margin-top: 10px;
  }
  .tips-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 9px;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #ff8d53;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="sub-nav movie-sub-nav">
    <div class="status-bar">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">兑换电影票</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <div class="page-scroll movie-page">
    <div class="hero-wrap">
      <div class="movie-card">
        <div class="card-head">
          <span class="card-badge">影院专区</span>
          <div class="card-title">电影票卡密兑换</div>
        </div>
      </div>
    </div>

    <div class="form-card">
      <div class="form-title">请输入电影票兑换码</div>
      <input id="movieExchangeInput" class="exchange-input" type="text" placeholder="请输入电影票兑换码">
      <div class="helper-row">兑换成功后，电影票将自动发放至票券包；如遇场次限制，请在票券包内查看具体使用规则。</div>
      <button id="movieExchangeBtn" class="exchange-btn" type="button" disabled>立即兑换电影票</button>
    </div>

    <div class="tips-card">
      <div class="tips-head">
        <div class="tips-title">温馨提示</div>
        <a class="tips-link" href="customer_service.html">联系客服</a>
      </div>
      <ul class="tips-list">
        <li>电影票兑换码仅限使用一次，不挂失、不找零、不支持提现或转赠，请尽快完成兑换。</li>
        <li>兑换成功后票券将自动发放到账户票券包，具体可用影院、场次和有效期以票券展示信息为准。</li>
        <li>如影片下线、场次取消或影院规则调整，平台将按票券规则进行变更或退回，请留意票券包通知。</li>
      </ul>
    </div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var input = document.getElementById('movieExchangeInput');
  var button = document.getElementById('movieExchangeBtn');

  function updateButtonState() {
    var hasValue = input.value.trim().length > 0;
    button.disabled = !hasValue;
    button.classList.toggle('active', hasValue);
  }

  input.addEventListener('input', updateButtonState);

  button.addEventListener('click', function() {
    if (button.disabled) return;
    alert('兑换成功，电影票已发放到票券包');
    input.value = '';
    updateButtonState();
  });
})();
</script>
</body>
</html>
