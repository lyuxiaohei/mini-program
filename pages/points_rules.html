<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>积分兑换规则 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .rules-sub-nav {
    background: linear-gradient(180deg, rgba(65, 67, 72, 0.96) 0%, rgba(86, 83, 77, 0.92) 100%);
  }
  .rules-sub-nav .status-bar,
  .rules-sub-nav .nav-title,
  .rules-sub-nav .back-btn svg {
    color: #fff;
  }
  .rules-sub-nav .status-bar .icons svg {
    fill: #fff;
  }
  .title-wrap {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .title-wrap .bean {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ffd56a, #ff9b3d);
  }
  .rules-page {
    background: #f5f6f8;
    min-height: calc(100vh - 88px);
  }
  .rule-list {
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(18, 32, 56, 0.08);
  }
  .main {
    padding: 12px 12px 16px;
  }
  .rule-list {
    background: #fff;
    padding: 16px;
  }
  .rule-item + .rule-item {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #f0f1f4;
  }
  .rule-item strong {
    display: block;
    font-size: 15px;
    color: #222;
    margin-bottom: 6px;
  }
  .rule-item p {
    font-size: 13px;
    color: #666;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <div class="sub-nav rules-sub-nav">
    <div class="status-bar">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">
        <span class="title-wrap"><span class="bean"></span><span>积分兑换规则</span></span>
      </span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <div class="page-scroll rules-page">
    <div class="main">
      <div class="rule-list">
        <div class="rule-item">
          <strong>1. 积分获取</strong>
          <p>用户可通过注册、签到、下单消费、参与活动或平台发放等方式获得积分，具体发放数量以页面展示和活动规则为准。</p>
        </div>
        <div class="rule-item">
          <strong>2. 积分使用</strong>
          <p>积分可用于兑换优惠券、会员权益、实物礼品或指定商品，实际可兑换内容、所需积分及兑换条件以页面实时展示为准。</p>
        </div>
        <div class="rule-item">
          <strong>3. 有效期规则</strong>
          <p>积分根据平台规则设置有效期，到期后未使用的积分将自动失效；如有临近到期积分，请以页面提醒及账户记录为准。</p>
        </div>
        <div class="rule-item">
          <strong>4. 退单与回退</strong>
          <p>使用积分的订单发生取消、关闭或退款后，系统将根据订单状态和处理结果回退全部或部分积分，最终以账户变动明细为准。</p>
        </div>
      </div>

    </div>
  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
</body>
</html>
