<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>商品列表 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Filter bar */
  .filter-bar {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #eee;
    position: sticky;
    top: 88px;
    z-index: 50;
  }
  .filter-item {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
    gap: 3px;
    position: relative;
  }
  .filter-item:active { background: #f8f8f8; }
  .filter-item.active { color: #ff6034; font-weight: 600; }
  .filter-item .arrow { font-size: 8px; }
  .filter-item.active .arrow { color: #ff6034; }

  /* Product list grid */
  .list-content {
    padding: 8px;
  }
  .product-grid {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">商品列表</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar" id="filterBar">
    <div class="filter-item active" data-sort="default">综合</div>
    <div class="filter-item" data-sort="sales">销量 <span class="arrow">▼</span></div>
    <div class="filter-item" data-sort="price">价格 <span class="arrow">▼</span></div>
    <div class="filter-item" data-sort="new">新品</div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll">
    <div class="list-content">
      <div class="product-grid" id="productGrid"></div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <a href="home_page.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </a>
    <div class="tab-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>分类</span>
    </div>
    <a href="cart.html" class="tab-item">
      <div class="cart-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span class="badge">3</span>
      </div>
      <span>购物车</span>
    </a>
    <a href="favorites.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span>收藏</span>
    </a>
    <a href="profile.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </a>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  // Filter bar interaction
  var filterItems = document.querySelectorAll('.filter-item');
  filterItems.forEach(function(item) {
    item.addEventListener('click', function() {
      filterItems.forEach(function(f) { f.classList.remove('active'); });
      this.classList.add('active');
    });
  });

  // Product data
  var products = [
    { name: '日本进口保温杯 不锈钢真空便携水杯500ml', price: '68', original: '168', tag: '爆款', sold: '2.3万', img: '../images/unsplash/1602143407151-7111542de6e8.jpg' },
    { name: '无线蓝牙降噪耳机 迷你入耳式超长续航', price: '89', original: '299', tag: '新品', sold: '5680', img: '../images/unsplash/1505740420928-5e560c06d30e.jpg' },
    { name: '纯棉短袖T恤男女款 夏季宽松百搭潮流', price: '39.9', original: '129', tag: '热卖', sold: '1.2万', img: '../images/unsplash/1521572163474-6864f9cf17ab.jpg' },
    { name: '时尚运动鞋 透气网面跑步鞋轻便缓震', price: '159', original: '459', tag: '限时', sold: '8960', img: '../images/unsplash/1542291026-7eec264c27ff.jpg' },
    { name: '智能手表 多功能运动健康监测手环', price: '199', original: '599', tag: '爆款', sold: '3.5万', img: '../images/unsplash/1523275335684-37898b6baf30.jpg' },
    { name: '潮流太阳眼镜 防紫外线偏光墨镜', price: '79', original: '239', tag: '特惠', sold: '4.1万', img: '../images/unsplash/1572635196237-14b3f281503f.jpg' },
    { name: '高品质充电宝 10000mAh超薄移动电源', price: '59', original: '189', tag: '新品', sold: '6780', img: '../images/unsplash/1609091839311-d5365f9ff1c5.jpg' },
    { name: '精致蛋糕礼盒 手工制作生日庆典甜品', price: '128', original: '258', tag: '热卖', sold: '3250', img: '../images/unsplash/1578985545062-69928b1d9587.jpg' }
  ];

  var html = '';
  products.forEach(function(p) {
    html += '<a href="product_detail.html" class="product-card">' +
      '<div class="product-img"><img src="' + p.img + '" alt="' + p.name + '"></div>' +
      '<div class="product-info">' +
        '<div class="product-name">' + p.name + '</div>' +
        '<div class="product-tags"><span class="tag">' + p.tag + '</span></div>' +
      '</div>' +
      '<div class="product-bottom">' +
        '<span class="price-now"><span class="symbol">&yen;</span>' + p.price + '</span>' +
        '<span class="price-old">&yen;' + p.original + '</span>' +
        '<span class="sold">已售' + p.sold + '</span>' +
      '</div>' +
    '</a>';
  });
  document.getElementById('productGrid').innerHTML = html;
})();
</script>
</body>
</html>
