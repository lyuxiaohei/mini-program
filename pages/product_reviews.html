<!DOCTYPE html>

<meta charset="UTF-8">

<title>全部评价 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Rating summary */
  .rating-summary {
    background: #fff;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .rating-score {
    text-align: center;
    flex-shrink: 0;
  }
  .rating-score .score-num {
    font-size: 36px;
    font-weight: 700;
    color: #ff6034;
    line-height: 1;
  }
  .rating-score .score-label {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }
  .rating-stars-row {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-top: 6px;
    justify-content: center;
  }
  .rating-stars-row .star { font-size: 14px; color: #ff6034; }
  .rating-bars {
    flex: 1;
    min-width: 0;
  }
  .rating-bar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
    font-size: 11px;
    color: #999;
  }
  .rating-bar-row:last-child { margin-bottom: 0; }
  .rating-bar-label { width: 32px; text-align: right; flex-shrink: 0; }
  .rating-bar-track {
    flex: 1;
    height: 6px;
    background: #f0f0f0;
    border-radius: 3px;
    overflow: hidden;
  }
  .rating-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #ff6034, #ee0a24);
  }
  .rating-bar-count { width: 28px; flex-shrink: 0; color: #bbb; }

  /* Filter tabs */
  .filter-bar {
    display: flex;
    background: #fff;
    padding: 10px 12px;
    gap: 8px;
    border-top: 1px solid #f5f5f5;
    overflow-x: auto;
    position: sticky;
    top: 88px;
    z-index: 50;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-tag {
    flex-shrink: 0;
    padding: 5px 14px;
    border-radius: 16px;
    font-size: 12px;
    color: #666;
    background: #f5f5f5;
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-tag:active { opacity: 0.7; }
  .filter-tag.active {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
  }
  .filter-tag .tag-count {
    font-size: 10px;
    margin-left: 2px;
  }

  /* SKU filter */
  .sku-filter {
    background: #fff;
    padding: 0 12px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 8px solid #f5f5f5;
  }
  .sku-filter-label {
    font-size: 12px;
    color: #666;
    flex-shrink: 0;
  }
  .sku-chip {
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    color: #999;
    background: #f5f5f5;
    cursor: pointer;
    white-space: nowrap;
  }
  .sku-chip:active { opacity: 0.7; }
  .sku-chip.active {
    background: #fff0ed;
    color: #ff6034;
    border: 1px solid #ff6034;
  }

  /* Review list */
  .review-list {
    background: #fff;
  }
  .review-card {
    padding: 14px 16px;
    border-bottom: 1px solid #f5f5f5;
  }
  .review-card:last-child { border-bottom: none; }
  .review-card-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .review-card-header .avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    overflow: hidden;
    background: #f0f0f0;
    flex-shrink: 0;
  }
  .review-card-header .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .review-card-header .nickname {
    font-size: 13px;
    color: #333;
    flex: 1;
  }
  .review-card-header .stars {
    display: flex;
    gap: 1px;
  }
  .review-card-header .stars .star { font-size: 12px; color: #ff6034; }
  .review-card-header .stars .star.empty { color: #ddd; }
  .review-card-body {
    font-size: 13px;
    color: #333;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .review-card-images {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .review-card-images img {
    width: 80px;
    height: 80px;
    border-radius: 4px;
    object-fit: cover;
  }
  .review-card-footer {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .review-card-footer .spec-tag {
    font-size: 11px;
    color: #999;
    background: #f5f5f5;
    padding: 2px 8px;
    border-radius: 10px;
  }
  .review-card-footer .date {
    font-size: 11px;
    color: #ccc;
  }

  /* Empty */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: #999;
  }
  .empty-state svg { width: 60px; height: 60px; color: #ddd; margin-bottom: 12px; }
  .empty-state .empty-text { font-size: 13px; }
</style>

  <!-- SKU Filter -->

      images: [],

    }

  var currentFilter = 'all';
  var currentSku = 'all';

  function renderStars(count) {
    var html = '';
    for (var i = 0; i < 5; i++) {
      html += '<span class="star ' + (i < count ? '' : 'empty') + '">&#9733;</span>';
    }
    return html;
  }

  function getFilteredReviews() {
    return reviews.filter(function(r) {
      var filterOk = true;
      if (currentFilter === 'good') filterOk = r.stars >= 4;
      else if (currentFilter === 'mid') filterOk = r.stars === 3;
      else if (currentFilter === 'bad') filterOk = r.stars <= 2;
      else if (currentFilter === 'img') filterOk = r.images && r.images.length > 0;

      var skuOk = currentSku === 'all' || r.spec === currentSku;
      return filterOk && skuOk;
    });
  }

  function renderList() {
    var list = document.getElementById('reviewList');
    var data = getFilteredReviews();

    if (data.length === 0) {
      list.innerHTML = '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' +
        '<div class="empty-text">暂无符合条件的评价</div>' +
      '</div>';
      return;
    }

    var html = '';
    data.forEach(function(r) {
      var imagesHtml = '';
      if (r.images && r.images.length > 0) {
        imagesHtml = '<div class="review-card-images">';
        r.images.forEach(function(img) {
          imagesHtml += '<img src="' + img + '" alt="">';
        });
        imagesHtml += '</div>';
      }

      html += '<div class="review-card">' +
        '<div class="review-card-header">' +
          '<div class="avatar"><img src="' + r.avatar + '" alt=""></div>' +
          '<span class="nickname">' + r.nickname + '</span>' +
          '<div class="stars">' + renderStars(r.stars) + '</div>' +
        '</div>' +
        '<div class="review-card-body">' + r.text + '</div>' +
        imagesHtml +
        '<div class="review-card-footer">' +
          '<span class="spec-tag">' + r.spec + '</span>' +
          '<span class="date">' + r.date + '</span>' +
        '</div>' +
      '</div>';
    });
    list.innerHTML = html;
  }

  // Filter tag switching
  document.querySelectorAll('.filter-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      document.querySelectorAll('.filter-tag').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderList();
    });
  });

  // SKU chip switching
  document.querySelectorAll('.sku-chip').forEach(function(chip) {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.sku-chip').forEach(function(c) { c.classList.remove('active'); });
      this.classList.add('active');
      currentSku = this.dataset.sku;
      renderList();
    });
  });

  renderList();
})();
</script>
