<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Profile header - gradient background, extends to status bar */
  .profile-header {
    position: relative;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    padding-top: 44px;
    padding-bottom: 24px;
  }
  .profile-header::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 0;
    right: 0;
    height: 24px;
    background: #f5f5f5;
    border-radius: 18px 18px 0 0;
    z-index: 0;
  }
  .profile-header .status-bar { color: #fff; }
  .profile-header .status-bar svg { fill: #fff; }
  .profile-header .nav-bar .nav-title { color: #fff; }

  /* Profile content area */
  .profile-content {
    padding: 0 16px;
    position: relative;
    z-index: 1;
  }
  .profile-info {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .profile-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.5);
    flex-shrink: 0;
  }
  .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-detail { flex: 1; }
  .profile-name {
    font-size: 17px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2px;
  }
  .profile-level {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,0.2);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    color: #fff;
  }
  .profile-level svg { width: 12px; height: 12px; }
  .settings-btn {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .settings-btn svg { width: 22px; height: 22px; color: #fff; }

  /* Stats row */
  .profile-stats {
    display: flex;
    justify-content: space-around;
    margin-top: 16px;
  }
  .stat-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
  }
  .stat-item .num { font-size: 17px; font-weight: 700; color: #fff; }
  .stat-item .label { font-size: 11px; color: rgba(255,255,255,0.8); }

  /* Order section */
  .order-section {
    background: #fff;
    margin: 8px 12px;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  .order-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 12px 8px;
  }
  .order-header .title { font-size: 15px; font-weight: 600; color: #333; }
  .order-header .view-all {
    font-size: 12px;
    color: #999;
    display: flex;
    align-items: center;
    gap: 2px;
    cursor: pointer;
  }
  .order-header .view-all svg { width: 14px; height: 14px; }
  .order-tabs {
    display: flex;
    padding: 0 8px 12px;
  }
  .order-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    position: relative;
  }
  .order-tab:active { opacity: 0.7; }
  .order-tab svg { width: 24px; height: 24px; color: #666; }
  .order-tab span { font-size: 11px; color: #666; }
  .order-tab .order-badge {
    position: absolute;
    top: -4px;
    right: calc(50% - 20px);
    background: #ee0a24;
    color: #fff;
    font-size: 9px;
    min-width: 14px;
    height: 14px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 3px;
  }

  /* Quick tools */
  .tools-section {
    background: #fff;
    margin: 0 12px 8px;
    border-radius: 12px;
    padding: 12px;
  }
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px 0;
  }
  .tool-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .tool-item:active { opacity: 0.7; }
  .tool-item .tool-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tool-item .tool-icon svg { width: 22px; height: 22px; color: #fff; }
  .tool-item span { font-size: 11px; color: #666; }

  /* Menu list */
  .menu-section {
    background: #fff;
    margin: 0 12px 8px;
    border-radius: 12px;
    overflow: hidden;
  }
  .menu-item {
    display: flex;
    align-items: center;
    padding: 14px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f5f5f5;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:active { background: #fafafa; }
  .menu-item svg { width: 20px; height: 20px; color: #ff6034; margin-right: 10px; flex-shrink: 0; }
  .menu-item .menu-label { flex: 1; font-size: 14px; color: #333; }
  .menu-item .menu-arrow { color: #ccc; font-size: 13px; }
</style>
</head>
