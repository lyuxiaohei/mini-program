<style>
  /* Tab bar */
  .refund-tabs-bar {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    position: sticky;
    top: 88px;
    z-index: 50;
  }
  .refund-tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
    color: #666;
    cursor: pointer;
    position: relative;
  }
  .refund-tab:active { background: #f8f8f8; }
  .refund-tab.active {
    color: #333;
    font-weight: 600;
  }
  .refund-tab.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 2px;
    background: linear-gradient(90deg, #ff6034, #ee0a24);
    border-radius: 1px;
  }
  .after-sale-search {
    padding: 12px;
    background: #fff;
  }
  .after-sale-search input {
    width: 100%;
    height: 36px;
    border: 1px solid #eee;
    border-radius: 18px;
    padding: 0 14px;
    font-size: 13px;
    color: #333;
    outline: none;
    background: #fafafa;
    box-sizing: border-box;
  }
  .after-sale-search input:focus {
    border-color: #ff8a65;
    background: #fff;
  }

  /* Refund card */
  .refund-list {
    padding: 12px;
  }
  .refund-card {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .refund-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px;
    border-bottom: 1px solid #f5f5f5;
  }
  .refund-card-header .order-no {
    font-size: 12px;
    color: #999;
  }
  .refund-card-header .status {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 10px;
  }
  .status.processing {
    background: #fff3e0;
    color: #ff9800;
  }
  .status.completed {
    background: #e8f5e9;
    color: #4caf50;
  }
  .status.rejected {
    background: #ffebee;
    color: #f44336;
  }

  .refund-card-body {
    padding: 12px;
    display: flex;
    gap: 10px;
  }
  .refund-card .item-img {
    width: 72px;
    height: 72px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .refund-card .item-img img { width: 100%; height: 100%; object-fit: cover; }
  .refund-card .item-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .refund-card .item-name {
    font-size: 13px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .refund-card .item-spec {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }

  .refund-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 6px;
  }
  .refund-type {
    font-size: 11px;
    color: #666;
    background: #f5f5f5;
    padding: 2px 6px;
    border-radius: 3px;
  }
  .refund-amount {
    font-size: 14px;
    color: #ee0a24;
    font-weight: 600;
  }
  .refund-amount-stack {
    text-align: right;
    font-size: 12px;
    line-height: 1.5;
  }
  .refund-amount-stack .refund-amount-line {
    display: block;
    font-weight: 600;
    color: #ee0a24;
  }
  .refund-amount-stack .refund-amount-line.refund-beans {
    color: #ff6034;
  }
  .refund-amount-stack .refund-amount-line.refund-cash {
    color: #ee0a24;
  }
  .refund-amount-note {
    font-size: 11px;
    color: #999;
    font-weight: 500;
    text-align: right;
    line-height: 1.4;
  }

  /* Timeline mini */
  .timeline-mini {
    background: #fafafa;
    padding: 10px 12px;
    margin: 0 12px 12px;
    border-radius: 8px;
  }
  .timeline-mini-title {
    font-size: 12px;
    color: #999;
    margin-bottom: 6px;
  }
  .timeline-mini-steps {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .timeline-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    position: relative;
  }
  .timeline-step .step-dot {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 4px;
    z-index: 1;
  }
  .timeline-step .step-dot svg { width: 12px; height: 12px; color: #fff; }
  .timeline-step.done .step-dot { background: #4caf50; }
  .timeline-step.active .step-dot { background: #ff6034; }
  .timeline-step::after {
    content: '';
    position: absolute;
    top: 10px;
    left: 50%;
    width: 100%;
    height: 2px;
    background: #ddd;
  }
  .timeline-step:last-child::after { display: none; }
  .timeline-step.done::after { background: #4caf50; }
  .timeline-step .step-text {
    font-size: 10px;
    color: #999;
    text-align: center;
  }
  .timeline-step.done .step-text,
  .timeline-step.active .step-text { color: #333; }

  .refund-card-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 10px 12px;
    border-top: 1px solid #f5f5f5;
    gap: 8px;
  }
  .btn-sm {
    padding: 5px 14px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    border: 1px solid #ddd;
    background: #fff;
    color: #666;
  }
  .btn-sm:active { opacity: 0.7; }
  .btn-sm.primary {
    border-color: #ff6034;
    color: #ff6034;
  }

  /* Apply section */
  .apply-section {
    background: #fff;
    margin: 12px;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .apply-section .apply-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }
  .apply-section .apply-icon svg { width: 28px; height: 28px; color: #fff; }
  .apply-section .apply-title {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
  }
  .apply-section .apply-desc {
    font-size: 13px;
    color: #999;
    margin-bottom: 16px;
  }
  .apply-section .btn-apply {
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    border: none;
    padding: 10px 32px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .apply-section .btn-apply:active { opacity: 0.85; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: #999;
  }
  .empty-state svg {
    width: 64px;
    height: 64px;
    color: #ddd;
    margin-bottom: 12px;
  }
  .empty-state .empty-text { font-size: 14px; }
</style>
</head>

  /**
   * 按退款构成生成右侧金额区 HTML（处理中 / 申请记录共用）。
   * @param {{ amount?: string, refundPayMode?: string, beansRefund?: number, cashRefund?: string, type?: string, status?: string }} item 售后单
   * @param {'processing'|'records'} context 列表场景
   * @returns {string}
   */
  function formatRefundBreakdownHtml(item, context) {
    if (context === 'records' && (item.status === 'rejected' || item.status === 'cancelled')) {
      return '';
    }
    var mode = item.refundPayMode || 'cash-only';
    var rec = context === 'records';
    if (mode === 'none') {
      return '<div class="refund-amount-note">' + (rec ? '换货完成 · 无现金/苏银豆退款' : '换货处理中 · 无现金/苏银豆退款') + '</div>';
    }
    if (mode === 'beans-only') {
      var beans = item.beansRefund != null ? item.beansRefund : 0;
      var beanLabel = rec ? ('已退 <b>' + beans + '</b> 苏银豆') : ('预计退 <b>' + beans + '</b> 苏银豆');
      return '<div class="refund-amount-stack">' +
        '<span class="refund-amount-line refund-beans">' + beanLabel + '</span>' +
        '</div>';
    }
    if (mode === 'combo') {
      var b2 = item.beansRefund != null ? item.beansRefund : 0;
      var cash2 = item.cashRefund != null ? item.cashRefund : (item.amount || '0.00');
      return '<div class="refund-amount-stack">' +
        '<span class="refund-amount-line refund-beans">苏银豆 <b>' + b2 + '</b></span>' +
        '<span class="refund-amount-line refund-cash">现金 <b>&yen;' + cash2 + '</b></span>' +
        '</div>';
    }
    var cashOnly = item.cashRefund != null ? item.cashRefund : (item.amount || '0.00');
    var cashLine = rec ? ('已退现金 <b>&yen;' + cashOnly + '</b>') : ('现金 <b>&yen;' + cashOnly + '</b>');
    return '<div class="refund-amount-stack">' +
      '<span class="refund-amount-line refund-cash">' + cashLine + '</span>' +
      '</div>';
  }

  function getRefundDetailUrl(item) {
    if (item.type === '仅退款' && item.status === 'processing') {
      return 'refund_detail.html?case=refund_only_reviewing';
    }
    if (item.type === '换货' && item.status === 'processing') {
      return 'refund_detail.html?case=exchange_approved';
    }
    if (item.type === '退货退款' && item.status === 'processing') {
      return 'refund_detail.html?case=refund_return_approved';
    }
    if (item.type === '退货退款' && item.status === 'rejected') {
      return 'refund_detail.html?case=refund_return_rejected';
    }
    return 'refund_detail.html?case=refund_return_approved';
  }

      '</div>';
      return;

    var html = '<div class="refund-list">';
    recordRefunds.forEach(function(item) {
      var detailUrl = getRefundDetailUrl(item);

      html += '<div class="refund-card">' +

          '<span class="status ' + item.status + '">' + item.statusText + '</span>' +
        '</div>' +
        '<div class="refund-card-body">' +
          '<div class="item-img"><img src="' + item.product.img + '" alt=""></div>' +
          '<div class="item-info">' +
            '<div class="item-name">' + item.product.name + '</div>' +
            '<div class="item-spec">' + item.product.spec + '</div>' +
            '<div class="refund-info">' +

          '<button class="btn-sm primary" onclick="event.stopPropagation();location.href=\'' + detailUrl + '\'">查看详情</button>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
    contentArea.innerHTML = html;
  }

  function renderProcessing() {
    var processingList = processingRefunds.filter(function(item) { return item.status === 'processing'; });
    if (processingList.length === 0) {
      contentArea.innerHTML = '<div class="empty-state">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>' +
        '<div class="empty-text">暂无处理中售后</div>' +
      '</div>';
      return;
    }

    var html = '<div class="refund-list">';
    processingList.forEach(function(item) {
      var detailUrl = getRefundDetailUrl(item);
      var reviewStepIndex = item.steps.indexOf('review');
      var canRevoke = reviewStepIndex > -1 && item.currentStep < reviewStepIndex;
      html += '<div class="refund-card">' +
        '<div class="refund-card-header">' +
          '<span class="order-no">' + item.id + '</span>' +
          '<span class="status ' + item.status + '">' + item.statusText + '</span>' +
        '</div>' +
        '<div class="refund-card-body" onclick="location.href=\'' + detailUrl + '\'">' +
          '<div class="item-img"><img src="' + item.product.img + '" alt=""></div>' +
          '<div class="item-info">' +
            '<div class="item-name">' + item.product.name + '</div>' +
            '<div class="item-spec">' + item.product.spec + '</div>' +
            '<div class="refund-info">' +
              '<span class="refund-type">' + item.type + '</span>' +
              formatRefundBreakdownHtml(item, 'processing') +
            '</div>' +
          '</div>' +
        '</div>' +
        '<div class="refund-card-footer">' +
          (canRevoke ? '<button class="btn-sm" onclick="event.stopPropagation();alert(\'撤销申请成功\')">撤销申请</button>' : '') +
          '<button class="btn-sm primary" onclick="event.stopPropagation();location.href=\'' + detailUrl + '\'">查看详情</button>' +
        '</div>' +
      '</div>';
    });
    html += '</div>';
    contentArea.innerHTML = html;
  }

  /**
   * 按当前 Tab 渲染「处理中」或「申请记录」列表。
   */
  function render() {
    if (currentTab === 'records') {
      renderRecords();
    } else {
      renderProcessing();
    }
  }

  // Tab switching
  document.querySelectorAll('.refund-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.refund-tab').forEach(function(t) { t.classList.remove('active'); });
      this.classList.add('active');
      currentTab = this.dataset.tab;
      render();
    });
  });

  render();
})();
</script>
</body>
</html>
