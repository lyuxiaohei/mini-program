<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>售后详情 - 福利商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Status header */
  .refund-status-header {
    background: linear-gradient(135deg, var(--warning-color), var(--warning-dark));
    padding: var(--space-xl) 16px;
    color: var(--card-bg);
  }
  .refund-status-header.completed {
    background: linear-gradient(135deg, var(--success-color), var(--success-dark));
  }
  .refund-status-header.rejected {
    background: linear-gradient(135deg, var(--error-light), var(--price-color));
  }
  .status-main {
    display: flex;
    align-items: center;
    gap: var(--space-md);
    margin-bottom: var(--space-sm);
  }
  .status-main svg { width: 24px; height: 24px; }
  .status-main .text { font-size: var(--font-lg); font-weight: 700; }
  .status-desc { font-size: var(--font-sm); opacity: 0.9; margin-left: 34px; }

  /* Amount card */
  .amount-card {
    background: var(--card-bg);
    margin: -16px var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    position: relative;
    z-index: 1;
    box-shadow: var(--shadow-md);
  }
  .amount-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .amount-label {
    font-size: var(--font-base);
    color: var(--text-secondary);
  }
  .amount-value {
    font-size: var(--font-2xl);
    font-weight: 700;
    color: var(--price-color);
  }
  .amount-value small {
    font-size: var(--font-base);
    font-weight: 400;
  }
  .amount-type {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    margin-top: var(--space-sm);
    display: flex;
    align-items: center;
    gap: var(--space-xs);
  }
  .amount-type span {
    background: var(--bg-color);
    padding: 2px var(--space-sm);
    border-radius: var(--radius-xs);
  }
  .points-row {
    margin-top: var(--space-sm);
    font-size: var(--font-sm);
    color: var(--text-secondary);
    display: none;
    align-items: center;
    justify-content: space-between;
  }
  .points-row b {
    color: var(--primary-start);
    font-size: var(--font-md);
  }

  /* Timeline */
  .timeline-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg);
  }
  .section-title {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
    margin-bottom: var(--space-lg);
    display: flex;
    align-items: center;
    gap: var(--space-sm);
  }
  .section-title svg { width: 18px; height: 18px; color: var(--primary-start); }

  .timeline-list {
    position: relative;
    padding-left: var(--space-xl);
  }
  .timeline-list::before {
    content: '';
    position: absolute;
    left: 7px;
    top: 12px;
    bottom: 12px;
    width: 2px;
    background: var(--border-color);
  }
  .timeline-item {
    position: relative;
    padding-bottom: var(--space-xl);
  }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-item::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 4px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--text-disabled);
    border: 2px solid var(--card-bg);
  }
  .timeline-item.done::before {
    background: var(--success-color);
  }
  .timeline-item.active::before {
    background: var(--primary-start);
    box-shadow: 0 0 0 4px rgba(255, 96, 52, 0.2);
  }
  .timeline-item.rejected::before {
    background: var(--error-light);
  }
  .timeline-title {
    font-size: var(--font-base);
    color: var(--text-color);
    font-weight: 500;
    margin-bottom: var(--space-xs);
  }
  .timeline-item.active .timeline-title { color: var(--primary-start); }
  .timeline-item.rejected .timeline-title { color: var(--error-light); }
  .timeline-desc {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    line-height: 1.6;
  }
  .timeline-time {
    font-size: var(--font-sm);
    color: var(--text-muted);
    margin-top: var(--space-xs);
  }

  /* Product card */
  .product-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .product-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-md);
    border-bottom: 1px solid var(--bg-color);
  }
  .product-header .order-no {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
  }
  .product-list {
    display: flex;
    flex-direction: column;
  }
  .product-item {
    display: flex;
    padding: var(--space-md);
    gap: var(--space-md);
    border-bottom: 1px solid var(--bg-color);
  }
  .product-item:last-child { border-bottom: none; }
  .product-img {
    width: 72px;
    height: 72px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    background: var(--bg-input);
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-info {
    flex: 1;
    min-width: 0;
  }
  .product-name {
    font-size: var(--font-sm);
    color: var(--text-color);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: var(--space-xs);
  }
  .product-spec {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    margin-bottom: var(--space-sm);
  }
  .product-price {
    font-size: var(--font-base);
    color: var(--text-color);
    font-weight: 600;
  }
  .product-extra {
    font-size: var(--font-sm);
    color: var(--text-secondary);
    margin-top: var(--space-sm);
  }
  .product-merchant-box {
    margin-top: var(--space-sm);
    background: var(--hover-bg);
    border: 1px solid var(--border-divider);
    border-radius: var(--radius-sm);
    padding: var(--space-sm) 10px;
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .product-merchant-box b {
    color: var(--text-color);
    font-weight: 600;
  }
  .product-actions {
    margin-top: var(--space-sm);
    display: flex;
    justify-content: flex-end;
  }
  .product-logistics-box {
    margin-top: var(--space-sm);
    background: var(--card-bg)7f2;
    border: 1px solid var(--selected-bg);
    border-radius: var(--radius-sm);
    padding: var(--space-sm) 10px;
    font-size: var(--font-sm);
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* Info section */
  .info-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-md);
  }
  .info-item {
    display: flex;
    align-items: flex-start;
    padding: var(--space-sm) 0;
  }
  .info-label {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    width: 80px;
    flex-shrink: 0;
  }
  .info-value {
    font-size: var(--font-sm);
    color: var(--text-color);
    flex: 1;
  }
  .info-value.reason {
    background: var(--hover-bg);
    padding: var(--space-md);
    border-radius: var(--radius-sm);
    line-height: 1.6;
  }

  /* Images */
  .evidence-images {
    display: flex;
    gap: var(--space-sm);
    flex-wrap: wrap;
  }
  .evidence-img {
    width: 60px;
    height: 60px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    cursor: pointer;
  }
  .evidence-img img { width: 100%; height: 100%; object-fit: cover; }

  /* Bottom actions */
  .bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--card-bg);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: var(--space-sm);
    height: 56px;
    border-top: 1px solid var(--border-color);
    z-index: 200;
    padding: 0 var(--space-md) var(--space-sm);
  }
  .btn-sm {
    padding: var(--space-sm) var(--space-xl);
    border-radius: var(--radius-lg);
    font-size: var(--font-sm);
    cursor: pointer;
    border: 1px solid var(--text-disabled);
    background: var(--card-bg);
    color: var(--text-secondary);
  }
  .btn-sm:active { opacity: 0.7; }
  .btn-sm.primary {
    border-color: var(--primary-start);
    color: var(--primary-start);
  }
  .btn-sm.danger {
    border-color: var(--price-color);
    color: var(--price-color);
  }

  /* Contact section */
  .contact-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) 80px;
    border-radius: var(--radius-md);
    padding: var(--space-lg);
    display: flex;
    align-items: center;
    gap: var(--space-md);
  }
  .contact-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .contact-icon svg { width: 20px; height: 20px; color: var(--card-bg); }
  .contact-info { flex: 1; }
  .contact-title { font-size: var(--font-base); color: var(--text-color); font-weight: 500; }
  .contact-desc { font-size: var(--font-sm); color: var(--text-tertiary); margin-top: 2px; }
  .contact-btn {
    font-size: var(--font-sm);
    color: var(--primary-start);
    padding: var(--space-sm) 12px;
    border: 1px solid var(--primary-start);
    border-radius: var(--radius-lg);
    cursor: pointer;
  }
  .modal-mask {
    position: fixed;
    left: 0;
    top: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    padding: var(--space-xl);
    box-sizing: border-box;
  }
  .modal-card {
    width: 100%;
    max-width: 320px;
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    padding: 0;
    box-sizing: border-box;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
  }
  .modal-title {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
    padding: var(--space-lg) 16px 12px;
    border-bottom: 1px solid var(--bg-color);
  }
  .modal-body {
    padding: 0 var(--space-lg) var(--space-md);
  }
  .modal-body .form-row {
    padding: var(--space-lg) 0;
  }
  .modal-body .form-row label {
    width: 72px;
    color: var(--text-secondary);
  }
  .modal-body .form-row input {
    height: 34px;
    border: 1px solid var(--border-color);
    border-radius: var(--radius-sm);
    padding: 0 var(--space-md);
    background: var(--card-bg);
    box-sizing: border-box;
  }
  .modal-body .form-row input:focus {
    border-color: var(--warning-light);
    background: var(--card-bg);
  }
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-md);
    padding-top: var(--space-md);
  }
  .modal-actions .btn-sm {
    height: 36px;
    border-radius: var(--radius-sm);
    padding: 0;
    font-size: var(--font-sm);
  }
  .modal-actions #cancelLogisticsBtn {
    border-color: var(--border-color);
    color: var(--text-secondary);
    background: var(--bg-color);
  }
  .modal-actions #confirmLogisticsBtn {
    border-color: var(--primary-start);
    color: var(--card-bg);
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
  }
</style>
</head>

        { title: '待商家重新发货/商家已发货', desc: '商家将重新发出换货商品', time: '', state: 'pending' },

    'refund_return_rejected': {

      reason: '商品质量问题',

      rejectRemark: '凭证图片无法清晰体现质量问题，请补充开箱视频或更清晰的故障照片后重新提交。',
      canCancel: false,

      products: [

      evidence: ['../images/unsplash/1578985545062-69928b1d9587.jpg'],
      timeline: [
        { title: '提交申请', desc: '退货退款申请已提交', time: '2026-03-15 09:25:16', state: 'done' },

      ]
    }
  };

  var params = new URLSearchParams(window.location.search);
  var caseKey = params.get('case') || 'refund_return_approved';
  var currentCase = cases[caseKey] || cases.refund_return_approved;
  var activeProductId = '';

  var header = document.getElementById('statusHeader');
  var statusText = document.getElementById('statusText');
  var statusDesc = document.getElementById('statusDesc');
  header.className = 'refund-status-header';
  if (currentCase.status === 'completed') header.classList.add('completed');
  if (currentCase.status === 'rejected' || currentCase.status === 'cancelled') header.classList.add('rejected');
  statusText.textContent = currentCase.statusText;
  statusDesc.textContent = currentCase.statusDesc;

  document.getElementById('amountLabel').textContent = currentCase.amountLabel;
  document.getElementById('amountValue').innerHTML = '<small>&yen;</small>' + String(currentCase.amountValue).replace('¥', '');
  document.getElementById('refundTypeTag').textContent = currentCase.type;
  var pointsRow = document.getElementById('pointsRow');
  var pointsValue = document.getElementById('pointsValue');
  if (currentCase.refundPoints && Number(currentCase.refundPoints) > 0) {
    pointsRow.style.display = 'flex';
    pointsValue.textContent = currentCase.refundPoints + '积分';
  } else {
    pointsRow.style.display = 'none';
  }
  document.getElementById('orderNoText').textContent = '订单编号：' + currentCase.orderNo;
  document.getElementById('refundNoText').textContent = currentCase.refundNo;
  document.getElementById('applyTimeText').textContent = currentCase.applyTime;
  document.getElementById('reasonText').textContent = currentCase.reason;
  document.getElementById('descText').textContent = currentCase.description;
  var rejectRemarkItem = document.getElementById('rejectRemarkItem');
  var rejectRemarkText = document.getElementById('rejectRemarkText');
  if (currentCase.status === 'rejected' && currentCase.rejectRemark) {
    rejectRemarkItem.style.display = 'flex';
    rejectRemarkText.textContent = currentCase.rejectRemark;
  } else {
    rejectRemarkItem.style.display = 'none';
  }

  var productList = document.getElementById('productList');
  function renderProductList() {
    var logisticsMap = currentCase.logisticsByProduct || {};
    var productHtml = '';
    currentCase.products.forEach(function(p, idx) {
      var productId = p.id || ('p' + idx);
      var isReturnRelated = currentCase.type === '退货退款' || currentCase.type === '换货';
      var extraInfo = '';
      var merchantInfo = '';
      var actionHtml = '';
      var logisticsInfo = '';
      if (isReturnRelated) {
        extraInfo = '<div class="product-extra">退货数量：' + (p.returnQty || p.qty || 1) + '</div>';
      }
      if (p.merchant && currentCase.showMerchantInfo) {
        merchantInfo = '<div class="product-merchant-box">' +
          '<div><b>商家收货信息</b></div>' +
          '<div>联系人：' + p.merchant.name + '（' + p.merchant.phone + '）</div>' +
          '<div>地址：' + p.merchant.address + '</div>' +
        '</div>';
      }
      if (currentCase.showLogisticsButton) {
        actionHtml = '<div class="product-actions">' +
          '<button class="btn-sm primary fill-logistics-per-product" data-product-id="' + productId + '">' + (logisticsMap[productId] ? '修改物流单号' : '填写物流单号') + '</button>' +
        '</div>';
      }
      if (logisticsMap[productId]) {
        logisticsInfo = '<div class="product-logistics-box">' +
          '<div><b>退回物流信息</b></div>' +
          '<div>物流公司：' + logisticsMap[productId].company + '</div>' +
          '<div>物流单号：' + logisticsMap[productId].no + '</div>' +
          '<div>提交时间：' + logisticsMap[productId].time + '</div>' +
        '</div>';
      }

      productHtml += '<div class="product-item">' +
        '<div class="product-img"><img src="' + p.img + '" alt=""></div>' +
        '<div class="product-info">' +
          '<div class="product-name">' + p.name + '</div>' +
          '<div class="product-spec">' + p.spec + '</div>' +
          '<div class="product-price">&yen;' + p.price + ' x' + p.qty + '</div>' +
          extraInfo +
          merchantInfo +
          actionHtml +
          logisticsInfo +
        '</div>' +
      '</div>';
    });
    productList.innerHTML = productHtml;
    bindProductLogisticsActions();
  }

  function bindProductLogisticsActions() {
    document.querySelectorAll('.fill-logistics-per-product').forEach(function(btn) {
      btn.addEventListener('click', function() {
        activeProductId = this.dataset.productId || '';
        var logisticsMap = currentCase.logisticsByProduct || {};
        var existing = logisticsMap[activeProductId];
        expressCompanyInput.value = existing ? existing.company : '';
        expressNoInput.value = existing ? existing.no : '';
        logisticsModal.style.display = 'flex';
      });
    });
  }
  renderProductList();

  var evidenceImages = document.getElementById('evidenceImages');
  evidenceImages.innerHTML = '';
  currentCase.evidence.forEach(function(src) {
    evidenceImages.innerHTML += '<div class="evidence-img"><img src="' + src + '" alt=""></div>';
  });

  var timelineList = document.getElementById('timelineList');
  function getTimelineDisplayTitle(rawTitle, state) {
    if (!rawTitle || rawTitle.indexOf('/') === -1) return rawTitle;
    var parts = rawTitle.split('/');
    var beforeText = (parts[0] || '').trim();
    var afterText = (parts[1] || '').trim();
    return state === 'done' ? (afterText || beforeText) : beforeText;
  }
  function renderTimeline() {
    var timelineHtml = '';
    currentCase.timeline.forEach(function(item) {
      var cls = item.state === 'done' ? 'done' : (item.state === 'active' ? 'active' : (item.state === 'rejected' ? 'rejected' : ''));
      var displayTitle = getTimelineDisplayTitle(item.title, item.state);
      timelineHtml += '<div class="timeline-item ' + cls + '">' +
        '<div class="timeline-title">' + displayTitle + '</div>' +
        '<div class="timeline-desc">' + item.desc + '</div>' +
        (item.time ? '<div class="timeline-time">' + item.time + '</div>' : '') +
      '</div>';
    });
    timelineList.innerHTML = timelineHtml;
  }
  renderTimeline();

  var cancelBtn = document.getElementById('cancelBtn');
  var logisticsModal = document.getElementById('logisticsModal');
  var cancelLogisticsBtn = document.getElementById('cancelLogisticsBtn');
  var confirmLogisticsBtn = document.getElementById('confirmLogisticsBtn');
  var expressCompanyInput = document.getElementById('expressCompanyInput');
  var expressNoInput = document.getElementById('expressNoInput');
  cancelBtn.style.display = currentCase.canCancel ? 'inline-block' : 'none';

  cancelBtn.addEventListener('click', function() {
    if (confirm('确定要撤销该售后申请吗？')) {
      alert('已撤销申请');
      history.back();
    }
  });

  cancelLogisticsBtn.addEventListener('click', function() {
    logisticsModal.style.display = 'none';
  });

  confirmLogisticsBtn.addEventListener('click', function() {
    var company = expressCompanyInput.value.trim();
    var no = expressNoInput.value.trim();
    if (!company) {
      alert('请输入物流公司');
      return;
    }
    if (!no) {
      alert('请输入物流单号');
      return;
    }
    if (!activeProductId) {
      alert('请选择要填写物流的商品');
      return;
    }

    currentCase.statusText = '等待商家收货';
    currentCase.statusDesc = '物流已提交，等待商家收货并验货';
    statusText.textContent = currentCase.statusText;
    statusDesc.textContent = currentCase.statusDesc;

    currentCase.timeline.forEach(function(item) {
      if (item.title.indexOf('待寄回商品/已寄回商品') > -1) item.state = 'done';
      if (item.title.indexOf('待商家收货/商家已收货') > -1) {
        item.state = 'active';
        item.time = new Date().toLocaleString('zh-CN', { hour12: false }).replace(/\//g, '-');
      }
    });
    renderTimeline();
    if (!currentCase.logisticsByProduct) currentCase.logisticsByProduct = {};
    currentCase.logisticsByProduct[activeProductId] = {
      company: company,
      no: no,
      time: new Date().toLocaleString('zh-CN', { hour12: false }).replace(/\//g, '-')
    };
    renderProductList();
    logisticsModal.style.display = 'none';
    alert('物流信息提交成功，等待商家收货');
  });
})();
</script>
