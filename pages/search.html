<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搜索 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Fix phone-frame for absolute positioned elements */
  .phone-frame {
    height: 100vh;
    overflow: hidden;
  }
  .page-scroll {
    height: 100%;
    overflow-y: auto;
  }

  /* Search input area below header */
  .search-input-area {
    background: #fff;
    padding: 10px 12px;
  }
  .search-input-wrap {
    display: flex;
    align-items: center;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 8px 12px;
    gap: 8px;
  }
  .search-input-wrap svg { width: 18px; height: 18px; color: #999; flex-shrink: 0; }
  .search-input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    background: transparent;
    color: #333;
  }
  .search-input-wrap input::placeholder { color: #bbb; }
  .search-input-wrap .clear-btn {
    width: 18px;
    height: 18px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #ccc;
  }
  .search-input-wrap .clear-btn svg { width: 16px; height: 16px; }
  .search-input-wrap .clear-btn.show { display: flex; }

  /* History section */
  .history-section {
    padding: 16px 12px;
  }
  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .history-header .title { font-size: 14px; font-weight: 600; color: #333; }
  .history-header .clear-btn {
    font-size: 12px;
    color: #999;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .history-header .clear-btn:active { color: #666; }
  .history-header .clear-btn svg { width: 14px; height: 14px; }
  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .history-item {
    background: #f5f5f5;
    padding: 7px 14px;
    border-radius: 16px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
  }
  .history-item:active { background: #eee; }
  .history-empty {
    font-size: 12px;
    color: #ccc;
  }

  /* Search results */
  .search-results {
    display: none;
    padding: 12px;
  }
  .search-results .result-header {
    font-size: 13px;
    color: #999;
    margin-bottom: 10px;
  }
  .search-results .product-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .search-results .product-card {
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    display: block;
    text-decoration: none;
  }
  .search-results .product-img {
    width: 100%;
    aspect-ratio: 1;
    background: #f8f8f8;
  }
  .search-results .product-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .search-results .product-info {
    padding: 8px;
  }
  .search-results .product-name {
    font-size: 13px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .search-results .product-tags {
    display: flex;
    gap: 4px;
    margin-bottom: 6px;
  }
  .search-results .tag {
    font-size: 10px;
    padding: 1px 4px;
    border-radius: 3px;
    border: 1px solid #ff6034;
    color: #ff6034;
  }
  .search-results .product-bottom {
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .search-results .price-now {
    font-size: 16px;
    font-weight: 700;
    color: #ee0a24;
  }
  .search-results .price-now .symbol { font-size: 11px; }
  .search-results .price-old {
    font-size: 11px;
    color: #bbb;
    text-decoration: line-through;
  }
  .search-results .sold {
    font-size: 11px;
    color: #999;
    margin-left: auto;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Navigation Header -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">搜索</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Search Input Area -->
  <div class="search-input-area">
    <div class="search-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="搜索商品" autofocus>
      <div class="clear-btn" id="clearInputBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 60px;">

    <!-- Search History -->
    <div class="history-section" id="historySection">
      <div class="history-header">
        <span class="title">搜索历史</span>
        <span class="clear-btn" id="clearHistoryBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          清空
        </span>
      </div>
      <div class="history-list" id="historyList">
        <span class="history-item">保温杯</span>
        <span class="history-item">无线耳机</span>
        <span class="history-item">运动鞋男</span>
        <span class="history-item">蛋糕</span>
      </div>
    </div>

    <!-- Search Results -->
    <div class="search-results" id="searchResults">
      <div class="result-header" id="resultHeader">找到 0 个商品</div>
      <div class="product-grid" id="resultGrid"></div>
    </div>

  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar">
    <a href="home_page.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>首页</span>
    </a>
    <a href="category.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      <span>分类</span>
    </a>
    <a href="cart.html" class="tab-item">
      <div class="cart-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
        <span class="badge">3</span>
      </div>
      <span>购物车</span>
    </a>
    <a href="favorites.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      <span>收藏</span>
    </a>
    <a href="profile.html" class="tab-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>我的</span>
    </a>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var searchInput = document.getElementById('searchInput');
  var clearInputBtn = document.getElementById('clearInputBtn');
  var historySection = document.getElementById('historySection');
  var historyList = document.getElementById('historyList');
  var clearHistoryBtn = document.getElementById('clearHistoryBtn');
  var searchResults = document.getElementById('searchResults');
  var resultHeader = document.getElementById('resultHeader');
  var resultGrid = document.getElementById('resultGrid');

  var allProducts = [
    { name: '日本进口保温杯 不锈钢真空便携水杯500ml', price: '68', original: '168', tag: '爆款', sold: '2.3万', img: '../images/unsplash/1602143407151-7111542de6e8.jpg' },
    { name: '无线蓝牙降噪耳机 迷你入耳式超长续航', price: '89', original: '299', tag: '新品', sold: '5680', img: '../images/unsplash/1505740420928-5e560c06d30e.jpg' },
    { name: '纯棉短袖T恤男女款 夏季宽松百搭潮流', price: '39.9', original: '129', tag: '热卖', sold: '1.2万', img: '../images/unsplash/1521572163474-6864f9cf17ab.jpg' },
    { name: '时尚运动鞋 透气网面跑步鞋轻便缓震', price: '159', original: '459', tag: '限时', sold: '8960', img: '../images/unsplash/1542291026-7eec264c27ff.jpg' },
    { name: '智能手表 多功能运动健康监测手环', price: '199', original: '599', tag: '爆款', sold: '3.5万', img: '../images/unsplash/1523275335684-37898b6baf30.jpg' },
    { name: '潮流太阳眼镜 防紫外线偏光墨镜', price: '79', original: '239', tag: '特惠', sold: '4.1万', img: '../images/unsplash/1572635196237-14b3f281503f.jpg' },
    { name: '高品质充电宝 10000mAh超薄移动电源', price: '59', original: '189', tag: '新品', sold: '6780', img: '../images/unsplash/1609091839311-d5365f9ff1c5.jpg' },
    { name: '精致蛋糕礼盒 手工制作生日庆典甜品', price: '128', original: '258', tag: '热卖', sold: '3250', img: '../images/unsplash/1578985545062-69928b1d9587.jpg' }
  ];

  function doSearch(keyword) {
    var k = keyword.trim();
    clearInputBtn.classList.toggle('show', k.length > 0);

    if (!k) {
      historySection.style.display = 'block';
      searchResults.style.display = 'none';
      return;
    }

    historySection.style.display = 'none';
    searchResults.style.display = 'block';

    var filtered = allProducts.filter(function(p) {
      return p.name.toLowerCase().indexOf(k.toLowerCase()) !== -1;
    });

    resultHeader.textContent = '找到 ' + filtered.length + ' 个商品';

    if (filtered.length === 0) {
      resultGrid.innerHTML = '<div style="text-align:center;padding:40px 20px;color:#999;font-size:13px;">暂无搜索结果</div>';
      return;
    }

    var html = '';
    filtered.forEach(function(p) {
      html += '<a href="product_detail.html" class="product-card">' +
        '<div class="product-img"><img src="' + p.img + '" alt="' + p.name + '"></div>' +
        '<div class="product-info">' +
          '<div class="product-name">' + p.name + '</div>' +
          '<div class="product-tags"><span class="tag">' + p.tag + '</span></div>' +
          '<div class="product-bottom">' +
            '<span class="price-now"><span class="symbol">&yen;</span>' + p.price + '</span>' +
            '<span class="price-old">&yen;' + p.original + '</span>' +
            '<span class="sold">已售' + p.sold + '</span>' +
          '</div>' +
        '</div>' +
      '</a>';
    });
    resultGrid.innerHTML = html;
  }

  searchInput.addEventListener('input', function() { doSearch(this.value); });

  clearInputBtn.addEventListener('click', function() {
    searchInput.value = '';
    doSearch('');
    searchInput.focus();
  });

  // History item click
  document.querySelectorAll('.history-item').forEach(function(el) {
    el.addEventListener('click', function() {
      searchInput.value = this.textContent;
      doSearch(this.textContent);
    });
  });

  // Clear history
  clearHistoryBtn.addEventListener('click', function() {
    historyList.innerHTML = '<span class="history-empty">暂无搜索历史</span>';
  });
})();
</script>
</body>
</html>
