<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>搜索结果 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Filter header */
  .filter-header {
    background: #fff;
    padding: 12px;
    display: flex;
    gap: 8px;
    border-bottom: 1px solid #f0f0f0;
  }
  .filter-search {
    flex: 1;
    display: flex;
    align-items: center;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 8px 12px;
    gap: 8px;
  }
  .filter-search svg { width: 16px; height: 16px; color: #999; }
  .filter-search input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    background: transparent;
    color: #333;
  }
  .filter-search input::placeholder { color: #bbb; }
  .filter-cancel {
    font-size: 14px;
    color: #666;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
    padding: 0 12px;
  }
  .filter-tab {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    font-size: 14px;
    color: #666;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .filter-tab:active { background: #f8f8f8; }
  .filter-tab.active { color: #ff6034; font-weight: 600; }
  .filter-tab svg { width: 12px; height: 12px; }
  .filter-tab.asc svg { transform: rotate(180deg); }

  /* Filter panel */
  .filter-panel {
    background: #fff;
    padding: 16px;
    display: none;
    border-bottom: 1px solid #f0f0f0;
  }
  .filter-panel.show { display: block; }
  .filter-row {
    margin-bottom: 16px;
  }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
  }
  .filter-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-option {
    padding: 6px 14px;
    background: #f5f5f5;
    border-radius: 16px;
    font-size: 13px;
    color: #666;
    cursor: pointer;
  }
  .filter-option:active { background: #eee; }
  .filter-option.active {
    background: #fff5f0;
    color: #ff6034;
    border: 1px solid #ff6034;
  }

  /* Price range */
  .price-range {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .price-input {
    flex: 1;
    display: flex;
    align-items: center;
    background: #f5f5f5;
    border-radius: 8px;
    padding: 8px 12px;
  }
  .price-input input {
    width: 100%;
    border: none;
    outline: none;
    font-size: 14px;
    background: transparent;
    color: #333;
    text-align: center;
  }
  .price-input input::placeholder { color: #bbb; }
  .price-sep {
    color: #999;
  }

  /* Filter buttons */
  .filter-buttons {
    display: flex;
    gap: 12px;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid #f5f5f5;
  }
  .btn-reset {
    flex: 1;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 20px;
    background: #fff;
    color: #666;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-reset:active { background: #f5f5f5; }
  .btn-apply {
    flex: 2;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(135deg, #ff6034, #ee0a24);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-apply:active { opacity: 0.85; }

  /* Result header */
  .result-header {
    padding: 12px 16px;
    font-size: 13px;
    color: #999;
    background: #f5f5f5;
  }
  .result-header span { color: #ff6034; }

  /* Product list */
  .product-list {
    padding: 12px;
  }
  .product-item {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    padding: 12px;
    cursor: pointer;
  }
  .product-item:active { opacity: 0.95; }
  .product-img {
    width: 100px;
    height: 100px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    background: #f8f8f8;
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .product-name {
    font-size: 14px;
    color: #333;
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .product-tags {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }
  .product-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 2px;
    background: #fff5f0;
    color: #ff6034;
  }
  .product-bottom {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .product-price {
    font-size: 18px;
    font-weight: 700;
    color: #ee0a24;
  }
  .product-price small { font-size: 12px; }
  .product-sales {
    font-size: 11px;
    color: #999;
  }

  /* Active filters */
  .active-filters {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    background: #fff;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .active-filters::-webkit-scrollbar { display: none; }
  .active-filter {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: #fff5f0;
    border-radius: 14px;
    font-size: 12px;
    color: #ff6034;
    white-space: nowrap;
  }
  .active-filter svg { width: 12px; height: 12px; cursor: pointer; }

  /* Empty */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #999;
  }
  .empty-state svg {
    width: 64px;
    height: 64px;
    color: #ddd;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Search Header -->
  <div class="filter-header">
    <div class="filter-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="搜索商品" id="searchInput" value="保温杯">
    </div>
    <span class="filter-cancel" onclick="history.back()">取消</span>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <div class="filter-tab active" data-filter="default">综合</div>
    <div class="filter-tab" data-filter="sales">销量</div>
    <div class="filter-tab" data-filter="price">价格 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div>
    <div class="filter-tab" data-filter="filter" id="filterTab">筛选 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg></div>
  </div>

  <!-- Filter Panel -->
  <div class="filter-panel" id="filterPanel">
    <div class="filter-row">
      <div class="filter-label">价格区间</div>
      <div class="price-range">
        <div class="price-input"><input type="number" placeholder="最低价" id="minPrice"></div>
        <span class="price-sep">-</span>
        <div class="price-input"><input type="number" placeholder="最高价" id="maxPrice"></div>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-label">品牌</div>
      <div class="filter-options" id="brandOptions">
        <div class="filter-option active" data-value="all">全部</div>
        <div class="filter-option" data-value="haers">哈尔斯</div>
        <div class="filter-option" data-value="thermos">膳魔师</div>
        <div class="filter-option" data-value="zojirushi">象印</div>
        <div class="filter-option" data-value="tiger">虎牌</div>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-label">容量</div>
      <div class="filter-options" id="capacityOptions">
        <div class="filter-option active" data-value="all">全部</div>
        <div class="filter-option" data-value="350">350ml</div>
        <div class="filter-option" data-value="500">500ml</div>
        <div class="filter-option" data-value="750">750ml</div>
        <div class="filter-option" data-value="1000">1000ml</div>
      </div>
    </div>
    <div class="filter-row">
      <div class="filter-label">发货地</div>
      <div class="filter-options" id="locationOptions">
        <div class="filter-option active" data-value="all">全部</div>
        <div class="filter-option" data-value="jiangsu">江苏</div>
        <div class="filter-option" data-value="shanghai">上海</div>
        <div class="filter-option" data-value="zhejiang">浙江</div>
        <div class="filter-option" data-value="guangdong">广东</div>
      </div>
    </div>
    <div class="filter-buttons">
      <button class="btn-reset" onclick="resetFilters()">重置</button>
      <button class="btn-apply" onclick="applyFilters()">确定</button>
    </div>
  </div>

  <!-- Active Filters -->
  <div class="active-filters" id="activeFilters" style="display:none;"></div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 16px;">
    <div class="result-header">
      为您找到 <span>128</span> 个相关商品
    </div>
    <div class="product-list" id="productList"></div>
  </div>

</div>
<script src="../js/common.js"></script>
<script>
(function() {
  var products = [
    { id: 1, name: '日本进口保温杯 不锈钢真空便携水杯500ml', price: 68, sales: 2863, tags: ['新品', '热销'], img: '../images/unsplash/1602143407151-7111542de6e8.jpg' },
    { id: 2, name: '膳魔师保温杯 大容量户外运动水壶1000ml', price: 158, sales: 1524, tags: ['旗舰店'], img: '../images/unsplash/1570831739435-6601aa3fa4fb.jpg' },
    { id: 3, name: '象印保温杯 商务办公不锈钢真空杯350ml', price: 99, sales: 986, tags: ['自营'], img: '../images/unsplash/1523362628745-0c100150b504.jpg' },
    { id: 4, name: '虎牌保温杯 儿童学生吸管杯500ml', price: 128, sales: 2156, tags: ['儿童专用'], img: '../images/unsplash/1570586437263-ab629fccc818.jpg' },
    { id: 5, name: '哈尔斯保温杯 户外运动大容量水杯750ml', price: 49, sales: 3521, tags: ['限时特惠'], img: '../images/unsplash/1548839140-29a749e1cf4d.jpg' }
  ];

  var productList = document.getElementById('productList');
  var filterPanel = document.getElementById('filterPanel');
  var filterTab = document.getElementById('filterTab');
  var activeFilters = document.getElementById('activeFilters');

  function renderProducts(data) {
    var html = '';
    data.forEach(function(item) {
      html += '<a href="product_detail.html" class="product-item">' +
        '<div class="product-img"><img src="' + item.img + '" alt=""></div>' +
        '<div class="product-info">' +
          '<div>' +
            '<div class="product-name">' + item.name + '</div>' +
            '<div class="product-tags">' +
              item.tags.map(function(t) { return '<span class="product-tag">' + t + '</span>'; }).join('') +
            '</div>' +
          '</div>' +
          '<div class="product-bottom">' +
            '<span class="product-price"><small>&yen;</small>' + item.price + '</span>' +
            '<span class="product-sales">已售' + item.sales + '</span>' +
          '</div>' +
        '</div>' +
      '</a>';
    });
    productList.innerHTML = html;
  }

  // Filter tabs
  document.querySelectorAll('.filter-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      if (this.dataset.filter === 'filter') {
        filterPanel.classList.toggle('show');
        this.classList.toggle('active');
        return;
      }

      filterPanel.classList.remove('show');
      document.querySelectorAll('.filter-tab').forEach(function(t) {
        if (t.dataset.filter !== 'filter') t.classList.remove('active');
      });
      this.classList.add('active');

      // Toggle sort direction for price/sales
      if (this.dataset.filter === 'price') {
        this.classList.toggle('asc');
      }

      renderProducts(products);
    });
  });

  // Filter options
  document.querySelectorAll('.filter-options').forEach(function(options) {
    options.querySelectorAll('.filter-option').forEach(function(opt) {
      opt.addEventListener('click', function() {
        options.querySelectorAll('.filter-option').forEach(function(o) { o.classList.remove('active'); });
        this.classList.add('active');
      });
    });
  });

  function resetFilters() {
    document.querySelectorAll('.filter-options').forEach(function(options) {
      options.querySelectorAll('.filter-option').forEach(function(opt, idx) {
        opt.classList.toggle('active', idx === 0);
      });
    });
    document.getElementById('minPrice').value = '';
    document.getElementById('maxPrice').value = '';
  }

  function applyFilters() {
    filterPanel.classList.remove('show');
    filterTab.classList.remove('active');

    // Build active filters display
    var filters = [];
    var minPrice = document.getElementById('minPrice').value;
    var maxPrice = document.getElementById('maxPrice').value;
    if (minPrice || maxPrice) {
      filters.push({ label: (minPrice || '0') + '-' + (maxPrice || '∞') + '元', type: 'price' });
    }

    if (filters.length > 0) {
      activeFilters.style.display = 'flex';
      var html = '';
      filters.forEach(function(f) {
        html += '<div class="active-filter">' +
          '<span>' + f.label + '</span>' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
        '</div>';
      });
      activeFilters.innerHTML = html;
    } else {
      activeFilters.style.display = 'none';
    }

    renderProducts(products);
  }

  window.resetFilters = resetFilters;
  window.applyFilters = applyFilters;

  renderProducts(products);
})();
</script>
</body>
</html>
