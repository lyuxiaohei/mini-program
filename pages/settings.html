<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>设置 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  .settings-content {
    padding: 12px;
    padding-bottom: 100px;
  }

  /* Menu section */
  .menu-section {
    background: #fff;
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .menu-section-title {
    font-size: 13px;
    color: #999;
    padding: 12px 12px 8px;
  }

  .menu-item {
    display: flex;
    align-items: center;
    padding: 14px 12px;
    cursor: pointer;
    border-bottom: 1px solid #f5f5f5;
  }
  .menu-item:last-child { border-bottom: none; }
  .menu-item:active { background: #fafafa; }
  .menu-item .menu-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
    flex-shrink: 0;
  }
  .menu-item .menu-icon svg { width: 20px; height: 20px; color: #fff; }
  .menu-item .menu-label {
    flex: 1;
    font-size: 14px;
    color: #333;
  }
  .menu-item .menu-value {
    font-size: 13px;
    color: #999;
    margin-right: 8px;
  }
  .menu-item .menu-arrow {
    color: #ccc;
  }
  .menu-item .menu-arrow svg { width: 16px; height: 16px; }

  /* Logout button */
  .logout-section {
    margin-top: 20px;
  }
  .btn-logout {
    width: 100%;
    height: 44px;
    background: #fff;
    color: #ee0a24;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
  }
  .btn-logout:active { background: #fafafa; }

  /* Version info */
  .version-info {
    text-align: center;
    font-size: 12px;
    color: #bbb;
    margin-top: 24px;
  }

  /* WeChat auth overlay */
  .wx-auth-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .wx-auth-overlay.show { display: flex; }
  .wx-auth-popup {
    width: 280px;
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
  }
  .wx-auth-popup .wx-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #07c160;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 12px;
  }
  .wx-auth-popup .wx-icon svg { width: 28px; height: 28px; color: #fff; }
  .wx-auth-popup .wx-title {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 8px;
  }
  .wx-auth-popup .wx-desc {
    font-size: 13px;
    color: #666;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .wx-auth-popup .wx-buttons {
    display: flex;
    gap: 12px;
  }
  .wx-auth-popup .btn-wx-reject {
    flex: 1;
    height: 40px;
    background: #f5f5f5;
    color: #666;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
  }
  .wx-auth-popup .btn-wx-allow {
    flex: 1;
    height: 40px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  .wx-auth-popup .btn-wx-reject:active { background: #eee; }
  .wx-auth-popup .btn-wx-allow:active { opacity: 0.85; }

  /* User info card */
  .user-card {
    background: #fff;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-avatar {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    overflow: hidden;
    background: #f5f5f5;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; }
  .user-name {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 4px;
  }
  .user-phone {
    font-size: 13px;
    color: #999;
  }
</style>
</head>
<body>

      <div class="wx-buttons">
        <button class="btn-wx-reject" id="wxAuthReject">拒绝</button>

</div>
<script src="../js/common.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script>
(function() {
  // Load user info (auth-guard ensures we're logged in)
  var user = Auth.getCurrentUser();

  // Display user info
  document.getElementById('userName').textContent = user.name || '用户';
  document.getElementById('userPhone').textContent = Auth.maskPhone(user.phone);
  document.getElementById('phoneDisplay').textContent = Auth.maskPhone(user.phone);
  if (user.avatar) document.getElementById('settingsAvatar').src = user.avatar;

  // WeChat bind status
  function updateWechatStatus() {
    var current = Auth.getCurrentUser();
    var statusEl = document.getElementById('wechatStatus');
    if (current && current.wechatBound) {
      statusEl.textContent = '已绑定';
      statusEl.style.color = '#07c160';
    } else {
      statusEl.textContent = '未绑定';
      statusEl.style.color = '#999';
    }
  }
  updateWechatStatus();

  // WeChat bind/unbind click
  document.getElementById('wechatBindItem').addEventListener('click', function() {
    var current = Auth.getCurrentUser();
    if (current && current.wechatBound) {
      if (confirm('确定要解绑微信吗？解绑后将无法使用微信登录。')) {
        Auth.unbindWeChat();
        alert('已解绑微信');
        updateWechatStatus();
      }
    } else {
      // Show WeChat auth popup
      document.getElementById('wechatAuthOverlay').classList.add('show');
    }
  });

  // WeChat auth popup events
  document.getElementById('wxAuthReject').addEventListener('click', function() {
    document.getElementById('wechatAuthOverlay').classList.remove('show');
  });

  document.getElementById('wxAuthAllow').addEventListener('click', function() {
    document.getElementById('wechatAuthOverlay').classList.remove('show');

    // Check if this WeChat is already bound to another account
    var current = Auth.getCurrentUser();
    if (Auth.isWeChatBoundToOther(current.phone)) {
      alert('该微信已绑定其他账号，请先在原账号中解绑后再绑定');
      return;
    }

    Auth.bindWeChat();
    alert('绑定成功');
    updateWechatStatus();
  });

  document.getElementById('wechatAuthOverlay').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('show');
  });

  // Logout
  document.getElementById('logoutBtn').addEventListener('click', function() {
    if (confirm('确定要退出登录吗？')) {
      Auth.logout();
      location.href = 'login.html';
    }
  });
})();
</script>
</body>
</html>
