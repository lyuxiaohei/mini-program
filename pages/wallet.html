<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的钱包 - 苏银豆商城</title>
<link rel="stylesheet" href="../css/common.css">
<style>
  /* Wallet card */
  .wallet-card {
    background: linear-gradient(135deg, var(--primary-start), var(--price-color));
    margin: var(--space-md);
    border-radius: var(--radius-lg);
    padding: var(--space-xl);
    color: var(--card-bg);
    position: relative;
    overflow: hidden;
  }
  .wallet-card::before {
    content: '';
    position: absolute;
    top: -50px;
    right: -50px;
    width: 150px;
    height: 150px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
  }
  .wallet-card::after {
    content: '';
    position: absolute;
    bottom: -30px;
    left: -30px;
    width: 100px;
    height: 100px;
    background: rgba(255,255,255,0.08);
    border-radius: 50%;
  }
  .wallet-label {
    font-size: var(--font-base);
    opacity: 0.9;
    margin-bottom: var(--space-sm);
    position: relative;
    z-index: 1;
  }
  .wallet-amount {
    font-size: 36px;
    font-weight: 700;
    margin-bottom: var(--space-xl);
    position: relative;
    z-index: 1;
  }
  .wallet-amount .symbol { font-size: var(--font-xl); }

  .wallet-row {
    display: flex;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .wallet-item {
    text-align: center;
  }
  .wallet-item-label {
    font-size: var(--font-sm);
    opacity: 0.85;
    margin-bottom: var(--space-xs);
  }
  .wallet-item-value {
    font-size: var(--font-xl);
    font-weight: 600;
  }

  /* Action buttons */
  .wallet-actions {
    display: flex;
    gap: var(--space-md);
    margin: 0 var(--space-md) var(--space-md);
  }
  .btn-wallet {
    flex: 1;
    height: 44px;
    border-radius: var(--radius-xl);
    font-size: var(--font-base);
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-sm);
  }
  .btn-wallet svg { width: 18px; height: 18px; }
  .btn-recharge {
    background: var(--card-bg);
    color: var(--primary-start);
    border: none;
  }
  .btn-recharge:active { background: var(--bg-input); }
  .btn-withdraw {
    background: transparent;
    color: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.5);
  }
  .btn-withdraw:active { background: rgba(255,255,255,0.1); }

  /* Quick tools */
  .tools-section {
    background: var(--card-bg);
    margin: 0 var(--space-md) var(--space-md);
    border-radius: var(--radius-md);
    padding: var(--space-lg) 12px;
  }
  .tools-grid {
    display: flex;
    justify-content: space-around;
  }
  .tool-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: var(--space-sm);
    cursor: pointer;
  }
  .tool-item:active { opacity: 0.7; }
  .tool-icon {
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tool-icon svg { width: 22px; height: 22px; color: var(--card-bg); }
  .tool-item span { font-size: var(--font-sm); color: var(--text-secondary); }

  /* Transaction list */
  .trans-section {
    background: var(--card-bg);
    margin: 0 var(--space-md);
    border-radius: var(--radius-md);
    overflow: hidden;
  }
  .trans-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: var(--space-lg) 12px;
    border-bottom: 1px solid var(--bg-color);
  }
  .trans-header .title {
    font-size: var(--font-md);
    font-weight: 600;
    color: var(--text-color);
  }
  .trans-header .more {
    font-size: var(--font-sm);
    color: var(--text-tertiary);
    display: flex;
    align-items: center;
    gap: 2px;
    cursor: pointer;
  }
  .trans-header .more svg { width: 14px; height: 14px; }

  .trans-list {
    padding: 0 var(--space-md);
  }
  .trans-item {
    display: flex;
    align-items: center;
    padding: var(--space-lg) 0;
    border-bottom: 1px solid var(--bg-color);
  }
  .trans-item:last-child { border-bottom: none; }
  .trans-icon {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: var(--space-md);
    flex-shrink: 0;
  }
  .trans-icon svg { width: 20px; height: 20px; color: var(--card-bg); }
  .trans-icon.income { background: linear-gradient(135deg, var(--success-color), var(--success-dark)); }
  .trans-icon.expense { background: linear-gradient(135deg, var(--warning-color), var(--warning-dark)); }

  .trans-info { flex: 1; min-width: 0; }
  .trans-title {
    font-size: var(--font-base);
    color: var(--text-color);
    margin-bottom: var(--space-xs);
  }
  .trans-time {
    font-size: var(--font-sm);
    color: var(--text-muted);
  }

  .trans-amount {
    font-size: var(--font-md);
    font-weight: 600;
  }
  .trans-amount.income { color: var(--success-color); }
  .trans-amount.expense { color: var(--text-color); }
</style>
</head>
<body>
<div class="phone-frame">

  <!-- Sub-page Navigation -->
  <div class="sub-nav">
    <div class="status-bar dark">
      <span class="time">09:41</span>
      <div class="icons">
        <svg viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
        <svg viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
      </div>
    </div>
    <div class="nav-bar">
      <div class="back-btn" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </div>
      <span class="nav-title">我的钱包</span>
      <div class="capsule-btn"><img src="../images/icons/小程序按钮.svg" alt=""></div>
    </div>
  </div>

  <!-- Scrollable Content -->
  <div class="page-scroll" style="padding-bottom: 60px;">

    <!-- Wallet Card -->
    <div class="wallet-card">
      <div class="wallet-label">账户余额（元）</div>
      <div class="wallet-amount"><span class="symbol">&yen;</span>128.00</div>
      <div class="wallet-row">
        <div class="wallet-item">
          <div class="wallet-item-label">苏银豆</div>
          <div class="wallet-item-value">1,280</div>
        </div>
        <div class="wallet-item">
          <div class="wallet-item-label">优惠券</div>
          <div class="wallet-item-value">3张</div>
        </div>
        <div class="wallet-item">
          <div class="wallet-item-label">红包</div>
          <div class="wallet-item-value">2个</div>
        </div>
      </div>
    </div>

    <!-- Action Buttons -->
    <div class="wallet-actions">
      <button class="btn-wallet btn-recharge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        充值
      </button>
      <button class="btn-wallet btn-withdraw">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        提现
      </button>
    </div>

    <!-- Quick Tools -->
    <div class="tools-section">
      <div class="tools-grid">
        <div class="tool-item">
          <div class="tool-icon" style="background: linear-gradient(135deg, var(--info-color), var(--info-color));">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
          </div>
          <span>银行卡</span>
        </div>
        <div class="tool-item" onclick="location.href='points_center.html'">
          <div class="tool-icon" style="background: linear-gradient(135deg, var(--warning-color), var(--warning-dark));">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          </div>
          <span>积分中心</span>
        </div>
        <div class="tool-item">
          <div class="tool-icon" style="background: linear-gradient(135deg, var(--error-light), var(--price-color));">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 12V8H6a2 2 0 01-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><path d="M18 12a2 2 0 00-2 2c0 1.1.9 2 2 2h4v-4h-4z"/></svg>
          </div>
          <span>优惠券</span>
        </div>
        <div class="tool-item">
          <div class="tool-icon" style="background: linear-gradient(135deg, var(--success-color), var(--success-dark));">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
          </div>
          <span>交易记录</span>
        </div>
      </div>
    </div>

    <!-- Recent Transactions -->
    <div class="trans-section">
      <div class="trans-header">
        <span class="title">最近交易</span>
        <span class="more">全部 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg></span>
      </div>
      <div class="trans-list" id="transList"></div>
    </div>

  </div>

</div>
<script src="../js/auth.js"></script>
<script src="../js/auth-guard.js"></script>
<script src="../js/common.js"></script>
<script>
(function() {
  var transactions = [
    { type: 'income', title: '购物返积分', amount: '+128', time: '2026-04-08 14:35' },
    { type: 'expense', title: '积分兑换商品', amount: '-500', time: '2026-04-07 10:20' },
    { type: 'income', title: '签到奖励', amount: '+10', time: '2026-04-07 08:00' },
    { type: 'income', title: '邀请好友奖励', amount: '+200', time: '2026-04-05 16:42' },
    { type: 'expense', title: '积分兑换优惠券', amount: '-100', time: '2026-04-03 11:15' }
  ];

  var list = document.getElementById('transList');
  var html = '';

  transactions.forEach(function(item) {
    html += '<div class="trans-item">' +
      '<div class="trans-icon ' + item.type + '">' +
        (item.type === 'income'
          ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>'
          : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>') +
      '</div>' +
      '<div class="trans-info">' +
        '<div class="trans-title">' + item.title + '</div>' +
        '<div class="trans-time">' + item.time + '</div>' +
      '</div>' +
      '<div class="trans-amount ' + item.type + '">' + item.amount + '</div>' +
    '</div>';
  });

  list.innerHTML = html;
})();
</script>
<script src="../js/theme-switcher.js"></script>
</body>
</html>
